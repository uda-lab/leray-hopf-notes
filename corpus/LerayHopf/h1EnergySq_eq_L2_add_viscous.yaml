name: LerayHopf.Torus.h1EnergySq_eq_L2_add_viscous
tier: full
statement_ja: |
  帯域制限された場の $H^1$ エネルギーの分解：$u$ がある次数 $n$ の Fourier 截断で固定されるならば

  $$\sum_{j,\,k} (1 + \lvert k \rvert^2)\, \lVert \hat u_j(k) \rVert^2 = \lVert u \rVert^2 + \frac{1}{(2\pi)^2}\, \lVert \nabla u \rVert^2$$

  （右辺第二項は係数 $1$ の [[粘性形式|LerayHopf.viscousFormSq]] の $(2\pi)^{-2}$ 倍）。
proof_ja: |
  $\lVert u \rVert^2$ を [[Pythagoras 分解|LerayHopf.Torus.L2VF_norm_sq_eq_sum_componentC]] と成分ごとの Parseval で係数の二乗和に書き換え、Sobolev 重みを $1$ と $\lvert k \rvert^2$ に分割する。帯域制限により分割後の各級数は総和可能なので、総和の加法分解が正当化され、勾配部分から $(2\pi)^2$ を括り出せば粘性形式の $(2\pi)^{-2}$ 倍に一致する。
gap:
  level: mild
  note: |
    重みの分割後の総和可能性（帯域制限による有限台）が総和の加法分解 `Summable.tsum_add` の前提として要る。$(2\pi)^2$ の因子は $e^{2\pi i k \cdot x}$ 規約で微分が持ち込むもの。
chapter: ode
tags: [sobolev, energy, torus]
