statement_ja: |
  打ち切り次数に関する単調収束。重み $W(\xi)=(2\pi)^2\|\xi\|^2$ を打ち切った $W_k(\xi):=\min(\sqrt{W(\xi)},k)$ による乗算作用素を Fourier 成分に作用させたノルムの自乗は $k\to\infty$ で単調に増加し、その上限は打ち切りなしの $j$ 番目の粘性スペクトル項（ℝ≥0∞ 値の下側 Lebesgue 積分版）に一致する。
