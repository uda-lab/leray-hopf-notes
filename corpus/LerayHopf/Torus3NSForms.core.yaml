name: LerayHopf.Torus3NSForms.core
tier: full
statement_ja: |
  $\mathbb{T}^3$ 移流形式データから、その領域中立な核 [[移流形式核|LerayHopf.Galerkin.NSFormCore]] への射影。三重線形形式 $b$ とその代数的性質（反対称性・線形性・テスト有界性）をそのまま渡す。
proof_ja: |
  各条項の単純な読み替えであり、新しい証明内容はない。$b$ が実際に $\int(u\cdot\nabla)v\cdot w$ という移流形式であることを固定する標準形への同定は $\mathbb{T}^3$ 側のデータに留まる — これは射影であって置き換えではない。非自明性（$b\neq 0$）を直接示す独立の定理は、本リポジトリでは形式化されていない。
gap:
  level: none
  note: |
    値の一致は `Torus3NSForms.core_b`（`rfl`）が固定する。
provenance: |
  非自明性に関する形式化範囲は source issue #153 の監査で明確化された。
chapter: capstone-torus
tags: [galerkin-domain, torus, convection]
