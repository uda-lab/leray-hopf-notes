name: LerayHopf.h1EnergySq_continuousOn_galerkin
tier: full
statement_ja: |
  Galerkin 曲線に沿う $H^1$ エネルギーの連続性：次数 $n$ の Galerkin 解 $u_n$ に対し、$t \mapsto$（$u_n(t)$ の $H^1$ エネルギー）は $[0, \infty)$ 上連続である。
proof_ja: |
  曲線の値は帯域制限されているので、$H^1$ エネルギーは周波数箱上の有限和に帰着する。各項は「係数汎関数と成分射影の合成を曲線に沿って評価したもののノルム二乗の定数倍」であり、曲線の連続性（微分可能性から）と連続線形写像の合成で連続。有限和の連続性で結論を得る。
gap:
  level: none
  note: |
    打ち切り残差の時間積分評価で優関数の区間可積分性を保証するための側条件。曲線の連続性は解データの `u_hasDeriv` から来る。
chapter: compactness
tags: [rellich, energy, torus]
