name: LerayHopf.tendsto_norm_tailVF_zero
tier: full
statement_ja: |
  球外部分の消滅：固定した $v$ に対し、球外部分のノルム $\lVert v\vert_{B_k^c}\rVert$ は $k\to\infty$ で $0$ へ収束する。球内・球外分解と併せて、固定場のエネルギーが有界領域に集中することを表す。
proof_ja: |
  可測代表元を取り、球外部分のノルム二乗を補集合上の積分として表す。補集合は空集合へ単調に縮むので、可積分関数の集合積分の連続性から積分は $0$ へ収束し、平方根の連続性でノルムも $0$ へ向かう。
gap:
  level: mild
  note: |
    可測代表元の取り出しと拡張実数値の冪の扱いが形式化の作業量。
provenance: |
  lean-pde PR #122（issue #111 PR-3）で private→public 化・共有化された。
chapter: compactness
tags: [spatial-compactness, restrict-to-ball, r3]
