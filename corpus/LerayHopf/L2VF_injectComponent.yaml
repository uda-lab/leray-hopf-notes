name: LerayHopf.L2VF_injectComponent
tier: full
statement_ja: |
  スカラー場の第 $j$ 成分への注入：$f \mapsto (x \mapsto f(x)\, e_j)$（$e_j$ は標準基底ベクトル）を実 $L^2$ からベクトル $L^2$ への連続線形写像として定める。
proof_ja: |
  各点でのスカラー倍写像 $r \mapsto r\, e_j$ を $L^2$ 類の水準へ持ち上げて構成する。
gap:
  level: none
  note: |
    各点での随伴という意味で [[成分の取り出し|LerayHopf.L2VF_projComponent]] の随伴。成分ごとの収束からベクトル場の収束を組み立てる再構成補題群で使う。
provenance: |
  lean-pde issue #113 PR-1 で随伴の隣（`DivergenceFree.lean`）へ移設。
chapter: projections-galerkin
tags: [projections, adjoint, torus]
