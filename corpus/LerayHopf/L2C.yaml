name: LerayHopf.L2C
tier: full
statement_ja: |
  複素スカラー空間 $L^2(\mathbb{T}^3; \mathbb{C})$：正準測度に関する複素値 $L^2$ 空間。
proof_ja: |
  値の型を $\mathbb{C}$ とする $L^2$ 空間として定める。
gap:
  level: none
  note: |
    スカラー Fourier モードの周囲空間。速度場の成分は実から複素への埋め込みでここに入る（[[複素埋め込み成分|LerayHopf.L2VF_projComponentC]]）。測度を [[正準測度|LerayHopf.haarTorus3]] に固定してあるのは、[[Fourier 基底|LerayHopf.torus3_mFourierBasis]] の測度と定義的に一致させて型付けを通すためである。
chapter: spaces
tags: [function-spaces, torus]
