name: LerayHopf.BoundedMultiplier.norm_mulBdd_sq
tier: full
statement_ja: |
  乗算の $L^2$ ノルム二乗の重み付き積分表示：

  $$\lVert\mathrm{mul}_m\,g\rVert^2 = \int m(x)^2\,\lvert g(x)\rvert^2\,d\mu.$$

  Fourier 重みのエネルギー計算を積分の言葉へ翻訳する。
proof_ja: |
  ノルム二乗を各点でのノルム二乗の積分として書き、代表関数の各点での表示を代入する。
gap:
  level: none
  note: |
    旧 `R3/WeightedFourierCommute.lean` には同名の thin wrapper が残る。
provenance: |
  lean-pde PR #127（issue #113 PR-4）で一般測度空間版として公開された有界乗算作用素 API。
chapter: misc
tags: [multiplier, shared-infra]
