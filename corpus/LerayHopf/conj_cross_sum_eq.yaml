name: LerayHopf.conj_cross_sum_eq
tier: gloss
statement_ja: |
  共役をとった外積記号とベクトル $\widehat w$ の Hermite 内積が、三重積の組み替えにより、係数 $-2\pi i$ を掛けた「$\overline a$ と外積場 $\widehat w\times\xi$ の内積」に等しいことを述べる。

  $$\sum_j\overline{\bigl(\text{外積記号}\bigr)_j}\,\widehat w_j=-2\pi i\sum_m\overline{a_m}\,(\widehat w\times\xi)_m$$
