name: LerayHopf.IsSchwartzDivFree_R3
tier: full
statement_ja: |
  ベクトル場 $w\in L^2_\sigma(\mathbb{R}^3)$ が**Schwartz 発散ゼロテスト関数**であるとは、その各実成分がスカラー Schwartz 関数の $L^2$ 類であることをいう。すなわち、各成分を代表する Schwartz 関数 $\psi_j$ が存在する。
proof_ja: |
  成分ごとに Schwartz 代表元をもつという条件によって、$\mathbb{R}^3$ の弱形式で用いる標準的なテスト関数クラスを定める。ベクトル値の $L^2$ 埋め込みの煩雑さを避けるため成分ごとに表すが、$\psi$ の発散ゼロ性を課せば、単一のベクトル値 Schwartz 代表元をもつことと同値になる。
gap:
  level: mild
  note: |
    自然言語では「滑らかな発散ゼロ関数でテストする」で済むが、形式化では成分ごとの Schwartz 代表元の存在として定式化し、ベクトル値の埋め込みを回避する。

    健全性の観点では、テスト関数クラスを Galerkin 不動点クラスに狭めると定理名が主張する標準的な弱形式より狭くなり過大主張になる。そこで散逸発展の述語 `isTest` を、この標準的な Schwartz 発散ゼロクラスに設定している。
chapter: spaces
tags: [test-function, schwartz, divergence-free]
