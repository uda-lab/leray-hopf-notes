name: LerayHopf.Torus.stokesTestPairing_symm
tier: full
statement_ja: |
  [[Stokes テスト対|LerayHopf.stokesTestPairing]] の対称性：任意の $L^2$ 場 $u, w$ に対し $s(u, w) = s(w, u)$ が、収束の仮定なしに成り立つ。
proof_ja: |
  各成分・各格子点の被和項で、複素数とその共役の積の実部の対称性

  $$\operatorname{Re}\bigl[\hat u_j(k)\, \overline{\hat w_j(k)}\bigr] = \operatorname{Re}\bigl[\hat w_j(k)\, \overline{\hat u_j(k)}\bigr]$$

  が成り立つので、総和の項が一つずつ一致する。
gap:
  level: none
  note: |
    項別一致（`tsum_congr`）による証明なので、総和可能性にも tsum のジャンク値規約にも依存しない。
chapter: ode
tags: [stokes, torus]
