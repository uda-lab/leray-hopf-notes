name: LerayHopf.fourierCoeffCLM
tier: full
statement_ja: |
  第 $k$ Fourier 係数の連続線形汎関数化：$L^2(\mathbb{T}^3; \mathbb{C})$ 上の連続 $\mathbb{C}$ 線形汎関数として、第 $k$ 基底ベクトルとの内積 $f \mapsto \langle e_k, f \rangle$ を取る。
proof_ja: |
  内積の連続線形汎関数化（Riesz 対応の一方向）を Fourier 基底ベクトルに適用して定める。
gap:
  level: none
  note: |
    `innerSL` 経由の定義なので連続性が自動になり、[[係数との一致|LerayHopf.fourierCoeffCLM_apply]] が一行の展開で済む、という設計。
chapter: projections-galerkin
tags: [fourier, projections, torus]
