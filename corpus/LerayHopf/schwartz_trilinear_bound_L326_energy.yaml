name: LerayHopf.schwartz_trilinear_bound_L326_energy
tier: full
statement_ja: |
  スカラー Schwartz 三つ組の $(3,2,6)$-Hölder 三重積評価：

  $$\Bigl\lvert\int f\,g\,h\Bigr\rvert \le \lVert f\rVert_{L^3}\,\lVert g\rVert_{L^2}\,\lVert h\rVert_{L^6}.$$

  移流項の三重線形評価の再利用可能な単項版。$L^3$・$L^6$ ノルムをエネルギー量へ置き換える段は、これを消費する下流の評価が別途行う。
proof_ja: |
  まず積 $f\cdot h$ を指数対 $(3,6)\to 2$ の Hölder で $L^2$ に収め、次に $g$ と Cauchy–Schwarz で対にして三つのノルムの積を得る。
gap:
  level: mild
  note: |
    結論は純粋な Hölder 積であり、エネルギー（勾配量）による制御は消費側の `convIntegralSchwartz_bound_energy` が補間・Sobolev 評価を併用して行う。
provenance: |
  lean-pde PR #129 で private→public 化（`GalerkinTrilinearBound.lean`）。
chapter: limit-passage
tags: [trilinear, holder, r3]
