name: LerayHopf.viscousEnn
tier: full
statement_ja: |
  粘性散逸の拡張非負実数値版：成分 $j$ と格子点 $k$ の対にわたる和

  $$\sum_{j,\,k} \nu\,(2\pi)^2\,\lvert k \rvert^2\, \bigl\lVert \hat u_j(k) \bigr\rVert^2$$

  を、各項を拡張非負実数 $[0, \infty]$ に埋め込んだうえでの総和として定める。実数値の級数と違い、総和可能性の仮定なしに常に真の値（発散すれば $\infty$）を持つ。
proof_ja: |
  各項は非負実数なので拡張非負実数への埋め込みで情報を失わず、積の添字（成分と格子点の対）にわたる総和として構成する。
gap:
  level: mild
  note: |
    実数値の tsum は総和可能でないとき $0$ に潰れる（mathlib のジャンク値規約）のに対し、`ℝ≥0∞` の tsum は常に上限として意味を持つ。この対比が docstring の「正直な和」の意味で、実側との橋渡しは [[実粘性形式の優越|LerayHopf.ofReal_viscousFormSq_le]] と [[帯域制限場での一致|LerayHopf.viscousEnn_eq_ofReal_of_bandlimited]] が与える。
chapter: energy
tags: [energy, dissipation, torus]
