name: LerayHopf.viscousLintegrand_j
tier: gloss
statement_ja: |
  $j$ 番目の粘性スペクトル項の、可積分性を仮定しない ℝ≥0∞ 値版。実数値（Bochner 積分）版は可積分でない被積分関数に対しても無条件に定義され、その場合は $0$ を返す（[[粘性形式|LerayHopf.viscousFormSq_R3]] と同じ Bochner 積分の規約）。この $0$ は被積分関数が実際に可積分であることを何も保証しない見かけ上の値であり、$H^1$ から外れた場（重み付きスペクトルエネルギーが真に発散しうる場）では実数値版は真のエネルギーを表さない。ℝ≥0∞ 値の下側 Lebesgue 積分として定め直すことで、可積分性に関わらず常に真の（有限または無限の）スペクトルエネルギーを値として保つ。
gap:
  level: mild
provenance: |
