name: LerayHopf.conjL2C_fourierProjection
tier: full
statement_ja: |
  [[Fourier 射影|LerayHopf.fourierProjection_n]]は共役の不動点、すなわち実数値関数を保つ。$f$ が実数値（複素共役をとって不変）ならば、その Fourier 射影もまた実数値である。
proof_ja: |
  実数値関数の Fourier 係数は共役対称性 $\hat f(-k)=\overline{\hat f(k)}$ を満たし、截断の箱は $k\mapsto -k$ について対称である。したがって Fourier 射影は共役対称性を保ち、像もまた実数値になる。

  自然言語では「実だから実」の一行が、成分ごとの複素化という設計のために、共役の不動点をめぐる議論に化ける。
gap:
  level: mild
  note: |
    成分ごとの複素化のため、自然言語の「実数値性の保存」が、共役作用素 `conjL2C` の不動点と対称な箱をめぐる明示的な議論として展開される。係数の反射 `mFourierCoeff3_conjL2C` と箱の対称性 `neg_mem_fourierBox` から結論する。
chapter: projections-galerkin
tags: [galerkin, real-valuedness, conjugation]
