name: LerayHopf.h1EnergySq
tier: full
statement_ja: |
  速度場 $u$ の **$H^1$ エネルギー二乗**を、各成分の Fourier 係数に 1 階 Sobolev 荷重をかけた総和として定義する。

  $$\lVert u\rVert_{H^1}^2 \;=\; \sum_{j=1}^{3}\ \sum_{k\in\mathbb{Z}^3}\bigl(1+\lvert k\rvert^2\bigr)\,\bigl\lvert\hat u_j(k)\bigr\rvert^2$$

  ここで $\hat u_j(k)$ は第 $j$ 成分の第 $k$ [[Fourier 係数|LerayHopf.mFourierCoeff3]]、荷重 $1+\lvert k\rvert^2$ は標準的な 1 階 Sobolev ノルムの重み $1+\sum_i k_i^2$ である。
gap:
  level: large
  note: |
    総和 (`tsum`) の規約では、非可算な台をもつ和は $+\infty$ ではなく $0$ を返す。そのためこの $H^1$ エネルギー二乗は、$u$ が $H^1$ に属さない場合でも有限値（実質 $0$）を返しうる。

    自然言語では「$H^1$ の外では $H^1$ ノルムが $+\infty$」なので「エネルギーが有界ならば解は $H^1$ に属する」が自動的に従うが、形式化ではこの含意が総和規約の崩壊のために空虚に成り立つ恐れがある。したがって解の $H^1$ 正則性は、この量とは別に [[H¹ 正則性|LerayHopf.memH1VF]] とエネルギー類の条件で明示的に課す。
chapter: spaces
tags: [sobolev, fourier-coefficient, tsum-convention]
