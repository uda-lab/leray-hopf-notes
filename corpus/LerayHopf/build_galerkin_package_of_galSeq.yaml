name: LerayHopf.build_galerkin_package_of_galSeq
tier: full
statement_ja: |
  パッケージの組み立て（公理なしの中核）：明示的に与えられた Galerkin 列から完全コンパクト性パッケージを構成する。
proof_ja: |
  三段の連鎖である。第一に Aubin–Lions パッケージを構成する（[[Aubin–Lions 組み立て|LerayHopf.torusAubinLionsPackage_of_galSeq]]、空間側のコンパクト性は Rellich 埋め込み `rellich_L2Sigma` が担う）。第二に、エネルギークラス仮定を [[エネルギークラスの導出|LerayHopf.torus_energyClass_of_aubinLions]] で供給しつつ、証明済みの極限移行 [[極限移行|LerayHopf.torus_galerkin_limit_passage_of_energyClass]] を適用して、弱方程式・エネルギー不等式・初期トレース・エネルギークラスを持つ良い代表元を得る。第三に、良い代表元の時間可測性を「Aubin–Lions 極限との a.e. 一致」を経由して引き継ぎ、証明保持構造に詰める。
gap:
  level: mild
  note: |
    結論が命題でなく構造（`Type`）なので、存在文の展開は `obtain` でなく `Exists.choose` で行う。良い代表元と Aubin–Lions 極限の a.e. 一致の連言が可測性の移送のために保持されている。かつての公理 `aubin_lions`（A2）と `galerkin_limit_passage`（A3）は、それぞれ証明済み定理に置き換え済み。import 循環回避のため `SolutionInterfaces.lean` から capstone ファイルへ移設された。
chapter: capstone-torus
tags: [capstone, aubin-lions, torus]
