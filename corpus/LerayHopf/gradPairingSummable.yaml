name: LerayHopf.gradPairingSummable
tier: full
statement_ja: |
  Parseval 移流被和項の実部の総和可能性：$v$ が成分ごとに $H^1$、$w$ が Galerkin テスト関数ならば、固定した成分対ごとに、[[移流被和項|LerayHopf.convSummand]] の実部を取った実数値の族は格子点対全体で総和可能である。
proof_ja: |
  実部の取り出しは連続線形写像であり、総和可能な族の連続線形像は総和可能だから、[[被和項の複素総和可能性|LerayHopf.convSummand_summable]] から直ちに従う。
gap:
  level: none
  note: |
    docstring は $H^1$ 条件が中央の引数に付いて対称でない理由を詳述している：乗数 $2\pi i\, l_a$ は中央因子の微分に対応するため、重みを吸収できるのは中央因子の $H^1$ だけである。三つの引数がどれも単に $L^2$ というだけでは総和可能性は成り立たない。
chapter: energy
tags: [convection, fourier, summability, torus]
