name: LerayHopf.ofReal_viscousFormSq_le
tier: full
statement_ja: |
  非負の粘性係数に対し、実数値の [[粘性形式|LerayHopf.viscousFormSq]] を拡張非負実数へ埋め込んだ値は、[[拡張非負実数値の粘性和|LerayHopf.viscousEnn]] 以下である。
proof_ja: |
  両辺を成分 $j$ ごとの和に分解する（拡張非負実数側は積添字の総和を成分の有限和と格子の総和に分ける）。各成分で場合分けする：格子和が総和可能な成分では、非負項の総和と埋め込みが交換できるので両辺は一致する。総和可能でない成分では、実数側の値がジャンク値規約により $0$ に潰れるため不等式は自明に成り立つ。
gap:
  level: mild
  note: |
    実 tsum のジャンク $0$ 規約が不等式の良い向きに働くことが本補題の内容である。拡張非負実数側の添字分解は `ENNReal.tsum_prod'`、埋め込みの交換は `ENNReal.ofReal_tsum_of_nonneg` による。
chapter: energy
tags: [energy, dissipation, torus]
