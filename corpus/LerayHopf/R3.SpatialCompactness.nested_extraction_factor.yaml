name: LerayHopf.nested_extraction_factor
tier: full
statement_ja: |
  入れ子抽出の因数分解：部分列抽出の族 $\Phi$ が各段で狭義単調な $\rho_k$ により $\Phi_{k+1}=\Phi_k\circ\rho_k$ と細分されていくとき、任意の $k\le n$ に対し狭義単調な $R$ が存在して $\Phi_n = \Phi_k\circ R$ と書ける。対角線論法で得た多段の部分列を、任意の基準段の部分列として一本に読み替える組合せ補題。
proof_ja: |
  $n$ についての帰納法である。$n=k$ では恒等写像を取る。$n$ から $n+1$ へは、帰納法の仮定の $R$ に細分 $\rho_n$ を後ろから合成すれば、狭義単調性は合成で保たれ、分解の等式は細分の仮定から従う。
gap:
  level: none
  note: |
    NS 固有の内容を含まない純粋な組合せ補題。旧 ArzelaAscoliTime のコピーは削除され本原本に一本化。
provenance: |
