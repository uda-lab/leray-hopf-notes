name: LerayHopf.exists_lerayHopf_torus3
tier: full
statement_ja: |
  発散ゼロな初期値 $u_0\in L^2_\sigma(\mathbb{T}^3)$、粘性係数 $\nu>0$、時刻 $T>0$ に対して、外力なしの 3 次元単位トーラス $\mathbb{T}^3=(\mathbb{R}/\mathbb{Z})^3$（Haar 確率測度）上の Navier–Stokes 方程式は $[0,T]$ 上に Leray–Hopf 弱解をもつ（$T$ は入力として与えられる有限時刻区間の右端点である）。

  すなわち、$[0,T]$ 上でエネルギー不等式と、分離変数テスト関数 $\psi(t)w(x)$（$w$ は所定の発散ゼロテスト空間を走る）に対する弱形式を満たし、初期値を $t\to0^+$ の片側極限として強 $L^2$ で達成し、Leray–Hopf エネルギー類（ほとんど至る所 $H^1$ 所属＋粘性散逸の区間可積分性）に属する曲線 $u$ が存在する。この解は、それらの性質をすべて備えた[[完全 Leray–Hopf 解|LerayHopf.LerayHopfSolutionFull]]として得られる。
proof_ja: |
  **L1（Galerkin 近似）** 有限次元の[[速度モード空間|LerayHopf.velocitySpan]]の上で Galerkin 常微分方程式を Picard–Lindelöf により解き、近似列 $u_n$ を構成する。追加の仮定を要しない[[トーラス Galerkin 解|LerayHopf.Torus.galerkinSolutionData_torus]]がこれを供給する。

  **L2（一様評価）** 抽象的なエネルギー恒等式から、近似列が $L^\infty_t L^2_x\cap L^2_t H^1_x$ で一様有界であることを導く。

  **L3（コンパクト性）** 空間方向のコンパクト性は証明済みの[[Rellich コンパクト性|LerayHopf.rellich_L2Sigma]]が担い、時間方向の Aubin–Lions 型の議論と合わせて $u_n$ の部分列の $L^2_{t,x}$ 強収束を取り出す。

  **L4（非線形項の極限移行）** 強収束から移流項の極限移行を正当化する。

  **L5（エネルギー不等式）** ノルムの弱下半連続性からエネルギー不等式を極限に受け継がせ、すべての条件を満たす解を得る。
gap:
  level: large
  note: |
    近似列は証明済みの `Torus.galerkinSolutionData_torus` から供給され、かつて公理だった `galerkin_ode_solution` の役割を果たす。この $\mathbb{T}^3$ 主定理は現在カーネルのみで閉じている（追加公理ゼロ）。

    空間コンパクト性を証明済みの `rellich_L2Sigma` でまかなえる点が有界領域 $\mathbb{T}^3$ の強みであり、コンパクト性の局所化を要する非有界な $\mathbb{R}^3$ との違いがここに現れる。
provenance: |
  旧名の `axiomatic` 接尾辞は歴史的なもので、lean-pde PR #117 で retire され現行名 `exists_lerayHopf_torus3` になった。
chapter: capstone-torus
