name: LerayHopf.galerkin_u_continuousOn
tier: full
statement_ja: |
  Galerkin 曲線のノルム連続性：解曲線 $t \mapsto u_n(t)$ は $[0, \infty)$ 上連続である。
proof_ja: |
  解データの前向き微分可能性により、各 $t \ge 0$ で全近傍における微分可能性が成り立つので、各点で連続、したがって集合上連続である。
gap:
  level: none
  note: |
    Arzelà–Ascoli 型抽出の連続性側の入力。`HasDerivAt.continuousAt` の一行帰結。
chapter: compactness
tags: [compactness, torus]
