name: LerayHopf.tendsto_yukawa_integral
tier: gloss
statement_ja: |
  非負可積分な重み $\varphi$ に対し、正則化スケールの正実数列 $(a_n)_n$ が $0$ に収束するとき、湯川型の重み付き積分

  $$\int\Bigl(\frac{a_n^2}{a_n^2+\lVert\xi\rVert^2}\Bigr)^{2}\varphi(\xi)\,d\xi$$

  が $0$ に収束することを述べる。優収束定理による。
gap:
  level: mild
  note: |
    連続変数 $a\to0^+$ の極限ではなく、正の実数列 $(a_n)$ に沿った離散極限として定式化されている（`Filter.Tendsto … Filter.atTop`）。呼び出し側では具体的な列 $a_n=1/(n+1)$ を用いる。
chapter: projections-galerkin
tags: [dominated-convergence, yukawa-regularization, private-helper]
