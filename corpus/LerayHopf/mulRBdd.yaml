statement_ja: |
  実 $L^2$ 元への本質的有界実関数の乗算：$c\mapsto h\cdot c$ を実 $L^2$ の中の対応として定める。積の極限移行で係数側を固定するための道具。
proof_ja: |
  本質的有界性から点別の積の二乗可積分性が保たれることを確かめ、その $L^2$ 類を値とする。
