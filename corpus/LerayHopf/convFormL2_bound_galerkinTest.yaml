name: LerayHopf.TorusConvectionExtension.convFormL2_bound_galerkinTest
tier: full
statement_ja: |
  テストでの有界性：Galerkin テスト関数 $w$ に対し定数 $C(w)$ が存在し、Galerkin テストの $u, v$ に対し

  $$\lvert b(u, v, w) \rvert \le C(w)\, \lVert u \rVert\, \lVert v \rVert.$$
proof_ja: |
  テスト上の値の同定で移項形式に書き換え、[[移項形式の有界性|LerayHopf.TorusConvectionExtension.convValW_bound]] を適用する。
