name: LerayHopf.R3.TensorIntersection.range_map_subtype_inf_range_map_subtype
tier: full
statement_ja: |
  体上のベクトル空間 $V$ とその部分空間 $S$ を考える。テンソル積 $V\otimes V$ の中で、$S\otimes V$ の像と $V\otimes S$ の像の交わりは、ちょうど $S\otimes S$ の像に等しい。

  $$\operatorname{im}(S\otimes V)\ \cap\ \operatorname{im}(V\otimes S)\ =\ \operatorname{im}(S\otimes S)$$
proof_ja: |
  $S\otimes S$ の像が両方の像に含まれることは明らかで、包含の一方は従う。

  逆向きは、$S$ 上で恒等に制限する射影 $P$ をとり、両テンソルスロットへの作用を使う。交わりの元は $S\otimes V$ の像にも $V\otimes S$ の像にも属するので、$P\otimes\mathrm{id}$ と $\mathrm{id}\otimes P$ の双方で固定される。両者を合成すると $P\otimes P$ が得られ、これは元を $S\otimes S$ の像へ写しつつ固定するので、元はもともと $S\otimes S$ の像に属する。
gap:
  level: mild
  note: |
    移流ギャップ作用素の構成で、二つのスロットの制約が交わりで両立することを示すために使う。一方のスロットを固定する[[第一スロットの固定|LerayHopf.R3.TensorIntersection.map_proj_id_fix_of_mem_range]]と[[第二スロットの固定|LerayHopf.R3.TensorIntersection.map_id_proj_fix_of_mem_range]]を合わせる。一般の可除環上のベクトル空間と部分空間について述べる。
provenance: |
  issue #56 の主補題。
chapter: misc
tags: [tensor-product, linear-algebra]
