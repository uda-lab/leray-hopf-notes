name: LerayHopf.steklovAvg
tier: gloss
statement_ja: |
  Galerkin 近似列の速度曲線 $s\mapsto u_n(s)$ に対する前進 Steklov 平均。刻み幅 $\delta$ と基準時刻 $t$ に対し $$\delta^{-1}\int_t^{t+\delta} u_n(s)\,ds$$（$L^2$ ベクトル場値の Bochner 積分）と定める。$\delta>0$ のとき区間 $[t,t+\delta]$ 上での曲線の平均を与える。
gap:
