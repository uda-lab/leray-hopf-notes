name: LerayHopf.steklovAvg
tier: gloss
statement_ja: |
  Galerkin 近似列の速度曲線 $s\mapsto u_n(s)$ に対する前進 Steklov 平均。刻み幅 $\delta$ と基準時刻 $t$ に対し $$\delta^{-1}\int_t^{t+\delta} u_n(s)\,ds$$（$L^2$ ベクトル場値の Bochner 積分）と定める。$\delta>0$ のとき区間 $[t,t+\delta]$ 上での曲線の平均を与える。
gap:
  level: mild
provenance: |
  Wave 4 の private gloss 機械生成テンプレートから、issue #74 第2波で手書き化。抽出元: `LerayHopf/R3/SteklovAverages.lean`。旧 gap.note は `LerayHopf/R3/AubinLionsLimitPassage.lean` を抽出元と誤記していた（issue #114 Tier 1 のファイル分割前の記録が repin 後も更新されていなかったもの；decls.json の `file` フィールドは正しく現在地を指す）。
chapter: limit-passage
tags: [private-helper, aubin-lions]
