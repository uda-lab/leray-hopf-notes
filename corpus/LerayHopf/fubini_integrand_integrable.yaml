name: LerayHopf.fubini_integrand_integrable
tier: gloss
statement_ja: |
  有限測度な可測集合 $s$ の上では、$$(x,h)\mapsto\eta(h)\langle c,g(x+h)\rangle$$ は積測度 $$(\mathrm{volume}\restriction s)\times\mathrm{volume}$$ に関して可積分である。この絶対可積分性が、$s$ 上に制限した積分の順序の入れ替えを正当化する。
