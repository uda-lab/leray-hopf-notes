name: LerayHopf.L2Sigma
tier: full
statement_ja: |
  $\mathbb{T}^3$ 上の発散ゼロな二乗可積分ベクトル場のなす閉部分空間 $L^2_\sigma(\mathbb{T}^3)$。

  各波数 $k\in\mathbb{Z}^3$ に対する連続な[[発散記号|LerayHopf.divSymbol]]汎関数の核を、すべての $k$ について交わした共通核として、$L^2(\mathbb{T}^3;\mathbb{R}^3)$ の部分空間として定める。
proof_ja: |
  各波数の発散記号は連続線形汎関数だから、その核は閉部分空間である。閉部分空間の任意個の共通部分はふたたび閉部分空間なので、$L^2_\sigma$ は $L^2$ の閉部分空間になる。

  発散ゼロ条件を各波数の連続汎関数の核として直接与えると、構成からそのままメンバーシップが定まる。閉部分空間であることから Hilbert 構造と Leray 射影が自動的に得られる。
gap:
  level: mild
  note: |
    自然言語では「発散ゼロ場の空間」の一言だが、形式化では発散を各波数の連続汎関数として与え、その可算交叉で閉性を保証する構成をとる。当初の計画では発散ゼロモードの張る空間の閉包を公理として置く予定だったが、核の共通部分として直接定義することで公理を消去できた。
chapter: spaces
tags: [function-space, divergence-free]
