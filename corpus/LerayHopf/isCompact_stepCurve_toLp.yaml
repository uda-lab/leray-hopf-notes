name: LerayHopf.isCompact_stepCurve_toLp
tier: full
statement_ja: |
  コンパクト値ステップ曲線の類の集合はコンパクト：コンパクト集合 $K \subseteq X$ に対し、値を $K$ に取る刻み $m$ のステップ曲線の $L^p$ 類全体は $L^2(0,T; X)$ のコンパクト集合である。
proof_ja: |
  $K^m$ の元（値の組）にステップ曲線の $L^p$ 類を対応させる写像が、値の組の上限距離に関して Lipschitz であることを示す：二つのステップ曲線の差は各点で値の組の距離により抑えられ、有限測度上の一様有界評価で $L^2$ 距離が値の組の距離の定数倍以下になる。値の組の空間 $K^m$ はコンパクト（コンパクト集合の有限直積）なので、その連続像としてコンパクト性が従う。
gap:
  level: none
  note: |
    Fréchet–Kolmogorov 型全有界性判定の「有限次元近似のコンパクト性」の段。
chapter: bochner
tags: [step-functions, compactness, bochner]
