name: LerayHopf.galerkinSpan_exists_schwartzC
tier: full
statement_ja: |
  Galerkin span 元の複素 Schwartz 成分表示：$w\in V_n$ の各成分は複素 Schwartz 関数を代表元にもつ。span の生成元（Schwartz 発散ゼロ基底）の性質が有限線形結合に遺伝する。
proof_ja: |
  基底元は成分ごとに Schwartz 代表元を持ち、有限線形結合で Schwartz 性が保たれることを span の帰納法で確かめる。
gap:
  level: none
provenance: |
  lean-pde issue #112 PR-B（PR #133）/ #111 PR-5（PR #124）で private→public 化。
chapter: ode
