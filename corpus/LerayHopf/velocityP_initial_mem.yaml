name: LerayHopf.velocityP_initial_mem
tier: full
statement_ja: |
  初期値を打ち切ったものは $V_n$ に属する：発散ゼロ初期値 $u_0$ に対し $P_n u_0 \in V_n$。
proof_ja: |
  所属の特徴づけにおいて、打ち切る前の発散ゼロ場として $u_0$ 自身を選べば、$P_n u_0 \in V_n$ が従う。
gap:
  level: none
  note: |
    Galerkin 解の初期条件 $u_n(0) = P_n u_0$ が $V_n$ の中の条件として意味を持つことを与える。
chapter: projections-galerkin
tags: [galerkin, projections, torus]
