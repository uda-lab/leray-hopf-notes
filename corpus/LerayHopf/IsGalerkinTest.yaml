name: LerayHopf.IsGalerkinTest
tier: full
statement_ja: |
  Galerkin テスト関数の述語：発散ゼロ場 $w$ がある次数 $n$ で帯域制限されている（有限 Fourier 台を持つ）こと。
proof_ja: |
  打ち切りで不変であることを次数についての存在文として述べる定義である。
gap:
  level: none
  note: |
    発散ゼロな三角多項式の全体に相当し、発散ゼロ空間で稠密、各元は滑らか（有限 Fourier 和）。トーラス系統の弱形式はこのクラスでテストする（Faedo–Galerkin 法で用いる標準的なテスト関数のクラス）。稠密性と固定テスト連続性が全ての滑らかな発散ゼロテストへの拡張論法を支える。
chapter: capstone-torus
tags: [galerkin, test-family, torus]
