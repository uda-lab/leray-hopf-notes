name: LerayHopf.normSq_le_liminf_of_inner_tendsto
tier: full
statement_ja: |
  ノルム二乗の弱下半連続性（内積形）：$\lVert x_k \rVert \le M$ かつ

  $$\langle x_k,\ y \rangle \longrightarrow \lVert y \rVert^2$$

  ならば

  $$\lVert y \rVert^2 \le \liminf_k\, \lVert x_k \rVert^2.$$
proof_ja: |
  $y = 0$ の場合は自明。そうでない場合、内積を二乗して Cauchy–Schwarz

  $$\langle x_k,\ y \rangle^2 \le \lVert x_k \rVert^2\, \lVert y \rVert^2$$

  で抑え、両辺の liminf を比較する。左辺の liminf は収束により $(\lVert y \rVert^2)^2$、右辺は定数 $\lVert y \rVert^2$ が単調連続写像として liminf の外に出るので、$\lVert y \rVert^2 > 0$ で割って結論を得る。
gap:
  level: mild
  note: |
    liminf の順序・有界性の側条件（`IsBoundedUnder` 系）の管理が形式化の作業量。エネルギー不等式の極限移行で運動エネルギー側の下半連続性を担う。
chapter: bochner
tags: [weak-limit, toolkit, bochner]
