name: LerayHopf.Bochner.isWeakTimeDeriv_zero_ae_const
tier: full
statement_ja: |
  du Bois-Reymond 論法の中心的補題：弱時間微分が零の（局所可積分・区間可積分な）Bochner 曲線は $(0, T)$ 上 a.e. 定数である。定数は単位質量の重み $\rho$ による平均 $c = \int_0^T \rho\, u$ で与えられる。
proof_ja: |
  任意の滑らかなコンパクト台テスト $g$ に対し $\int g\, (u - c) = 0$ を示せば、開集合版の du Bois-Reymond 補題で $u - c$ が a.e. 零になる。そのために $g$ から平均を引いた $h = g - (\int g)\, \rho$ を作る：$h$ は平均零なので、その原始関数 $G$ は $C^1$ かつコンパクト台のテストになり（[[原始関数の台|LerayHopf.Bochner.primitive_baseA_props]]）、弱微分零の仮定を $G$ でテストすると $\int h\, u = 0$、すなわち $\int g\, u = (\int g)\, c$ が従う。あとは可積分性の側条件を管理して $\int g\,(u - c) = 0$ に組み替える。
gap:
  level: mild
  note: |
    「弱定数は定数」の形は mathlib の du Bois 補題が直接は与えないため、平均引き・原始関数のテスト化という古典的な変形をフルに形式化している（sorry なし）。$V'$ 値良い代表元の中心的な補題。
chapter: bochner
tags: [primitive, bochner]
