name: LerayHopf.norm_restrictToBall_mono
tier: gloss
statement_ja: |
  半径 $a\le b$ のとき、球 $B_a$ への制限のノルムは、球 $B_b$ への制限のノルムを超えない。球どうしの包含関係と、測度制限の単調性から従う。
