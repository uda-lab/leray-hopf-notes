name: LerayHopf.galerkinConvection_antisymm
tier: full
statement_ja: |
  Galerkin 移流形式のテスト部分空間上の反対称性：$u$ が発散ゼロで、$v, w$ がともに次数 $n$ の截断で固定されるならば

  $$b_n(u, v, w) = -\,b_n(u, w, v).$$
proof_ja: |
  両向きの和の合計が消えることを示す。要は添字集合の対称化：箱截断の和は $m = -(k+l)$ を制約しないので、そのままでは対合 $(k, l) \mapsto (k, -(k+l))$ で閉じない。しかし $v, w$ の帯域制限により、非零の被和項は $l$ と $-(k+l)$ がともに箱に入る対称な部分集合 $C_k$ 上にしかなく、そこでは対合が真の対合になる。$C_k$ 上で第二の向きを再添字化して合流させると、乗数の和 $l_a + (-(k+l))_a = -k_a$ が現れ、成分 $a$ の和が発散ゼロ条件

  $$\sum_a k_a\, \hat u_a(k) = 0$$

  で消える。
gap:
  level: mild
  note: |
    テスト側の帯域制限が**外せない**ことの理由（生の箱 $\times$ 箱は対合不変でない）が docstring に明記されている。energy 章の全格子版（[[Fourier 側反対称性|LerayHopf.convFormFourier_antisymm_galerkinTest]]）の有限和版で、相殺機構は同じ。形式束の反対称性フィールドの忠実な実現可能部分。
chapter: limit-passage
tags: [convection, galerkin, torus]
