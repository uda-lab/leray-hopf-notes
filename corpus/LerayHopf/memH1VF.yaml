name: LerayHopf.memH1VF
tier: full
statement_ja: |
  ベクトル場の成分ごとの $H^1$ 所属：$u \in L^2(\mathbb{T}^3; \mathbb{R}^3)$ の三つの複素埋め込み成分がすべて [[スカラー H¹ 所属|LerayHopf.memH1Torus]] を満たすこと。
proof_ja: |
  成分にわたる全称として定義する。
gap:
  level: none
  note: |
    勾配エネルギーの有限性の成分別の言い換え。加法・スカラー倍で閉じること（[[加法閉性|LerayHopf.memH1VF_add]] など）は energy 章の補題群が与える。
chapter: spaces
