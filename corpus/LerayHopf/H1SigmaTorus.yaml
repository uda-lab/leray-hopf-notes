name: LerayHopf.H1SigmaTorus
tier: full
statement_ja: |
  トーラス上の発散ゼロ $H^1$ 部分加群：発散ゼロ $L^2$ 場のうち各成分が $H^1$ に属するもの全体を、発散ゼロ $L^2$ 空間の実部分加群として構成する。
proof_ja: |
  台集合は成分ごとの $H^1$ 所属述語で定める。加法・零・スカラー倍で閉じることは、発散ゼロ部分の閉性とあわせて、それぞれ [[H¹ 所属の加法閉性|LerayHopf.memH1VF_add]]・[[零場の H¹ 所属|LerayHopf.memH1VF_zero]]・[[H¹ 所属のスカラー閉性|LerayHopf.memH1VF_smul]] を束ねて確かめる。
gap:
  level: mild
  note: |
    ℝ³ lane の対応物 `H1Sigma'`（`R3/ConvectionExtension.lean`）のトーラス版。$H^1$ 所属は Fourier 係数の重み付き二乗和の総和可能性として与えられており、Hilbert 空間としての $H^1$ 内積構造は持たせていない（本補題群の用途では所属述語で足りる）。
chapter: energy
tags: [sobolev, divergence-free, torus]
