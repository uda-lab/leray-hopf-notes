name: LerayHopf.Torus.galerkinODE_vectorField_spec
tier: full
statement_ja: |
  弱形式とベクトル場の橋渡し：すべての $u, w \in V_n$ で

  $$\langle G_n(u),\ w \rangle = -\nu\, s(u, w) - b(u, u, w).$$
proof_ja: |
  Riesz 表現の定義性質（双対同型の逆像を内積で試すと元の汎関数の値に戻る）と汎関数の展開規則を書き下すだけである。部分空間の内積と周囲空間の内積の一致を挟む。
gap:
  level: none
  note: |
    符号と $\nu$ の掛かり方は Galerkin 解データの ODE フィールド `u_ode` の規約と一致するよう選ばれている。
chapter: ode
tags: [galerkin, ode, riesz, torus]
