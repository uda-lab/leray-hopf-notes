name: LerayHopf.reLp
tier: full
statement_ja: |
  実部写像

  $$L^2(\mathbb{R}^3;\mathbb{C})\to L^2(\mathbb{R}^3;\mathbb{R}).$$

  の連続線形写像化。複素の Fourier 側で得た極限情報を実の場へ戻す橋。
proof_ja: |
  各点での実部の取り出しは連続線形で絶対値を増やさないので、$L^2$ 類の水準の連続線形写像へ持ち上がる。
