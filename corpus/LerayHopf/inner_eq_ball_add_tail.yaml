name: LerayHopf.inner_eq_ball_add_tail
tier: full
statement_ja: |
  内積の球内・球外分解：任意の $R$ と $v,w$ に対し

  $$\langle v,w\rangle = \bigl\langle v\vert_{B_R},\,w\vert_{B_R}\bigr\rangle + \bigl\langle v\vert_{B_R^c},\,w\vert_{B_R^c}\bigr\rangle.$$

  全空間の内積を球の内側と外側の寄与へ正確に分ける。
proof_ja: |
  三つの内積をそれぞれ積分表示し、球内・球外の内積の被積分関数が、制限した代表関数の a.e. 一致により、元の場の各点での内積とほとんど至る所で一致することを確かめる。あとは可積分な各点での内積の積分を球と補集合に分割する加法性である。
gap:
  level: mild
  note: |
    代表関数の a.e. 一致（`MemLp.coeFn_toLp`）の持ち回りが形式化の作業量の中心。
provenance: |
  lean-pde PR #122（issue #111 PR-3）で private→public 化・共有化された。
chapter: compactness
tags: [spatial-compactness, restrict-to-ball, r3]
