name: LerayHopf.divSymbol
tier: full
statement_ja: |
  波数 $k$ における**発散記号**。Fourier 空間での発散を与える連続な線形汎関数で、

  $$\widehat{\operatorname{div}u}(k)=\sum_{j=1}^{3} k_j\,\hat u_j(k)$$

  と定める。ここで $\hat u_j(k)$ は第 $j$ 成分の第 $k$ [[Fourier 係数|LerayHopf.mFourierCoeff3]]である。$u$ が発散ゼロであることは、すべての波数 $k$ でこの記号が消えることと同値。
proof_ja: |
  各成分 $j$ について、成分の抽出・Fourier 係数の取り出し・係数 $k_j$ 倍という 3 つの連続線形写像を合成する。これらの有限和として連続線形汎関数が得られ、Fourier 空間での発散 $\sum_j k_j\,\hat u_j(k)$ を表す。
gap:
