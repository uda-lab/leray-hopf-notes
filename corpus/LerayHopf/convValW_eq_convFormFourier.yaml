name: LerayHopf.TorusConvectionExtension.convValW_eq_convFormFourier
tier: full
statement_ja: |
  移項形式と元の形式の一致：$u$ が発散ゼロ、$v, w$ が Galerkin テスト関数ならば

  $$\operatorname{val}(u, v, w) = b_{\mathrm{Fourier}}(u, v, w)$$

  （右辺は energy 章の [[全 Fourier 移流形式|LerayHopf.convFormFourier]]）。
proof_ja: |
  両辺の被和項の差を格子点対ごとに比較する。成分 $a$ について足すと、差は共通因子と

  $$\sum_a k_a\, \hat u_a(k)$$

  の積になり（乗数の差 $l_a - (k+l)_a = -k_a$ の計算）、発散ゼロ条件で消える。両側の総和可能性のもとで成分和と総和を交換し、項別一致に帰着する。
gap:
  level: mild
  note: |
    「部分積分で微分をテストへ移しても発散ゼロなら値が変わらない」の Fourier 級数版。energy 章の反対称性と同じ相殺機構（発散和の消滅）が、こちらでは二つの定式化の同値性として現れる。
chapter: limit-passage
tags: [convection, determined-form, torus]
