name: LerayHopf.Scaffold.exists_lerayHopf_torus3_statement
tier: full
statement_ja: |
  開発初期に置かれた未証明の目標文：$\mathbb{T}^3$ 上の Leray–Hopf 解の存在を、最初期のプレースホルダ述語の水準で述べたもの。
proof_ja: |
  この宣言には証明が与えられていない。プレースホルダのフィールドが自明に充足できる段階で、暫定述語を自明に充足させても解析的な存在証明にはならないという判断が docstring に明記されており、実際の存在定理（[[トーラス存在定理|LerayHopf.exists_lerayHopf_torus3]]、kernel-only で証明済み）とは区別された、開発初期の記録として残されている。
gap:
  level: large
  note: |
    lean-pde リポジトリで唯一の恒久 `ALLOW_SORRY`。正典的な説明は lean-pde 本体の `docs/STATUS.md`（"Known scaffold caveats" 節）と本宣言の docstring 自身にある。本 corpus でも「未証明の主張」ではなく「意図的に開けてある歴史的目標文」として読むべきものである。
chapter: misc
tags: [legacy, scaffold, sorry]
