statement_ja: |
  [[固定テスト双線形形式|LerayHopf.R3.ConvectionExtension.convBLT_fixedTest]]は、固定するテスト場 $w$ について加法的である：$w+w'$ に対する形式は、$w$ に対する形式と $w'$ に対する形式の和に一致する。稠密な $H^1_\sigma$ 上での値の一致と、移流形式の第三スロットの加法性から従う。
