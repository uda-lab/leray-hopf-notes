name: LerayHopf.normSq_eq_integral_normSq
tier: full
statement_ja: |
  $L^2$ 元のノルム二乗の、各点でのノルムの二乗による積分表示：

  $$\lVert u\rVert^2 = \int \lVert u(x)\rVert^2\,dx.$$

  （一般の制限測度上の $L^2$ でも同じ形で成り立つ）。
proof_ja: |
  $L^2$ ノルムの定義を展開し、二乗可積分性で拡張実数の積分を実数の積分に落とす。
gap:
  level: none
  note: |
    旧 AubinLionsLimitPassage の prime 付きコピーは削除済み。
provenance: |
  lean-pde PR #122（issue #111 PR-3）で private→public 化・共有化された。
chapter: compactness
tags: [spatial-compactness, restrict-to-ball, r3]
