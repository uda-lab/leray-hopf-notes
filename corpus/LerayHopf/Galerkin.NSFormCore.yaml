name: LerayHopf.Galerkin.NSFormCore
tier: full
statement_ja: |
  Navier–Stokes 移流形式の領域中立な核：Galerkin 領域の発散ゼロ部分空間上の三重線形形式 $b$ で、後ろ二つの引数についての反対称性 $b(u,v,w)=-b(u,w,v)$、三つの引数それぞれの加法性・斉次性、およびテスト関数 $w$ を固定するごとの $L^2$ 有界性

  $$\lvert b(u,v,w)\rvert \le C_w\,\lVert u\rVert\,\lVert v\rVert$$

  を満たすものの束。
proof_ja: |
  これは各系統の移流形式データからの射影であって置き換えではない：$b$ が実際に $\int(u\cdot\nabla)v\cdot w$ という具体的な移流形式であることを固定する標準形への同定（Galerkin 対流との一致）は、系統側のデータに留まる。非自明性（$b\neq 0$）を直接示す独立の定理は、本リポジトリでは形式化されていない。抽象層はエネルギー法則と弱形式の組み立てに必要な代数的性質と有界性だけを要求する。
gap:
  level: mild
  note: |
    系統側の標準形への固定（`b_galerkin`）は `Torus3NSForms` / `R3NSForms` に残り、本データはその抽象化にすぎない。射影（系統から本データを作る対応）は `Torus3NSForms.core` / `R3NSForms.core`、値の一致は `core_b` 補題が固定する。
provenance: |
  非自明性に関する形式化範囲は source issue #153 の監査で明確化された。
chapter: galerkin-generic
tags: [galerkin-domain, convection]
