name: LerayHopf.Torus3NSForms_of_gap
tier: full
statement_ja: |
  単離された[[トーラス対流ギャップ|LerayHopf.TorusConvectionGap]]が与えられれば、本物の[[トーラス Navier–Stokes 形式束|LerayHopf.Torus3NSForms]]が存在する。ギャップが最小限に抱える解析的核から、形式束の全性質が導出できる。
proof_ja: |
  ギャップは対流形式が真に三重線形写像の塔で実現されることを主張する。そこから各引数についての加法性と斉次性は、線形写像の加法・スカラー則を書き下すだけで、任意の $L^2_\sigma$ 上で連続性も稠密性も使わずに従う。反対称性はギャップが持つ反対称性そのものである。

  非自明なのは滑らかテストに対する $L^2$ 有界性で、これはテスト対角上の有界性・固定テストでの連続性・Galerkin テストの稠密性から極限論法で導く。任意の二場をそれぞれ Galerkin テスト列で近似すると、各対角項では定数 $C(w)$ の評価が成り立つ。対の列は積位相で収束し、固定テストでの連続性により形式の値もノルムも極限に移るので、評価を極限に受け継がせて任意の $L^2_\sigma$ 上の有界性を得る。Galerkin 固定条件は直接受け渡す。
gap:
  level: large
  note: |
    箱截断の有界性（`galerkinConvection_bound`）はここでは使わない。その定数はレベル $n$ に依存するのに対し、必要なのは単一の定数 $C(w)$ だからである。有界性の極限移行は `le_of_tendsto_of_tendsto` による。

    ギャップは量的な形式束の内容を出来合いで手渡すわけではなく、非制限の有界性はテスト対角の有界性から固定テスト連続性と稠密性を通じて導かれる。代数的な三重線形性・反対称性のみが仮定として持たれ、これらが欠落した弱作用素の誠実な残余である。
chapter: limit-passage
tags: [convection-form, torus, gap, derivation]
