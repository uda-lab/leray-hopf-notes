statement_ja: |
  移流形式 $b(u,v,w)=\int(u\cdot\nabla)v\cdot w$ は、第三引数 $w$ について加法的である。

  $$b(u,v,w_1+w_2)=b(u,v,w_1)+b(u,v,w_2)$$
proof_ja: |
  被積分関数は第三引数について点ごとに加法的であり、積分の線形性と有限和の交換により和に分かれる。
