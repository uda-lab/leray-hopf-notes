name: LerayHopf.sum_liminf_le_liminf_sum
tier: gloss
statement_ja: |
  拡張非負実数値関数族の有限和に対する下極限の超加法性。有限集合 $s$ の各元 $a$ に対する列 $(f(a,n))_n$ について、$$\sum_{a\in s}\varliminf_n f(a,n) \le \varliminf_n \sum_{a\in s} f(a,n).$$
gap:
  level: mild
provenance: |
