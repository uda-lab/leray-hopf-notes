name: LerayHopf.L2VF_projComponentC
tier: full
statement_ja: |
  速度場の第 $j$ 成分の複素埋め込み：連続線形写像

  $$L^2(\mathbb{T}^3; \mathbb{R}^3) \longrightarrow L^2(\mathbb{T}^3; \mathbb{C}).$$

  実成分を取り出し、実から複素への埋め込みを後合成する。
proof_ja: |
  [[実成分の取り出し|LerayHopf.L2VF_projComponent]] と、実複素埋め込みの $L^2$ 水準への持ち上げの合成として定める。
gap:
  level: none
  note: |
    Fourier 係数は複素 $L^2$ 側でしか取れないため、実ベクトル場の全ての Fourier 解析はこの埋め込み成分を経由する。本 corpus で $\hat u_j(k)$ と書いたものは常に「この埋め込み成分の第 $k$ Fourier 係数」である。
chapter: spaces
tags: [function-spaces, fourier, torus]
