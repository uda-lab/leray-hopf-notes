name: LerayHopf.galerkin_test_pairing_lipschitz
tier: full
statement_ja: |
  テストとの内積の同程度 Lipschitz 連続性の評価：打ち切り次数 $m$ のテスト $w$ に対し定数 $L$ が存在し、**$m \le n$ を満たすすべての** $n$ と $0 \le s \le t$ で

  $$\bigl|\langle u_n(t), w \rangle - \langle u_n(s), w \rangle\bigr| \le L\,(t - s).$$
proof_ja: |
  内積 $t \mapsto \langle u_n(t), w \rangle$ の微分を ODE フィールドで書き下すと $-(\nu\, s(u_n, w) + b(u_n, u_n, w))$ になる（$n \ge m$ でテストが次数 $n$ の Galerkin 部分空間に属し ODE が使える）。Stokes 双線形形式の有界性（[[Stokes 双線形形式の有界性|LerayHopf.stokesTestPairing_bound_of_galerkinTest]]）と移流形式の第三引数固定の有界性、および一様球有界

  $$\lVert u_n(t) \rVert \le \lVert u_0 \rVert$$

  により、微分は $n$ にも $t$ にも依らない定数

  $$L = \nu\, C_s\, \lVert u_0 \rVert + C_b\, \lVert u_0 \rVert^2$$

  で抑えられる。凸集合上の平均値不等式（微分のノルム上界からの Lipschitz 評価）で結論を得る。
gap:
  level: mild
  note: |
    $m \le n$ の閾値は「テストの打ち切り次数を $n$ へ昇格させて初めて ODE フィールドが発火する」ことの反映で、抽出エンジン側の「ある番号以降」という入力条件に対応する（全 $n$ への強化は不可能）。移流の有界性は形式束のフィールド `b_bound` による。
chapter: compactness
tags: [compactness, lipschitz, torus]
