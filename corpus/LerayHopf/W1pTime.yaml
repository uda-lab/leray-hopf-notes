name: LerayHopf.Bochner.W1pTime
tier: full
statement_ja: |
  時間 Sobolev 所属の束：曲線 $u \in L^p(0, T; V)$ と、その $V'$ 値の弱時間微分 $u' \in L^q(0, T; V')$ の対。フィールドは、$V'$ 値の微分曲線・$u$ の Bochner の意味での $L^p$ 所属・$u'$ の $L^q$ 所属・「$u'$ が $u$ の $V'$ への像の弱時間微分である」こと。
proof_ja: |
  四つのデータと性質をフィールドに持つ構造として定める。弱微分は $u$ を $\iota$ と $H \hookrightarrow V'$ で $V'$ 値曲線と見なした上で取る。
gap:
  level: mild
  note: |
    微分を $H$ 値でなく **$V'$ 値**で持つのが Lions–Magenes の忠実な形：$H$ 値を要求すると真に強い条件になり、実際の NS の弱時間微分（$V'$ にしか期待できない）を排除しかねない。$u$ 側の所属も「スカラーノルムの有限性」でなく Bochner の意味の `MemLp`（曲線自体の a.e. 強可測性込み）である点が docstring で強調されている。
chapter: bochner
tags: [gelfand-triple, bochner]
