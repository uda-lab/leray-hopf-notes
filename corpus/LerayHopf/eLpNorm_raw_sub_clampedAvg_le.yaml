name: LerayHopf.eLpNorm_raw_sub_clampedAvg_le
tier: gloss
statement_ja: |
  球内制限した生の値とつなぎ合わせ平均との誤差の時間 $L^2$ 評価。刻み幅 $\delta>0$、$2\delta\le T$、時間方向の一様連続度 $\varepsilon\ge0$ のもとで、半径 $R$ の球へ制限した差の時間 $L^2$ ノルムは $$\|\rho_R u_n(\cdot)-\rho_R(\text{つなぎ合わせ平均})\|_{L^2(0,T)} \le \varepsilon\sqrt T$$（$\rho_R$ は球内制限）で抑えられる。球内制限が $1$-Lipschitz であることと、各時刻での誤差評価 $$\|u_n(t)-(\text{つなぎ合わせ平均})\|\le\varepsilon$$ から従う。
gap:
