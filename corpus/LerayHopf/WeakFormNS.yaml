name: LerayHopf.WeakFormNS
tier: full
statement_ja: |
  曲線 $u$ に対する**弱 Navier–Stokes 方程式**。粘性 $\nu$ のもと、時間区間 $(0,T)$ で $u$ が弱形式を満たすとは、次を要求することをいう。

  台が開区間 $(0,T)$ に含まれる $C^1$ 級の任意の時間テスト関数 $\psi$ と、テスト空間に属する任意の空間テストベクトル $w$ に対して、積分等式

  $$\int_0^T\Bigl(-\langle u(t),w\rangle\,\psi'(t)+\psi(t)\bigl(\nu\,a(u(t),w)+b(u(t),u(t),w)\bigr)\Bigr)\,dt=0$$

  が成り立つ。ここで $a$ は粘性双線形形式、$b$ は移流三線形形式である。
proof_ja: |
  時間テスト関数の台が $(0,T)$ にコンパクトに含まれるため、時間微分を部分積分で $\psi'$ 側へ移すときに現れる端点項が消え、境界項なしの弱形式が得られる。

  空間テストベクトル $w$ は所定のテスト関数クラスを走り、このクラスの取り方が弱解の意味を定める。粘性形式 $a$ と移流形式 $b$ が、それぞれ拡散項と非線形項の弱形式への寄与を与える。
gap:
  level: mild
  note: |
    自然言語の弱形式では「滑らかな発散ゼロ関数でテストする」で済むが、形式化では時間テスト関数のコンパクト台条件を明示し、端点項の消滅を台の条件から導く必要がある。空間テストクラスは散逸発展の `isTest` 述語として与えられる。
chapter: spaces
tags: [weak-formulation, abstract]
