name: LerayHopf.WeakFormNS
tier: full
statement_ja: |
  曲線 $u : \mathrm{Time} \to E.H$ に対する**弱 Navier–Stokes 方程式**。
  粘性 $\nu$、時間区間 $(0,T)$ 上で $u$ が弱形式を満たすとは、次を満たすことをいう。
  $C^1$ 級で台が開区間 $(0,T)$ に含まれる（端点項が自動的に消える）任意の時間テスト関数
  $\psi : \mathrm{Time} \to \mathbb{R}$ と、$E.\mathrm{isTest}\, w$ を満たす任意の空間テストベクトル
  $w : E.H$ に対して、積分等式
  $$\int_0^T \Bigl(-\langle u(t), w\rangle\, \psi'(t) + \psi(t)\bigl(\nu\, E.\mathrm{viscousForm}(u(t), w) + E.\mathrm{convForm}(u(t), u(t), w)\bigr)\Bigr)\,dt = 0$$
  が成り立つ。
proof_ja: |
  時間テスト関数の台が $(0,T)$ にコンパクトに含まれる条件 $\mathrm{tsupport}\,\psi \subseteq (0,T)$ により、
  部分積分で現れる端点項が消え、時間微分を $\psi'$ 側へ移した弱形式が境界項なしで書ける。
  空間テスト $w$ は $E.\mathrm{isTest}$ で指定されるクラスを走り、これが弱解の意味を決める。
gap:
  level: mild
  note: |
    自然言語の弱形式では「滑らかな発散ゼロ関数でテストする」で済むが、Lean では時間テスト関数の
    コンパクト台条件を明示し、端点項の消滅を台の条件から導く必要がある。
chapter: spaces
