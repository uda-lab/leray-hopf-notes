name: LerayHopf.convIntegralSchwartz_smul_2
tier: full
statement_ja: |
  移流形式 $b(u,v,w)=\int(u\cdot\nabla)v\cdot w$ は、微分がかかる第二引数 $v$ について実スカラー倍と可換である。

  $$b(u,c\,v,w)=c\,b(u,v,w)$$
proof_ja: |
  方向微分はスカラー倍と可換なので $c\,v$ の微分は $c$ 倍の微分に等しい。掛かったスカラーは積分の外へ括り出せるので、$c$ が全体に掛かる。
