name: LerayHopf.L2VF
tier: full
statement_ja: |
  速度場の空間 $L^2(\mathbb{T}^3; \mathbb{R}^3)$：正準測度に関する $\mathbb{R}^3$ 値 Bochner $L^2$ 空間。
proof_ja: |
  値の型を $\mathbb{R}^3$ とする $L^p$ 空間の $p = 2$ の場合として定める。ノルム付き可換群・完備性・実内積空間の構造は $L^2$ の一般論から供給される。
gap:
  level: none
  note: |
    本形式化の主舞台となる Hilbert 空間 $H$。`abbrev` なので `Lp` の全インスタンスが透過的に使える。
chapter: spaces
tags: [function-spaces, torus]
