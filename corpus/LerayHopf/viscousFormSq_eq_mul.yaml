name: LerayHopf.viscousFormSq_eq_mul
tier: full
statement_ja: |
  粘性形式の粘性係数についての斉次性：$\nu$ 重み付きの粘性形式は、重みなし（係数 $1$）の粘性形式の $\nu$ 倍に等しい。
proof_ja: |
  両辺とも定義により同じ格子級数と $\nu$ の積であり、展開して環の計算で一致する。
gap:
  level: none
  note: |
    [[粘性形式|LerayHopf.viscousFormSq]] は定義の時点で $\nu$ を級数の外に置いているので、この補題は `unfold` と `ring` で閉じる。
chapter: energy
tags: [energy, dissipation, torus]
