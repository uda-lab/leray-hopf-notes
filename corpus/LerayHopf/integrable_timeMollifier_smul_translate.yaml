name: LerayHopf.Bochner.integrable_timeMollifier_smul_translate
tier: full
statement_ja: |
  核重み付き平行移動の族の Bochner 可積分性：$h \mapsto \rho(h)\, \tau_h g$ は $L^2(\mathbb{R}; E)$ 値写像として可積分である。
proof_ja: |
  族は連続（核の連続性と平行移動の連続性の積）で、核の台の外ではスカラー因子が消えるからコンパクト台を持つ。コンパクト台の連続写像は可積分である。
gap:
  level: none
  note: |
    時間畳み込みを $L^2$ 値の Bochner 積分として定義するための前提（side condition なしで畳み込みが定義できる理由）。
chapter: bochner
tags: [time-mollification, bochner]
