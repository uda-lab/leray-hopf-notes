statement_ja: |
  各成分 $j$ について、写像 $s\mapsto\mathcal F(\pi_j u_n(s))$ は前向き時刻 $s\ge0$ 上で連続である。連続な Galerkin 近似曲線と連続線形写像 $\pi_j$、および等長写像である Fourier 変換 $\mathcal F$ との合成として得る。
