statement_ja: |
  連続線形写像は弱収束を保つ。実ノルム空間 $E,F$ と連続線形写像 $S:E\to F$ について、$g_n\rightharpoonup g$（弱収束）ならば $S g_n\rightharpoonup S g$ である。$F$ 上の任意の連続線形汎関数を $S$ で引き戻すと $E$ 上の連続線形汎関数になることから従う。
