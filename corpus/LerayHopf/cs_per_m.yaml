name: LerayHopf.TorusConvectionExtension.cs_per_m
tier: full
statement_ja: |
  シフト付き Cauchy–Schwarz：係数二乗和が総和可能な $f_U, f_V$ と任意の $m$ に対し、和

  $$\sum_{k} \lVert \hat f_U(k) \rVert\, \lVert \hat f_V(-k - m) \rVert$$

  は $f_U$ と $f_V$ の [[ℓ² 量|LerayHopf.TorusConvectionExtension.l2coeff]] の積以下である。
proof_ja: |
  シフト側の二乗総和可能性を[[シフト補題|LerayHopf.TorusConvectionExtension.summable_sq_shift]]で確保し、総和の Hölder（指数 $2, 2$）を適用する。右辺のシフト側の $\ell^2$ 量は[[シフト不変性|LerayHopf.TorusConvectionExtension.tsum_sq_shift]]で元の量に戻る。
gap:
  level: none
  note: |
    畳み込みの対角評価の一行分。指数の実数冪への橋渡し（`rpow`）が形式化の細部。
chapter: limit-passage
tags: [summability, convection, torus]
