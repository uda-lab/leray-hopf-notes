name: LerayHopf.transverse_longitudinal_cancel
tier: gloss
statement_ja: |
  $\xi\neq0$ において、横型ベクトル $\widehat u$（$\sum_j\xi_j\widehat u_j=0$）と縦型ベクトル $\widehat w$（$\widehat w\times\xi=0$）の Hermite 内積がゼロになることを述べる。横型な向きと縦型な向きは直交するという、$\mathbb C^3$ 上の線形代数の事実である。

  $$\sum_j\overline{\widehat u_j}\,\widehat w_j=0$$
