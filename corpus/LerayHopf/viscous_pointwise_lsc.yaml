name: LerayHopf.viscous_pointwise_lsc
tier: full
statement_ja: |
  粘性半ノルムの各点弱 $H^1$ 下半連続性。粘性係数 $\nu>0$、時刻 $T>0$、Galerkin 近似列とその Aubin–Lions パッケージが与えられているとする。

  このとき極限曲線の[[粘性形式|LerayHopf.viscousFormSq_R3]] $t\mapsto V_1(u(t))$ は時間についてほとんど至るところ強可測であり、ほとんどすべての時刻 $t\in[0,T]$ で極限 $u(t)$ は $H^1$ に属し、その粘性（Dirichlet）半ノルムは近似列の下極限で支配される。

  $$V_1\bigl(u(t)\bigr)\ \le\ \liminf_{n\to\infty} V_1\bigl(u_n(t)\bigr)$$
proof_ja: |
  粘性形式は次の大域的な Fourier Dirichlet 半ノルムであり、強 $L^2$ のもとで連続ではなく弱下半連続にすぎない。

  $$V_1(u)\ =\ \sum_j\int(2\pi)^2\lvert\xi\rvert^2\bigl\lvert\widehat{u_j}(\xi)\bigr\rvert^2\,d\xi$$

  証明は $H^1$ の Hilbert 空間型も逐次的 Banach–Alaoglu も凸汎関数の弱下半連続性も使わず、すべて $L^2$ の中で Fourier–Plancherel により行う。

  まずほとんどすべての時刻 $t$ で全列としての弱 $L^2$ 収束 $u_n(t)\rightharpoonup u(t)$ を得る。これは球ごとの概時刻強収束と、一様界 $\lVert u_n(t)\rVert\le\lVert u_0\rVert$ に対する球外部の $\varepsilon/3$ 評価から従う。

  次に各打ち切り $k$ について、Fourier 変換に有界乗数 $\min(\sqrt{W},k)$ を掛ける操作は連続線型写像だから弱収束を運ぶ。打ち切られた量に、内積の技法によるノルム二乗の弱下半連続性を適用する。

  $$\lVert g\rVert^2\ =\ \lim_n\langle g, g_n\rangle$$

  打ち切りの量は全 Dirichlet 被積分関数以下であり、$k$ についての単調収束で全被積分関数を回復する。成分 $j$ についての和は下極限の優加法性でとる。$u(t)\in H^1$ は、有限な荷重付き Fourier 積分から Fatou により従う。
gap:
  level: large
  note: |
    これは経路（b）のエネルギー／エネルギー類の結論の真の解析的中核で、証明済み（未証明箇所なし）である。粘性形式は連続でなく弱下半連続な大域 Fourier Dirichlet 半ノルム。全列としての弱収束は、パッケージの概時刻場（測度部分列ではない）から供給される。打ち切り量の極限への移行は有界乗数の連続線型写像（`mulBddCLM` / `fourierProjCLM`）との合成、$k$ についての回復は単調収束（`lintegral_iSup`）、成分和は非負拡張実数の下極限優加法性による。$0<\nu$ は本質的で、近似列の $H^1$ 半ノルムは粘性正則性界を通じてしか制御されないため $\nu\le 0$ では $H^1$ 所属が破れる。時間についての積分界も、これに時間 Fatou と正則性界を合わせて[[強 L² 収束下の粘性下半連続性|LerayHopf.viscous_lsc_under_strongL2]]で組み上げる。

    $$\int_0^T V_1(u)\,dt\ \le\ \tfrac12\lVert u_0\rVert^2$$

    Temam III.3／Lemarié-Rieusset §6。
chapter: limit-passage
tags: [limit-passage, viscous-form, lower-semicontinuity, plancherel]
