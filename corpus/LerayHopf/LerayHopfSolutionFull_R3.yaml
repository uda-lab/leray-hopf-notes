name: LerayHopf.LerayHopfSolutionFull_R3
tier: full
statement_ja: |
  $\mathbb{R}^3$ 上の**完全 Leray–Hopf 解**。外力なしの Navier–Stokes 方程式、有限時刻区間 $[0,T]$（$T>0$ を入力として受け取る）、$\mathbb{R}^3$ 全空間（周期性なし）という設定のもと、すべての性質を、命題のプレースホルダではなく実際の証明として保持する。

  すなわち、分離変数テスト関数 $\psi(t)w(x)$（$w$ は所定の Schwartz 発散ゼロテスト空間を走る）に対する弱 Navier–Stokes 恒等式、$[0,T]$ 上の Leray–Hopf エネルギー不等式、初期値を $t\to0^+$ の片側極限として強 $L^2$ で達成すること、そして $[0,T]$ でほとんど至る所 $H^1(\mathbb{R}^3)$ に所属し粘性散逸が区間可積分であること（エネルギー類）である。
proof_ja: |
  各性質を実際の証明として保持し、[[主定理|LerayHopf.exists_lerayHopf_r3]]が Galerkin 極限からそれらを供給して各条件を埋める。

  エネルギー類の条件は、[[粘性散逸形式|LerayHopf.viscousFormSq_R3]]が $H^1$ の外で総和・Bochner の規約により潰れてエネルギー不等式が空虚に成り立つのを防ぐために置かれる。
gap:
  level: mild
  note: |
    自然言語の「弱解 $u$」はほとんど至る所の同値類だが、形式化では具体的な代表元に点ごとの性質を課すため、エネルギー類の条件で総和規約の崩壊による空虚成立を排除し、良い代表元の存在として健全に定式化する。

    エネルギー類は a.e.-in-time の $H^1$ 所属＋散逸の区間可積分性であって、文字通りの Bochner 空間所属 $u\in L^2(0,T;H^1_\sigma(\mathbb{R}^3))$ ではない（時間可測性フィールドは $H^1$ ではなく周囲の $L^2$ 空間へ値を取る強可測性）。初期トレースは $t\to0^+$ の片側極限のみで、区間全体での弱連続性 $u\in C_w([0,T];L^2_\sigma)$ はこの構造のフィールドではない。弱形式のテスト関数が分離変数 $\psi(t)w(x)$ に限られることは定義上の選択であり、一般の時空テスト関数 $\varphi(t,x)$ を用いる標準的定式化との同値性は本形式化の範囲外（証明も仮定もしない）：[[弱形式|LerayHopf.WeakFormNS]] を参照。
chapter: capstone-r3
tags: [leray-hopf, proof-carrying, energy-class]
