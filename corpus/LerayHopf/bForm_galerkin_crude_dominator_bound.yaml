name: LerayHopf.bForm_galerkin_crude_dominator_bound
tier: gloss
statement_ja: |
  弱形式極限移行のステップ（移流項の粗い評価）：固定テスト $z$ に対する移流項 $b(u_n,u_n,z)$ を、各レベル $n$ ごとに（当該レベルの Galerkin 解を含む式で）各点で抑え、その時間積分に $n$ に依らない一様な上界を与える。各点で一様な優関数を主張するものではなく、一様可積分性を供給する粗い部品である。テストごとの $L^2$ 有界性と一様エネルギー評価の掛け合わせ。
gap:
  level: mild
provenance: |
  lean-pde PR #130（issue #114 Tier 1）で分離されたステップ。
chapter: limit-passage
tags: [limit-passage, convection, dominated-convergence, textbook-step, private-helper]
