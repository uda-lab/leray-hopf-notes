name: LerayHopf.L2VF_ext_componentC_mFourierCoeff
tier: full
statement_ja: |
  係数による外延性：二つの速度場のすべての複素埋め込み成分のすべての Fourier 係数が一致すれば、場自身が一致する。
proof_ja: |
  三段で進む。第一に、係数の一致は Hilbert 基底表現の単射性により複素成分の一致を与える。第二に、複素成分の一致から実成分の一致を出す：複素埋め込みは点別に単射なので、代表関数の a.e. 一致が実側へ落ちる。第三に、場が三つの実成分から再構成できること（成分の注入の和が恒等になること）を点別の基底展開で確かめ、成分の一致から場の一致を得る。
gap:
  level: mild
  note: |
    数学的には「Fourier 係数が場を決める」の一行だが、形式化では `Lp` の a.e. 代表の管理（`filter_upwards` の連鎖）と再構成恒等式の点別検証が作業量の大半を占める。
chapter: projections-galerkin
tags: [projections, adjoint, torus]
