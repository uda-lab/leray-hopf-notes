name: LerayHopf.L2VF_projComponent
tier: full
statement_ja: |
  速度場の第 $j$ 実成分の取り出し：連続線形写像

  $$L^2(\mathbb{T}^3; \mathbb{R}^3) \longrightarrow L^2(\mathbb{T}^3; \mathbb{R}).$$
proof_ja: |
  値の空間の第 $j$ 座標への連続線形射影を、$L^2$ 類の水準へ持ち上げて（合成作用素として）定める。
gap:
  level: none
  note: |
    点別の射影 `EuclideanSpace.proj j` の `compLpL` による持ち上げ。値の代表関数が点別の第 $j$ 成分に a.e. 一致することは、使う側が `coeFn_compLpL` で都度展開する。
chapter: spaces
tags: [function-spaces, torus]
