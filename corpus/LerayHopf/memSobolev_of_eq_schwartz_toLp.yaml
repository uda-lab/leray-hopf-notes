statement_ja: |
  $L^2$ 類 $g$ が Schwartz 関数 $\varphi$ の像に一致するなら、$g$ は緩増加超関数として Sobolev 空間 $H^1$ に属すること。[[Schwartz 成分表示からの $H^1$ 所属|LerayHopf.memH1VF_R3_of_schwartz_components]] で Schwartz 成分表示から $H^1$ 所属を得る際に使う。
