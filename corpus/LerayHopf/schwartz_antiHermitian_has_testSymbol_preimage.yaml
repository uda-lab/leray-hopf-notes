name: LerayHopf.schwartz_antiHermitian_has_testSymbol_preimage
tier: full
statement_ja: |
  反 Hermite 記号のテスト記号逆像：反 Hermite 対称な複素 Schwartz 記号は、ある実 Schwartz テストのテスト記号として実現できる。弱発散ゼロ条件を Fourier 側の横断性条件と往復させる対応の片翼。
proof_ja: |
  Fourier 逆変換で引き戻したうえで、$i$ 倍による Hermite・反 Hermite の入れ替えと Hermite 逆像補題を組み合わせる。
gap:
  level: mild
  note: |
    Fourier 逆対（`FourierInvPair`）と反転・共役規則（`fourier_ofReal_reflect_eq_conj`）の組み合わせ。
provenance: |
  lean-pde PR #126（issue #113 PR-2）で汎用解析層 `Analysis/FourierParseval.lean` へ公開移動。
chapter: limit-passage
tags: [fourier, parseval, shared-infra]
