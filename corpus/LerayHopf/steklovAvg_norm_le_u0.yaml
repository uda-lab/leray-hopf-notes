statement_ja: |
  刻み幅 $\delta>0$ と時刻 $t\ge0$ に対し、前進 Steklov 平均 $$\delta^{-1}\int_t^{t+\delta}u_n(s)\,ds$$ のノルムは初期値のノルムで一様に抑えられる：そのノルムは $\|u_0\|$ 以下である。近似段数 $n$ と時刻 $t$ に依らず一様な評価である。
