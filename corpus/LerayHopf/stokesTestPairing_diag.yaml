name: LerayHopf.Torus.stokesTestPairing_diag
tier: full
statement_ja: |
  Stokes テスト対の対角値：すべての $u$ に対し $s(u, u)$ は係数 $1$ の [[粘性形式|LerayHopf.viscousFormSq]] に等しい（収束の仮定なし）。
proof_ja: |
  各被和項で実部の恒等式

  $$\operatorname{Re}[z\, \bar z] = \lvert z \rvert^2$$

  により両者の被和項が一致するから、項別一致で両者の総和が等しい。
gap:
  level: none
  note: |
    エネルギー恒等式の導出で、テストを解自身に取ったときに Stokes 項が粘性散逸へ落ちる箇所を担う書き換え。
chapter: ode
tags: [stokes, dissipation, torus]
