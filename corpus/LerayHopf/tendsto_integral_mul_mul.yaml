name: LerayHopf.tendsto_integral_mul_mul
tier: full
statement_ja: |
  三重積の核極限補題：$a_n\to a$、$b_n\to b$（いずれも実 $L^2$）で $h$ が本質的有界ならば

  $$\int a_n\,b_n\,h \;\longrightarrow\; \int a\,b\,h.$$

  非線形項の積の極限移行で、二つの強収束因子と一つの有界係数の組を処理する中核。
proof_ja: |
  三重積の内積表示で

  $$\int a_n b_n h = \langle a_n,\ h\cdot b_n\rangle.$$

  と書き換える。乗算の列連続性で $h\cdot b_n\to h\cdot b$ が分かるから、あとは実 $L^2$ 内積の両引数についての結合連続性で極限が交換できる。
gap:
  level: mild
  note: |
    実 $L^2$ 内積の結合連続性への帰着が設計の要。
provenance: |
  lean-pde PR #126 で `Analysis/RealComplexLpBridge.lean` へ公開移動（private→public）。
chapter: energy
tags: [real-complex-bridge, shared-infra]
