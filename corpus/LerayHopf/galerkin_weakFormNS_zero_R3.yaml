name: LerayHopf.galerkin_weakFormNS_zero_R3
tier: gloss
statement_ja: |
  各 Galerkin 近似段数における弱形式 NS 方程式の恒等式。近似段数 $n$ と、その段の部分空間に属するテスト元 $w$、および $[0,T]$ の内部にコンパクト台をもつ $C^1$ 重み $\psi$ が与えられているとき、$$\int_0^T \left(-\langle u_n(t),w\rangle\,\psi'(t) + \psi(t)\bigl(\nu\, B(u_n(t),w)+b(u_n(t),u_n(t),w)\bigr)\right)dt = 0$$ が成り立つ（$B$ は Stokes 双線形形式、$b$ は移流形式）。近似解が満たす有限次元 ODE を積の微分則で時間積分し部分積分することで、境界項が $\psi$ のコンパクト台の仮定から消えることによる。
gap:
  level: mild
