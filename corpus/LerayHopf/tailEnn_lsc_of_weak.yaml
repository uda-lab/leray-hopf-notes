name: LerayHopf.tailEnn_lsc_of_weak
tier: full
statement_ja: |
  弱収束のもとでの打ち切り残差の下半連続性：列 $v_i$ がすべての $L^2$ テストとの内積で $v$ に収束するならば、拡張非負実数値の周波数箱外の Fourier 係数二乗和は

  $$\text{tail}(v) \;\le\; \liminf_{i} \text{tail}(v_i)$$

  を満たす。
proof_ja: |
  周波数箱外の Fourier 係数二乗和を、成分と箱外格子点の直積を添字集合とする一本の総和に書き直す。各係数は連続線形汎関数（実部と虚部それぞれが実連続線形汎関数）なので、弱収束から係数ごとの収束、したがって各項の収束が従う。拡張非負実数の総和を有限部分和の上限として表すと、各有限部分和は収束列の極限として liminf 以下に評価され、上限を取って結論を得る。
gap:
  level: mild
  note: |
    粘性散逸の下半連続性 `viscousEnn_lsc` と同型の Fatou の補題の議論であり、複素値汎関数を実部・虚部の実汎関数に分けて弱収束から係数ごとの収束を得ることが形式化の作業量である。
chapter: compactness
tags: [compactness, weak-convergence, torus]
