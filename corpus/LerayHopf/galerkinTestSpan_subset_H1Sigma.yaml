name: LerayHopf.galerkinTestSpan_subset_H1Sigma
tier: full
statement_ja: |
  すべての Galerkin テスト関数（ある次数の Fourier 截断で固定される発散ゼロ場）は [[発散ゼロ H¹ 部分加群|LerayHopf.H1SigmaTorus]] に属する。
proof_ja: |
  所属を発散ゼロ性と成分ごとの $H^1$ に分ける。発散ゼロ性ははじめから発散ゼロ空間の元として与えられていることによる。成分の $H^1$ は、テスト関数の Fourier 係数が截断次数の周波数箱の外で消えることから、$H^1$ 重み付き二乗和が有限和に潰れて総和可能となることで従う。
gap:
  level: none
  note: |
    係数の消滅は `coeff_zero_outside_box`、有限台の総和可能性は `summable_of_ne_finset_zero` による。
chapter: energy
tags: [sobolev, galerkin, torus]
