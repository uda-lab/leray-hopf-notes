name: LerayHopf.Torus.galerkinODE_functional
tier: full
statement_ja: |
  Galerkin ODE の右辺を定める連続線形汎関数：固定した $u \in V_n$ に対し

  $$w \longmapsto -\nu\, s(u, w) - b(u, u, w)$$

  （$s$ は [[Stokes テスト対|LerayHopf.stokesTestPairing]]、$b$ は移流形式）を $V_n$ 上の連続線形汎関数として構成する。
proof_ja: |
  $w$ についての加法性と斉次性を、Stokes テスト対の右線形性（$V_n$ の元は帯域制限されているので適用できる）と移流形式の第三引数についての線形性から確かめる。$V_n$ は有限次元なので、線形写像の連続性は自動である。
gap:
  level: none
  note: |
    発散ゼロ空間への包含 `velocitySpanToSigma` の加法性・斉次性が移流形式側の線形性を $V_n$ に引き戻す。連続化は `LinearMap.toContinuousLinearMap`（有限次元）による。
chapter: ode
tags: [galerkin, ode, torus]
