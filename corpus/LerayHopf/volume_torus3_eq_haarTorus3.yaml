name: LerayHopf.volume_torus3_eq_haarTorus3
tier: full
statement_ja: |
  $\mathbb{T}^3$ 上の標準測度と Haar 積測度 [[正準測度|LerayHopf.haarTorus3]] は一致する。
proof_ja: |
  各因子円周上で標準測度が Haar 測度の $1$ 倍（スカラー $1$ の作用）であることを既知の等式から確かめ、積測度の構成関数の合同で $3$ 因子に持ち上げる。
gap:
  level: none
  note: |
    mathlib の `AddCircle.measureSpace` は `volume` を `ofReal 1 • haarAddCircle` と定めるため、一致は定義的でなく命題的（`1 • _` の簡約が要る）。測度の取り替えが必要な場面でこの等式を経由する。
chapter: spaces
tags: [measure, torus]
