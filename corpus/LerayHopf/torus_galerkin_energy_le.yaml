name: LerayHopf.torus_galerkin_energy_le
tier: full
statement_ja: |
  Galerkin エネルギー不等式（初期値ノルム版）：次数 $n$ の Galerkin 解 $u_n$ は、すべての $t \ge 0$ で

  $$\tfrac{1}{2} \lVert u_n(t) \rVert^2 + \int_0^t \nu\, \lVert \nabla u_n(s) \rVert^2 \, ds \;\le\; \tfrac{1}{2} \lVert u_0 \rVert^2$$

  を満たす。
proof_ja: |
  [[Galerkin エネルギー恒等式|LerayHopf.torus_galerkin_energy_identity]] により左辺は $\tfrac{1}{2} \lVert P_n u_0 \rVert^2$ に等しい。Fourier 截断の非拡大性

  $$\lVert P_n u_0 \rVert \le \lVert u_0 \rVert$$

  の両辺を二乗して恒等式の右辺を抑えれば従う。
gap:
  level: mild
  note: |
    散逸の被積分関数は Fourier 側で定義された [[粘性形式|LerayHopf.viscousFormSq]] であり、$e^{2\pi i k \cdot x}$ 規約のもとで勾配エネルギー $\nu \lVert \nabla u \rVert^2$ に一致する（$(2\pi)^2$ の因子が規約を吸収する）。恒等式側は解の曲線を自分自身でテストし、移流項の対角消滅と Stokes 対の対角化、微積分学の基本定理で導かれる。
chapter: energy
tags: [energy-inequality, galerkin, torus]
