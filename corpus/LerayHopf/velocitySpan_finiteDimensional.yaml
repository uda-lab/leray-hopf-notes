name: LerayHopf.velocitySpan_finiteDimensional
tier: full
statement_ja: |
  $V_n$ の有限次元性。
proof_ja: |
  $v \mapsto$（三つの複素成分）は $V_n$ から Fourier スパンの三つ組への線形写像である：値がスパンに入ることは [[成分のスパン所属|LerayHopf.componentC_mem_fourierSpan]] が保証し、[[係数による外延性|LerayHopf.L2VF_ext_componentC_mFourierCoeff]] により単射である。値域側は有限次元（複素有限次元空間の実スカラー制限）なので、単射の存在から $V_n$ も有限次元になる。
gap:
  level: mild
  note: |
    有限次元 ODE 理論（Picard–Lindelöf、Riesz 表現）を $V_n$ 上で使うための土台。スカラー制限 `FiniteDimensional.trans ℝ ℂ` を挟むのが形式化の細部。
chapter: projections-galerkin
tags: [galerkin, projections, torus]
