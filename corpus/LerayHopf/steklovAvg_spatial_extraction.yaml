name: LerayHopf.steklovAvg_spatial_extraction
tier: gloss
statement_ja: |
  固定した刻み幅・基準時刻ごとの空間コンパクト性抽出。局所 Rellich 入力（有界集合上の前コンパクト性を保証するデータ）のもとで、刻み幅 $\delta>0$ と基準時刻 $t_0$（$[t_0,t_0+\delta]\subseteq[0,T]$）を固定すると、狭義単調な添字の部分列 $\varphi:\mathbb N\to\mathbb N$ と発散ゼロな空間極限 $g$ が存在して、任意の半径 $R$ に対し球 $\{\|x\|\le R\}$ 上での $L^2$ 誤差 $$\int_{\|x\|\le R} \left\|\left(\delta^{-1}\int_{t_0}^{t_0+\delta}u_{\varphi(n)}(s)\,ds\right)(x)-g(x)\right\|^2\,dx$$ が $n\to\infty$ で $0$ に収束する。刻み幅・基準時刻の対角化がこの単一の抽出を反復して構成される。
gap:
  level: mild
provenance: |
