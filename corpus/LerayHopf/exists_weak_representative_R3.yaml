name: LerayHopf.exists_weak_representative_R3
tier: full
statement_ja: |
  $\mathbb{R}^3$ 上の Aubin–Lions 極限に対し、**すべての時刻で弱連続な代表元** $v\colon[0,T]\to L^2_\sigma(\mathbb{R}^3)$ が存在する。

  この $v$ は次を満たす。ほとんどすべての $t\in[0,T]$ で $v(t)$ は Aubin–Lions 極限に一致する。すべての $t\in[0,T]$ と任意の方向 $z$ に対して Galerkin 列 $u_n(t)$ の内積 $\langle u_n(t),z\rangle$ が $\langle v(t),z\rangle$ へ収束する。すべての $t$ で $\lVert v(t)\rVert\le\lVert u_0\rVert$ が成り立つ。端点で $v(0)=u_0$ となる。そして各 Galerkin テスト $w$ に対し時間曲線 $t\mapsto\langle v(t),w\rangle$ は $[0,T]$ 上 Lipschitz 連続である。
proof_ja: |
  ほとんど至る所で良い時刻の集合 $S$ を、すべての自然数半径の球 $B_k$ 上での強収束 $u_n(t)\to u_\infty(t)$（$u_\infty$ は Aubin–Lions 極限）と、極限のノルムが初期値のノルムで抑えられる評価とが成り立つ時刻全体として定める。前者は Aubin–Lions パッケージの球ごとのほとんど至る所収束、後者は運動エネルギーの下半連続評価から従い、$S$ は全測度集合である。

  $S$ の点 $s$（$0\le s$）では、球ごとの収束と一様評価から[[球ごと収束による内積収束|LerayHopf.inner_tendsto_of_perball]]によって全列が $u_\infty(s)$ へ弱収束する。

  次に各 Galerkin テスト $w$ に対し、時間曲線 $t\mapsto\langle u_n(t),w\rangle$ が**すべての** $t\in[0,T]$ で Cauchy 列であることを示す。同程度 Lipschitz 連続性は[[Galerkin テストの同程度 Lipschitz 連続性の評価|LerayHopf.perTest_lipschitz_R3]]が与え、$S$ 上で稠密に弱収束が成り立つので、同程度 Lipschitz 連続性と稠密収束から Cauchy 性が全時刻へ伝播する。

  任意の方向 $z$ に対する Cauchy 性は、$z$ を発散ゼロ部分空間への直交射影 $z_\sigma$ とその直交補成分に分け、直交補成分が Galerkin 状態と直交することと Galerkin テストの稠密性（近似列 $P_m z_\sigma\to z_\sigma$）を用いて得る。

  こうして各 $t$ で内積列が収束するので、閉部分空間 $L^2_\sigma$ 内での Riesz 表現により極限 $y(t)\in L^2_\sigma$ が $\lVert y(t)\rVert\le\lVert u_0\rVert$ とともに定まる。$v(t)$ を $[0,T]$ 上では $y(t)$、外では Aubin–Lions 極限と定義する。

  弱収束の一意性から $v(t)$ は $S$ 上で Aubin–Lions 極限に一致し（ほとんど至る所の一致）、端点では $u_n(0)=P_{\varphi(n)}u_0\to u_0$ より $v(0)=u_0$ となる。時間 Lipschitz 連続性は、近似曲線の Lipschitz 評価が弱収束の極限で保存されることから従う。
gap:
  level: large
  note: |
    構成は Temam III.3 の古典的な道筋（同程度 Lipschitz 連続性＋稠密時刻での Cauchy 性＋部分空間内 Riesz 表現）に沿い、Lions–Magenes 型の時間 Sobolev 空間や弱時間微分を一切用いない。トーラスの `exists_weak_representative` の $\mathbb{R}^3$ 版であり、唯一の相違は、トーラスの $L^2$ 強部分列の代わりに球ごとの強収束 `inner_tendsto_of_perball` を用いてほとんど至る所の弱収束を得る点である。Galerkin レベルの持ち上げは `𝔊.mono_range`、$u_0$ での稠密性は `𝔊.tendsto_id` による。
chapter: limit-passage
tags: [good-representative, weak-continuity, temam, riesz]
