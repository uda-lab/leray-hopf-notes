name: LerayHopf.stepCurve_memLp
tier: full
statement_ja: |
  ステップ曲線の $L^2$ 所属：ステップ曲線は $L^2(0,T; X)$ に属する。
proof_ja: |
  値は有限個で、そのノルムの総和が一様な上界を与える。有限測度上の有界強可測関数として $L^2$ 所属が従う。
gap:
  level: none
  note: |
    強可測性は別補題 `stepCurve_stronglyMeasurable` が供給する（セルごとの定数値）。
