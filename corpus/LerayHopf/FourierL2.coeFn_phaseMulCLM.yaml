name: LerayHopf.FourierL2.coeFn_phaseMulCLM
tier: full
statement_ja: |
  位相乗数作用素の像は、ほとんどすべての周波数で変調位相との点ごとの積 $\xi\mapsto\varphi_h(\xi)\,g(\xi)$ に一致する。
proof_ja: |
  位相乗数作用素は、この積が二乗可積分であることから定まる $L^2$ 元として構成されており、その代表元は当の積をほとんど至る所で復元する。この一致により、この作用素が零作用素などではなく真の位相の掛け算であることが確かめられる。
gap:
  level: none
chapter: compactness
tags: [fourier, modulation, representative]
