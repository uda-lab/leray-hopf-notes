name: LerayHopf.memH1Torus
tier: full
statement_ja: |
  スカラー関数の $H^1(\mathbb{T}^3; \mathbb{C})$ 所属：$L^2$ 関数 $f$ が一階 Sobolev 空間に属するとは、Fourier 係数が Sobolev 重みに対して二乗総和可能であること：

  $$\sum_{k} \bigl(1 + \lvert k \rvert^2\bigr)\, \lVert \hat f(k) \rVert^2 < \infty.$$
proof_ja: |
  Fourier 特徴づけをそのまま総和可能性の述語として定義する。
gap:
  level: mild
  note: |
    mathlib にはトーラスの Sobolev 空間 API が無い（`ℝ^n` 用のみ）ため、Fourier 側の特徴づけを定義に採用した足場である。$H^1$ 内積による Hilbert 空間構造と Rellich のコンパクト埋め込みは後続マイルストーンの別モジュールが扱う。
chapter: spaces
tags: [sobolev, fourier, torus]
