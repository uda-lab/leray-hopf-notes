statement_ja: |
  前進 Steklov 平均に対する粘性（$H^1$）版 Jensen 評価。刻み幅 $\delta>0$ と時刻 $t\ge0$ に対し、平均後の状態の粘性形式は曲線の粘性形式の時間平均で抑えられる：$$V\!\left(\delta^{-1}\int_t^{t+\delta}u_n(s)\,ds\right) \le \delta^{-1}\int_t^{t+\delta}V(u_n(s))\,ds$$（$V$ は粘性形式）。粘性形式を各 Fourier 成分ごとのスペクトルエネルギーの和として表し、各成分ごとに有界重みへの打ち切りで Bochner–Jensen 型の評価を適用したのち、打ち切りを外す優収束極限をとって得る。
