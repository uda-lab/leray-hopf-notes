name: LerayHopf.Bochner.isWeakTimeDeriv_unique
tier: full
statement_ja: |
  弱時間微分の a.e. 一意性：同じ曲線 $u$ の弱時間微分 $v_1, v_2$（ともに区間可積分）は $(0, T)$ 上 a.e. で一致する。
proof_ja: |
  差 $w = v_1 - v_2$ がすべての滑らかなコンパクト台テストとの積分で消えることを、二つの部分積分恒等式の差から確かめる（積分の分離には両者の可積分性が要る）。変分法の基本補題（du Bois-Reymond、mathlib の開集合版）で $w$ が a.e. 零になる。
gap:
  level: mild
  note: |
    `CompleteSpace X` の仮定は忠実な定義域の修正：完備性がないと mathlib の Bochner 積分は $0$ に退化し、部分積分恒等式が任意の $v$ で自明に成り立ってしまう（定理本体のコメントに明記された設計判断）。
chapter: bochner
tags: [weak-time-derivative, bochner]
