name: LerayHopf.memLp_six_componentRe
tier: full
statement_ja: |
  $H^1_\sigma$ 場の複素成分の実部の $L^6$ 所属：$u$ が $H^1$ 級なら、その成分の実部は $L^6$ に属する（三次元の Sobolev 埋め込み $H^1\hookrightarrow L^6$）。
proof_ja: |
  成分の実部の値と弱勾配がともに $L^2$ に属することへ還元し、Gagliardo–Nirenberg–Sobolev 型の埋め込みで $L^6$ 所属を得る。
gap:
  level: mild
provenance: |
  lean-pde PR #126 で `Analysis/LpInterpolation.lean` へ公開移動。
chapter: energy
tags: [interpolation, sobolev, shared-infra]
