name: LerayHopf.TorusConvectionExtension.convFormL2_galerkin_pin
tier: full
statement_ja: |
  Galerkin 部分空間への pin：三つの引数がすべて次数 $n$ の截断で固定されるならば、決定移流形式は箱截断形式 [[Galerkin 移流形式|LerayHopf.galerkinConvection]] の値に一致する。
proof_ja: |
  テスト上の値の同定 → 移項形式と全格子形式の一致（[[一致|LerayHopf.TorusConvectionExtension.convValW_eq_convFormFourier]]）→ 全格子形式と箱形式の一致（[[箱への潰し|LerayHopf.TorusConvectionExtension.convFormFourier_eq_galerkin]]）の三段の書き換えである。
gap:
  level: none
  note: |
    形式束の `b_galerkin` フィールド：抽象的に構成した $b$ が有限次元の Galerkin ODE の具体的な移流と同じ値を取ることの保証。これが「$b = 0$ のような自明な実現」を排除する非空性の要。
chapter: limit-passage
tags: [determined-form, tensor, torus]
