name: LerayHopf.TorusConvectionExtension.convFormL2_galerkin_pin
tier: full
statement_ja: |
  Galerkin 部分空間上での一致：三つの引数がすべて次数 $n$ で帯域制限されているならば、決定移流形式は箱打ち切りの形式 [[Galerkin 移流形式|LerayHopf.galerkinConvection]] の値に一致する。
proof_ja: |
  テスト上の値の同定 → 部分積分形と全格子形式の一致（[[一致|LerayHopf.TorusConvectionExtension.convValW_eq_convFormFourier]]）→ 全格子形式と箱形式の一致（[[箱上の有限和との一致|LerayHopf.TorusConvectionExtension.convFormFourier_eq_galerkin]]）の三段の書き換えである。
gap:
  level: none
  note: |
    形式束の `b_galerkin` フィールド：抽象的に構成した $b$ が有限次元の Galerkin ODE の具体的な移流と同じ値を取ることの保証。この一致は $b$ を標準形へ同定するのみであり、非自明性（$b\neq 0$、すなわち「$b=0$ のような自明な実現」の排除）は本リポジトリでは独立に形式化されていない — $b\neq 0$ を直接示す具体的な定理は現行 Lean API に含まれない。
provenance: |
  非自明性に関する形式化範囲は source issue #153 の監査で明確化された。
chapter: limit-passage
tags: [determined-form, tensor, torus]
