name: LerayHopf.TorusConvectionExtension.summable_sq_shift
tier: full
statement_ja: |
  シフトした係数の二乗総和可能性：係数の二乗和が総和可能なら、格子の反転シフト $k \mapsto -k - m$ を通しても総和可能である。
proof_ja: |
  反転シフトは格子の全単射なので、総和可能性は再添字化で保たれる。
gap:
  level: none
  note: |
    畳み込み型の和の Cauchy–Schwarz（[[シフト付き CS|LerayHopf.TorusConvectionExtension.cs_per_m]]）の準備。
chapter: limit-passage
tags: [summability, convection, torus]
