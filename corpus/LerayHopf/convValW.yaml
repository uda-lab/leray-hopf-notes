name: LerayHopf.TorusConvectionExtension.convValW
tier: full
statement_ja: |
  移項移流形式：成分対の有限和と格子点対の総和で

  $$\operatorname{val}(u, v, w) := \sum_{i, a} \operatorname{Re} \sum_{k, l} (\text{移項被和項}).$$
proof_ja: |
  [[移項被和項|LerayHopf.TorusConvectionExtension.convSummandW]] の格子総和の実部を成分対にわたり足して定義する。
gap:
  level: none
  note: |
    発散ゼロの $u$ に対しては energy 章の全 Fourier 移流形式と一致する（[[両形式の一致|LerayHopf.TorusConvectionExtension.convValW_eq_convFormFourier]]）。$(u, v)$ の変数では任意の $L^2$ で定義され、連続双線形化（[[連続双線形化|LerayHopf.TorusConvectionExtension.convBLTw]]）の素材になる。
chapter: limit-passage
tags: [convection, determined-form, torus]
