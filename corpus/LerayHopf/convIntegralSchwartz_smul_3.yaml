name: LerayHopf.convIntegralSchwartz_smul_3
tier: full
statement_ja: |
  移流形式 $b(u,v,w)=\int(u\cdot\nabla)v\cdot w$ は、第三引数 $w$ について実スカラー倍と可換である。

  $$b(u,v,c\,w)=c\,b(u,v,w)$$
proof_ja: |
  被積分関数の第三引数に掛かるスカラー $c$ は積分の外へ括り出せ、有限和についても同様なので、$c$ が全体に掛かる形になる。
