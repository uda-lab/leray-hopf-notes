name: LerayHopf.TensorEdgeGluing.convFormL2_antisymm
tier: full
statement_ja: |
  決定された移流形式の反対称性：すべての $u,v,w$ に対し $b(u,v,w) = -b(u,w,v)$。エネルギー法則（対角消滅）の源泉。
proof_ja: |
  反対称化子を経由した構成から、$v\otimes w$ と $w\otimes v$ の像は符号だけ異なる。
gap:
