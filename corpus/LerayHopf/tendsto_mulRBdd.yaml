statement_ja: |
  乗算の列連続性：$c_n\to c$（$L^2$）ならば $h\cdot c_n \to h\cdot c$（$L^2$）。
proof_ja: |
  差のノルム評価

  $$\lVert h\cdot(c_n-c)\rVert\le\lVert h\rVert_\infty\lVert c_n-c\rVert.$$

  から直ちに従う。
