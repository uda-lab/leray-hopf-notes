name: LerayHopf.memLp_three_componentRe
tier: full
statement_ja: |
  $H^1_\sigma$ 場の複素成分の実部の $L^3$ 所属：$L^2$ 所属と $L^6$ 所属の補間により $L^3$ に属する。
proof_ja: |
  補間指数

  $$\tfrac13 = \tfrac{\theta}{2} + \tfrac{1-\theta}{6}.$$

  に対する $L^p$ 補間を、前二つの所属補題に適用する。
gap:
  level: none
provenance: |
  lean-pde PR #126 で `Analysis/LpInterpolation.lean` へ公開移動。
