name: LerayHopf.Torus3
tier: full
statement_ja: |
  空間領域である $3$ 次元トーラス $\mathbb{T}^3$：単位加法円周（周期 $1$ の $\mathbb{R}/\mathbb{Z}$）の三つ組の直積として実現する。
proof_ja: |
  単位加法円周の $3$ 個の直積型として定める。各因子は全測度 $1$ の Haar 測度を持ち、直積には積測度が入る。
gap:
  level: none
  note: |
    mathlib の `UnitAddTorus (Fin 3)` の略記（`abbrev`）。周期 $1$ の規約が Fourier 指数 $e^{2\pi i k \cdot x}$ の $2\pi$ 因子の出所である。
chapter: spaces
tags: [foundations, torus]
