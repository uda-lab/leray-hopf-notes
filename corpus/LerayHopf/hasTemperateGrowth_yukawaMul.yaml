statement_ja: |
  正則化スケール $a>0$ のとき、[[湯川型乗数|LerayHopf.yukawaMul]]が緩増加性をもつことを述べる。分母 $a^2+\lVert\xi\rVert^2$ は $a^2$ で下に有界な滑らかな関数であり、スケール変換を経て標準の緩増加性補題に帰着させる。
