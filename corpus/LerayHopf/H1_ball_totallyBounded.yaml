name: LerayHopf.H1_ball_totallyBounded
tier: full
statement_ja: |
  （L5）$L^2(\mathbb{T}^3;\mathbb{C})$ の元のうち、$H^1$ に属しエネルギーが $M^2$ 以下であるものの集合は、$L^2$ 位相で全有界である。

  これが、$\mathbb{T}^3$ 上の Rellich コンパクト埋め込み $H^1\hookrightarrow L^2$ の核心（有界集合の前コンパクト性）である。
proof_ja: |
  全有界性の判定条件を用い、各 $\varepsilon>0$ に対して有限の $\varepsilon$-網を構成する。まず[[一様近似|LerayHopf.H1_ball_uniform_L2_approx]]で $N$ を取り、$H^1$ 球の上で一様に $\lVert f-P_N f\rVert\le\varepsilon/2$ とする。

  射影像は有限次元部分空間内の有界集合であり、Parseval と $H^1$ 有界性から $\lVert f\rVert_{L^2}\le M$ で抑えられる。有限次元ゆえ有界閉球はコンパクトで有限の $\varepsilon/2$-網をもつので、三角不等式から $\lVert f-y\rVert\le\varepsilon$ を満たす網の点 $y$ が取れる。
gap:
  level: large
  note: |
    全有界性の証明が本補題の実体で、一様近似（L4）と有限次元射影像のコンパクト性を組み合わせる。「有限次元ならば固有空間、ゆえに局所コンパクト」という連鎖（`RCLike.properSpace_submodule`, `isCompact_closedBall` など）が非自明に効く。
chapter: compactness
tags: [rellich, totally-bounded, compact-operator]
