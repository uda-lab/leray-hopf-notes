name: LerayHopf.Bochner.GelfandTriple.ofDissipativeEvolution
tier: full
statement_ja: |
  橋渡し構成：散逸発展 $E$、明示的な Hilbert 構造を持つ正則性空間 $V$、連続線形埋め込み $\iota \colon V \to E$ のピボット空間（単射・稠密値域・ノルム二乗 $=$ 正則性汎関数の引き戻し）から、Gelfand 三つ組とその忠実性契約の証明の組を構成する。
proof_ja: |
  与えられたデータをそのままフィールドに詰めて三つ組を作り、契約の各連言（型の等しさは `rfl`、値域は線形写像の値域の集合表示、ノルムは仮定）を検証する。
gap:
  level: large
  note: |
    $V$ の Hilbert 構造を**明示的な入力**に取るのが正直さの要：支配されたセミノルム $q$（$E$ の正則性汎関数の平方根）だけからは Hilbert 構造は出ない（平行四辺形則を満たさないノルムの反例が docstring に記録されている）。返り値が契約付きの依存対（$\Sigma'$ 型）であることも重要で、裸の三つ組を返す設計では「任意の稠密埋め込みを返す」証明が通ってしまう。
chapter: bochner
tags: [gelfand-triple, bochner]
