statement_ja: |
  $j$ 番目の粘性スペクトル項の実数値（Bochner 積分）版：$$V_j(w) := \int_\xi (2\pi)^2\|\xi\|^2\,\|\mathcal F(\pi_j w)(\xi)\|^2\,d\xi \in \mathbb R,$$ 粘性形式 $V(w)=\sum_j V_j(w)$ の第 $j$ 項にあたる。
