name: LerayHopf.Bochner.timeTranslateL2
tier: full
statement_ja: |
  $L^2(\mathbb{R}; E)$ 上の時間平行移動：$\tau_h g = g(\cdot + h)$ を、測度保存写像 $t \mapsto t + h$ との合成として $L^2$ 類の水準で定める。
proof_ja: |
  平行移動が Lebesgue 測度を保つことから、mathlib の測度保存合成作用素として構成する。
gap:
  level: none
  note: |
    ℝ³ lane の空間平行移動（Fréchet–Kolmogorov 論法）の時間軸版。等長性は [[平行移動の等長性|LerayHopf.Bochner.timeTranslateL2_norm]]。
chapter: bochner
tags: [time-mollification, bochner]
