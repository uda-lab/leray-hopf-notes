name: LerayHopf.lower_bound_from_inverse_square_lifespan
tier: full
statement_ja: |
  逆二乗寿命評価からの爆発下界：$C > 0$ とし、$(-\infty, T)$ 上で正の量 $N(t)$ が寿命下界

  $$\frac{C}{N(t)^2} \le T - t$$

  を満たすならば、すべての $t < T$ で

  $$\frac{1}{N(t)} \le \sqrt{\frac{T - t}{C}}.$$
proof_ja: |
  寿命下界を分母を払って $C \le (T - t)\, N(t)^2$ と書き直し、両辺を $C\, N(t)^2$ で割って $(1/N(t))^2 \le (T-t)/C$ を得る。両辺は非負なので平方根の単調性で結論に至る。
gap:
  level: none
  note: |
    爆発レート下界の初等的な言い換え（Branch 探索期の独立補題）。主線の存在定理とは独立で、実解析の初等計算のみで閉じる。
chapter: misc
tags: [blowup, standalone]
