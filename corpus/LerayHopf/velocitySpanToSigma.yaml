name: LerayHopf.velocitySpanToSigma
tier: full
statement_ja: |
  $V_n$ から発散ゼロ空間への埋め込み：$V_n$ の元を、その発散ゼロ所属の証明とともに発散ゼロ空間の元として包み直す。
proof_ja: |
  台の元は変えず、所属証明を [[発散ゼロ所属|LerayHopf.mem_sigma_of_mem_velocitySpan]] で付け替える。
gap:
  level: none
  note: |
    移流形式（発散ゼロ空間の三引数で定義される）を $V_n$ の引数で使うための型の橋。ℝ³ lane の `galerkinSpanToSigma` の対応物。
chapter: projections-galerkin
tags: [galerkin, projections, torus]
