name: LerayHopf.velocitySpanToSigma
tier: full
statement_ja: |
  $V_n$ から発散ゼロ空間への埋め込み：包含 $V_n\subseteq L^2_\sigma$ が定める自然な埋め込み。
proof_ja: |
  元そのものは変えず、包含 $V_n\subseteq L^2_\sigma$ により発散ゼロ空間の元とみなす。
gap:
  level: none
  note: |
    移流形式（発散ゼロ空間の三引数で定義される）を $V_n$ の元に適用するための包含写像である。ℝ³ 系統の `galerkinSpanToSigma` の対応物。
chapter: projections-galerkin
tags: [galerkin, projections, torus]
