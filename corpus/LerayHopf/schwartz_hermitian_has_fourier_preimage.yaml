name: LerayHopf.schwartz_hermitian_has_fourier_preimage
tier: full
statement_ja: |
  Hermite 記号の Fourier 逆像：任意の Hermite 対称な複素 Schwartz 記号は、ある実 Schwartz 関数の複素化の Fourier 変換として得られる。実のテスト空間と Fourier 側の Hermite 記号空間の対応を与える。
proof_ja: |
  Fourier 変換の逆写像で引き戻し、Hermite 対称性が逆像の実数値性に翻訳されることを共役・反転規則で確かめる。得られた関数が実 Schwartz の複素化として実現されることを実部の取り出しで固定する。
gap:
  level: mild
provenance: |
  lean-pde PR #126（issue #113 PR-2）で汎用解析層 `Analysis/FourierParseval.lean` へ公開移動。
chapter: limit-passage
tags: [fourier, parseval, shared-infra]
