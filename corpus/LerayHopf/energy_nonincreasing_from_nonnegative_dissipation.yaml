name: LerayHopf.energy_nonincreasing_from_nonnegative_dissipation
tier: full
statement_ja: |
  エネルギー不等式が非負の粘性係数と非負の蓄積散逸のもとで成り立つならば、エネルギーは前向き時刻で単調非増加である：$0 \le s \le t$ ならば $E(t) \le E(s)$。
proof_ja: |
  不等式 $E(t) + \nu\, A(s,t) \le E(s)$ において、$\nu \ge 0$ と $A(s,t) \ge 0$ から積 $\nu\, A(s,t)$ は非負である。これを落とせば直ちに従う。
gap:
  level: none
  note: |
    線形算術（`linarith`）で閉じる一行級の帰結。エネルギーの単調性は極限移行で必要な一様評価の最も素朴な形である。
chapter: energy
tags: [energy-inequality, monotonicity]
