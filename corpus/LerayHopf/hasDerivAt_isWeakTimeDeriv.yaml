name: LerayHopf.Bochner.hasDerivAt_isWeakTimeDeriv
tier: full
statement_ja: |
  強微分は弱時間微分である：$u$ が内部の各時刻で強微分 $v(t)$ を持ち、$u, v$ が $[0, T]$ 上連続ならば、$v$ は $u$ の $(0, T)$ 上の弱時間微分である。
proof_ja: |
  Bochner 値の区間部分積分公式を $\psi$ と $u$ に適用する。テストの台が内部にあるので端点値 $\psi(0) = \psi(T) = 0$ となり境界項が消え、部分積分の等式がそのまま弱微分の定義式になる。
gap:
  level: none
  note: |
    Galerkin 曲線の強微分フィールド `u_hasDeriv` を抽象弱微分 API へ接続する入口。`CompleteSpace X` は部分積分公式（Bochner 積分）の忠実な前提。
chapter: bochner
tags: [weak-time-derivative, bochner]
