name: LerayHopf.clampedAvg_approx
tier: gloss
statement_ja: |
  生の値とつなぎ合わせ平均との一様近似評価。刻み幅 $\delta>0$、$2\delta\le T$ とし、近似曲線が $[0,T]$ 上で $|s-s'|\le\delta$ ならば $\|u_n(s)-u_n(s')\|\le\varepsilon$ という時間方向の一様連続度をみたすとき、任意の $t\in[0,T]$ でつなぎ合わせ平均との誤差が $\varepsilon$ 以下になる：$$\|u_n(t)-(\text{つなぎ合わせ平均})\|\le\varepsilon.$$ 評価は近似段数 $n$ に依らず一様である。
gap:
  level: mild
provenance: |
  Wave 4 の private gloss 機械生成テンプレートから、issue #74 第2波で手書き化。抽出元: `LerayHopf/R3/SteklovAverages.lean`。旧 gap.note は `LerayHopf/R3/AubinLionsLimitPassage.lean` を抽出元と誤記していた（issue #114 Tier 1 のファイル分割前の記録が repin 後も更新されていなかったもの；decls.json の `file` フィールドは正しく現在地を指す）。
chapter: limit-passage
