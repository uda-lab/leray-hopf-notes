name: LerayHopf.DivFreeL2
tier: full
statement_ja: |
  $L^2$ ベクトル場の発散ゼロ性の Fourier 特徴づけ：すべての波数 $k \in \mathbb{Z}^3$ で

  $$\sum_{j} k_j\, \hat u_j(k) = 0.$$
proof_ja: |
  超関数の意味の $\operatorname{div} u = 0$ を Fourier 側へ移すと波数ごとの直交条件になる。この条件を定義として採用する。
gap:
  level: mild
  note: |
    トーラス lane で整備されている橋渡しは Fourier 発散記号との同値 `divFreeL2_iff_divSymbol` と発散ゼロ空間の所属の特徴づけ `mem_L2Sigma_iff` であり、超関数的な弱発散述語との同値はこの lane では形式化されていない（ℝ³ lane の扱い）。移流反対称性（[[Fourier 側反対称性|LerayHopf.convFormFourier_antisymm_galerkinTest]]）で相殺を起こすのがまさにこの条件である。
chapter: spaces
tags: [divergence-free, fourier, torus]
