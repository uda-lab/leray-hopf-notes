name: LerayHopf.h1Leibniz2_H1test
tier: full
statement_ja: |
  $H^1$ テスト版の弱 Leibniz 則：積の弱微分公式を、テスト因子が Schwartz 関数ではなく（弱微分をもつ）$H^1$ 関数の場合に拡張したもの。未微分のテストは $L^3$ で、微分されたテストは $L^2$ で対にする。
proof_ja: |
  テスト因子を多方向同時の Schwartz 近似列で近似する。未微分側は $L^2$–$L^6$ 補間による $L^3$ 収束で $L^{3/2}$ 係数と対にし、微分側は $L^2$ 収束で対にして、Schwartz 版の弱 Leibniz 則の等式を極限移行する。右辺の対の極限は専用のステップ補題が処理する。
gap:
  level: large
  note: |
    右辺極限は `h1Leibniz2_H1test_RHS_limit`、$L^3$ 近似は `reSchwartz_L3_approx` 系による。近似列の多方向同時性（値と全方向の弱微分が同じ列で収束）が形式化の要。
provenance: |
  lean-pde PR #126 で `Analysis/WeakLeibniz.lean` へ公開移動。
chapter: energy
tags: [leibniz, weak-derivative, shared-infra]
