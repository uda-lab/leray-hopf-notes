name: LerayHopf.Torus.L2VF_norm_sq_eq_sum_componentC
tier: full
statement_ja: |
  $L^2$ ベクトル場のノルムの Pythagoras 分解：

  $$\lVert u \rVert^2 = \sum_{j} \lVert u_j \rVert^2$$

  （右辺は複素埋め込みした各成分の $L^2$ ノルム）。
proof_ja: |
  ノルム二乗を内積の積分表示に開き、各点での Euclid ノルムの二乗が成分二乗の和であることを用いる。各成分の二乗の可積分性（成分の $L^2$ 所属から）を確かめたうえで積分と有限和を交換する。複素埋め込みがノルムを変えないことは、埋め込み成分の代表関数が元の関数の各成分とほとんど至る所一致することから従う。
gap:
  level: mild
  note: |
    数学的内容は Fubini を使わない有限和の交換だけだが、形式化では「複素埋め込み成分の代表関数が元の関数の各成分とほとんど至る所一致する」ことの確認（`compLpL` の展開と `filter_upwards` の管理）が作業量の大半を占める。
chapter: ode
tags: [parseval, torus]
