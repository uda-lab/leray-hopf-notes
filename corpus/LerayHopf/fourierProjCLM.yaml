name: LerayHopf.fourierProjCLM
tier: gloss
statement_ja: |
  各成分 $j\in\{1,2,3\}$ ごとの Fourier 変換付き成分射影 $u\mapsto\mathcal F(\pi_j u)$（$\pi_j$ は第 $j$ 成分への射影）を、$L^2$ ベクトル場から複素 $L^2$ 空間への有界な実線形写像として与える。
