name: LerayHopf.Bochner.IsWeakTimeDeriv
tier: full
statement_ja: |
  区間上の弱（超関数的）時間微分：Banach 値曲線 $u, v$ に対し、$v$ が $(0, T)$ 上の $u$ の弱時間微分であるとは、台が開区間 $(0, T)$ に含まれるコンパクト台 $C^1$ スカラーテスト $\psi$ のすべてに対し

  $$\int_0^T \psi'(t)\, u(t)\, dt = -\int_0^T \psi(t)\, v(t)\, dt$$

  （Bochner 積分）が成り立つこと。
proof_ja: |
  部分積分の恒等式そのものを全称文として定義に採用する。テストが端点で（全導関数込みで）消えるため境界項は現れない。
gap:
  level: none
  note: |
    テストの台の規約（$(0, T)$ の内部）は弱 NS 方程式 `WeakFormNS` と揃えてあり、二つの超関数的定式化が境界項なしに合成できる。真の超関数微分であり、強微分ではない。
chapter: bochner
tags: [weak-time-derivative, bochner]
