name: LerayHopf.galerkin_u_norm_le
tier: full
statement_ja: |
  Galerkin 曲線の一様ノルム評価：すべての $t \ge 0$ で

  $$\lVert u_n(t) \rVert \le \lVert u_0 \rVert$$

  （右辺は $n$ に依らない）。
proof_ja: |
  エネルギー評価と Fourier 打ち切りの非拡大性を組み合わせる補助補題の言い換えである。
gap:
  level: none
  note: |
    抽出定理群が要求する形（球半径 $M = \lVert u_0 \rVert$）へのエクスポート。実体は `galerkin_norm_le_u0_aux`。
chapter: compactness
tags: [compactness, energy, torus]
