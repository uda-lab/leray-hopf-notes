name: LerayHopf.rellich_seq_compact
tier: full
statement_ja: |
  $H^1$ ノルムが一様に有界な $L^2(\mathbb{T}^3;\mathbb{C})$ の点列は、$L^2$ 収束する部分列をもつ。これは $\mathbb{T}^3$ 上のコンパクト埋め込み $H^1\hookrightarrow L^2$ の点列版（Rellich–Kondrachov）である。

  **本プロジェクトで最も難度の高い解析であり、追加公理ゼロで証明できたことが最大の成果である。**
proof_ja: |
  $H^1$ 球の[[全有界性|LerayHopf.H1_ball_totallyBounded]]から出発する。全有界集合の閉包は全有界であり、完備空間の閉集合として完備、ゆえにコンパクトである。

  各 $u_n$ はこのコンパクト集合に属するので、コンパクト集合の点列から収束部分列を取り出せる。全有界性の証明（L1–L5）が本体で、Parseval・截断残差・テイル評価・一様近似・有限次元のコンパクト性の連鎖からなる。
gap:
  level: large
  note: |
    自然言語の「Rellich でコンパクト」に対し、形式化では Parseval 等式、Fourier 截断残差＝高周波テイル、テイル評価 $\le M^2/(1+N^2)$、$H^1$ 球上の一様 $L^2$ 近似、有限次元のコンパクト性という連鎖を、それぞれ独立の補題として組む必要がある。これがプロジェクトで最も重い解析であった。
chapter: compactness
tags: [rellich, fourier-tail, compact-embedding]
