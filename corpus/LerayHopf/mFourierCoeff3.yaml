name: LerayHopf.mFourierCoeff3
tier: full
statement_ja: |
  $\mathbb{T}^3$ 上の複素数値 $L^2$ 関数 $f$ の第 $k$ **Fourier 係数** $\hat f(k)$。

  指数関数系 $e^{2\pi i k\cdot x}$ からなる Hilbert 基底の表現写像、すなわち $L^2(\mathbb{T}^3;\mathbb{C})$ から $\ell^2(\mathbb{Z}^3;\mathbb{C})$ への等長同型の第 $k$ 座標として定める。
proof_ja: |
  表現写像は等長同型なので、Parseval 等式が直ちに従う。

  $$\lVert f\rVert^2=\sum_k\bigl\lvert\hat f(k)\bigr\rvert^2$$

  本形式化では $\mathbb{T}^3$ の離散 Fourier 係数をこの形で直接扱い、[[発散記号|LerayHopf.divSymbol]]・$H^1$ エネルギー・Galerkin 射影の基盤とする。
