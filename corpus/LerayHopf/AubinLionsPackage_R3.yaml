name: LerayHopf.AubinLionsPackage_R3
tier: full
statement_ja: |
  ℝ³ での Aubin–Lions パッケージ。Galerkin 列 $\mathrm{galSeq}$（A1 由来）でパラメータ化され、抽出部分列 $\varphi$、
  その狭義単調性、極限曲線 $u$、そして**局所**時空収束を持つ。局所収束は、すべての球半径 $R$ について
  $L^2(0,T;L^2(B_R))$ での収束を主張する。
proof_ja: |
  ℝ³ では大域強 $L^2$ 収束は質量が無限遠へ逃げるため tightness なしでは偽になる。そこで収束を局所版に
  再定式化し、局所空間コンパクト性 $\mathrm{spatial\_compactness\_R3}$（局所 Rellich）が支える形にする。
  $\mathrm{b\_bound}$ の Schwartz テスト関数は急減少するので、球 $B_R$ の外側のテイルが $H^1$ 有界のもとで
  一様に制御され、極限移行が回る。A1→A2→A3 が同一列 $\mathrm{galSeq}$ 上で束ねられる。
gap:
  level: large
  note: |
    ℝ³ 固有の困難：大域 Rellich の破綻ゆえ収束は局所化される。形式化レビュー当時の公理 `aubin_lions_R3` は
    その後証明済み定理に置き換えられ、プロジェクトは公理ゼロに到達。局所収束は tightness を要さず真であり、
    Schwartz テストの減衰が裾を一様に抑えることで非線形項の極限移行を成立させる。
chapter: compactness
tags: [aubin-lions, time-compactness, local-compactness, frontier-resolved]
