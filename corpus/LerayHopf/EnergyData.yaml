name: LerayHopf.EnergyData
tier: full
statement_ja: |
  抽象エネルギー不等式のデータ：時刻の関数としての運動エネルギー $E$、区間 $[s,t]$ 上の蓄積散逸 $A(s,t)$、粘性係数 $\nu$ の三つ組。
proof_ja: |
  エネルギー不等式を主張として述べるのに必要な三つの量をフィールドとして束ねるだけの定義である。
