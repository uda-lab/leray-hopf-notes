name: LerayHopf.ConvectionGapOp
tier: full
statement_ja: |
  弱移流作用素の中核データ。[[移流欠落|LerayHopf.ConvectionGap]]から稠密性の条件を取り除いた組で、mathlib に存在しない作用素中核の五つの要素だけを担う。

  すなわち、発散ゼロ場の空間 $L^2_\sigma(\mathbb{R}^3)$ 全体の移流形式の候補 $b$、Schwartz 発散ゼロ類上での[[Schwartz 台上の移流汎関数|LerayHopf.convFormSchwartz]]との一致（拡張性）、$L^2_\sigma$ 全体での三線形性、後ろ二引数の反対称性、そして固定 Schwartz テスト $w$ に対する $(u,v)\mapsto b(u,v,w)$ の $L^2$ 同時連続性、の五つである。

  稠密性は空間の性質であって $b$ の性質ではないので、この組には含めず別に証明する。
gap:
  level: large
  note: |
    稠密性を束にしないのは、それが函数空間の性質であって移流形式の性質ではないためで、稠密性は[[稠密性補題|LerayHopf.convectionGap_schwartz_dense]]として別に証明される。プロジェクトはカーネルのみで、追加公理はない。

    固定テスト連続性は、有界双線形と連続双線形の同値により $L^2$ 評価と解析的に等価であり、固定テストでの評価はなお仮定（連続性の形で）される。真に定理内容になるのは、三線形代数（加法性・斉次性を三線形性から導く部分）と、別途証明される稠密性である。
provenance: |
  この組の存在は issue #56 で決定域構成により証明され、公理 `r3ConvectionGapOp_exists` は[[証明済み定理|LerayHopf.r3ConvectionGapOp_exists]]へ反転された。
chapter: limit-passage
