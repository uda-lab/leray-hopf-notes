name: LerayHopf.stokesTestPairing_bound_of_galerkinTest
tier: full
statement_ja: |
  Galerkin テスト関数に対する Stokes 対の有界性：$w$ が Galerkin テスト関数ならば、定数 $C$ が存在してすべての $u \in L^2$ で

  $$\lvert s(u, w) \rvert \le C\, \lVert u \rVert.$$
proof_ja: |
  $w$ の帯域制限により、[[Stokes テスト対|LerayHopf.stokesTestPairing]] の格子総和は周波数箱上の有限和に潰れる。三角不等式で項別に分け、各モードで実部の絶対値を係数ノルムの積

  $$\lVert \hat u_j(k) \rVert \cdot \lVert \hat w_j(k) \rVert$$

  で抑える。さらに $\lVert \hat u_j(k) \rVert$ を「係数汎関数の作用素ノルム × 成分射影の作用素ノルム × $\lVert u \rVert$」で抑えれば、$u$ に依らないモード別定数の有限和が $C$ になる。
gap:
  level: mild
  note: |
    $C$ はモード別の重み・作用素ノルム・$\lVert \hat w_j(k) \rVert$ の積の周波数箱上の和として明示的に構成される（最適性は問わない）。弱形式の各項が $u$ について連続汎関数であることを保証し、極限移行の土台になる。
chapter: spaces
tags: [stokes, galerkin, torus]
