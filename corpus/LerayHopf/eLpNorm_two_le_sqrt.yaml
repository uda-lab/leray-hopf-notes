name: LerayHopf.eLpNorm_two_le_sqrt
tier: gloss
statement_ja: |
  `MemLp v 2` かつ $\int\lVert v\rVert^2\le A$（$A\ge0$）なら $\lVert v\rVert_{L^2}\le\sqrt{A}$。積分の一様上界を $L^2$ ノルムの一様上界へ変換する。`gns_L6_of_memH1_R3` の最終段の一様有界性ステップで使う。
