name: LerayHopf.transverse_ae_iff
tier: gloss
statement_ja: |
  横型条件がほとんど至る所真であることと、[[横型欠損|LerayHopf.transverseDefect]]がほとんど至る所ゼロであることが同値であることを述べる。真偽値としての横型条件と、欠損の消滅という数量的な表現とを相互に読み替える橋渡しの補題である。
gap:
  level: mild
  note: |
    命題側は `IsTransverseAt … =ᵐ fun _ => True` という真理値関数の a.e. 等式で書かれており、これを `∀ᵐ ξ, transverseDefect u ξ = 0` という通常の消滅条件に読み替える、Lean 特有の bookkeeping である。
chapter: spaces
tags: [transverse, private-helper]
