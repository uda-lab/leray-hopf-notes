name: LerayHopf.BilinearExtension.eq_of_agree_dense
tier: full
statement_ja: |
  稠密一致による一意性：$E$ 上の二つの連続双線形形式が稠密部分空間 $D\times D$ 上で一致すれば、全体で一致する。移流拡張の well-definedness（構成経路に依らないこと）を保証する。
proof_ja: |
  一方の引数を固定して稠密集合上で一致する連続線形汎関数の一意性を適用し、これをもう一方の引数について繰り返す。
gap:
