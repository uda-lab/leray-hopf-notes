name: LerayHopf.torus3Evolution
tier: full
statement_ja: |
  トーラスの散逸発展の束：$\mathbb{T}^3$ の形式束から散逸発展（空間・正則性汎関数・粘性形式・移流形式・テスト級の束）を組み立てる。空間は発散ゼロ $L^2$、正則性汎関数は [[H¹ エネルギー|LerayHopf.h1EnergySq]]、粘性形式は [[Stokes テスト対|LerayHopf.stokesTestPairing]]、移流形式は形式束の $b$、テスト級は [[Galerkin テスト|LerayHopf.IsGalerkinTest]]。
proof_ja: |
  [[トーラス領域データ|LerayHopf.torusDomain]] に形式束の中核を渡す汎用構成の略記として定める。
gap:
  level: mild
  note: |
    弱形式は Galerkin テスト級でテストする形で述べられており、すべての滑らかな発散ゼロテストへの量化ではない（稠密性と固定テスト連続性が拡張論法を支える、と docstring が明記する）。この設計判断が本 lane の弱解の定式化の射程を定める。
chapter: capstone-torus
tags: [capstone, torus]
