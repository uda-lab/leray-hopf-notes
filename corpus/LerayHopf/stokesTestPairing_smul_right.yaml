name: LerayHopf.Torus.stokesTestPairing_smul_right
tier: full
statement_ja: |
  Stokes 双線形形式の右斉次性：第一引数 $u$ がある次数で帯域制限されているという仮定のもとで、実スカラー $c$ に対し $s(u,\ c\, w) = c\, s(u, w)$。
proof_ja: |
  スカラー倍の Fourier 係数は元の係数の $c$ 倍であり、実スカラーは複素共役と実部の取り出しの双方と可換なので積から括り出せる。あとは実スカラー倍は総和と交換できるので従う。
gap:
  level: none
  note: |
    補題の仮定に第一引数の帯域制限が並んでいるが、証明では使われない（スカラー倍は加法と違い総和可能性なしで総和と交換する）。加法性補題と対称な形で述べるための名残である。
chapter: ode
tags: [stokes, torus]
