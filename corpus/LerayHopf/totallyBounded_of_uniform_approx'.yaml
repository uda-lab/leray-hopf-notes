name: LerayHopf.totallyBounded_of_uniform_approx'
tier: full
statement_ja: |
  全有界性の移送：擬距離空間で、集合 $S$ が任意の $\varepsilon > 0$ に対し全有界な集合で一様 $\varepsilon$ 近似できるならば、$S$ 自身も全有界である。
proof_ja: |
  近似集合の有限 $\varepsilon/2$ ネットを取り、三角不等式で $S$ の $\varepsilon$ ネットになることを確かめる。
gap:
  level: none
  note: |
    ℝ³ lane の公開補題の意図的な複製（このファイルを ℝ³ の import から自由に保つための設計判断がファイル冒頭に記録されている）。プライム付きの名前はその複製であることの印。
chapter: bochner
tags: [step-functions, compactness, bochner]
