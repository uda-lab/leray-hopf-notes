name: LerayHopf.AbstractEnergyLaw
tier: full
statement_ja: |
  実 Hilbert 空間 $H$ 上の曲線 $u$ が満たす**抽象散逸エネルギー法則**の枠組み。曲線 $u$、散逸 $D$、反対称形式 $B$、そして内積形の ODE 法則

  $$\langle u'(t),u(t)\rangle + D(u(t)) + B(u(t),u(t),u(t)) = 0$$

  だけをもつ。
proof_ja: |
  これは抽象的な枠組みであり、有限次元近似空間・射影作用素・初期値・具体的な Galerkin 常微分方程式は一切もたない。

  真の Galerkin 構成（有限次元射影 ODE の存在、反対称性による非線形項の消去 $b(u,u,u)=0$）がこのような法則を供給する側であり、この枠組みはそうした構成が抽象エネルギー理論（エネルギー恒等式・不等式）を適用するために満たすべき仮説を束ねる。$H$ を抽象に保つため、$\mathbb{T}^3$ にも $\mathbb{R}^3$ にも無修正で効く。
gap:
  level: mild
  note: |
    自然言語の「エネルギー収支から散逸を読む」に対し、形式化では収支を述べる側（抽象的枠組み）と供給する側（具体的な Galerkin 構成）を分離し、前者は近似空間や初期値をもたない純粋な抽象法則として切り出す。
chapter: energy
tags: [energy-law, abstract]
