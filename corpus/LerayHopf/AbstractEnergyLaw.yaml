name: LerayHopf.AbstractEnergyLaw
tier: full
statement_ja: |
  実 Hilbert 空間 $H$ 上の曲線 $u : \mathbb{R} \to H$ が満たす**抽象散逸エネルギー法則**の界面構造体。
  曲線 $u$、散逸 $D : H\to\mathbb{R}$、反対称形式 $B$、スカラー収支 $\mathrm{ode\_law}$（内積形の ODE 法則
  $\langle u'(t), u(t)\rangle + D(u(t)) + B(u(t),u(t),u(t)) = 0$）だけを持つ。
proof_ja: |
  これは抽象界面であり、有限次元近似空間・射影作用素・初期値・具体的 Galerkin ODE は一切持たない。
  真の Galerkin 構成（$L^2_\sigma(\mathbb{T}^3)$ 上の有限次元射影 ODE、Picard–Lindelöf による存在、反対称性からの
  非線形消去 $b(u,u,u)=0$）がこのような法則を供給する側であり、この構造体はそうした構成が抽象エネルギー枠組み
  （エネルギー恒等式・不等式）を適用するために満たすべき仮説を束ねる。$H$ を抽象に保つため、T³ にも ℝ³ にも
  無修正で効く。
gap:
  level: mild
  note: |
    自然言語の「エネルギー収支から散逸を読む」に対し、Lean では収支を持つ側（抽象界面）と供給する側
    （具体 Galerkin 構成）を分離し、界面は近似空間や初期値を持たない純粋な抽象法則として切り出す。
chapter: energy
tags: [energy-law, abstract]
