name: LerayHopf.L2C_norm_sq_eq_tsum_coeff_sq
tier: full
statement_ja: |
  （L1）**Parseval 等式**。$f\in L^2(\mathbb{T}^3;\mathbb{C})$ の $L^2$ ノルム二乗は、Fourier 係数の二乗和に等しい。

  $$\lVert f\rVert^2=\sum_{k}\bigl\lvert\hat f(k)\bigr\rvert^2$$
proof_ja: |
  Hilbert 基底の表現写像は等長同型なので、ノルムを保つ。像は $\ell^2(\mathbb{Z}^3;\mathbb{C})$ に属し、その二乗ノルムは座標の二乗和である。座標はまさに[[Fourier 係数|LerayHopf.mFourierCoeff3]]に一致するので、等式が従う。

  この等式が、Rellich コンパクト性の出発点、すなわち「截断残差＝高周波テイル」の評価を与える。
gap:
  level: none
