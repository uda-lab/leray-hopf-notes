statement_ja: |
  エネルギー不等式のステップ（運動エネルギー項）：固定時刻 $t$ で弱収束する Galerkin 近似列に対し、弱極限の運動エネルギーはノルム二乗の弱下半連続性により近似列の運動エネルギーの下極限で抑えられる。一様 Galerkin 評価 $\lVert c_k(t)\rVert\le\lVert u_0\rVert$ が有界性を供給する。
