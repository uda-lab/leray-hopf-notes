statement_ja: |
  [[弱発散汎関数|LerayHopf.divTestFunctional]]が、Fourier 側で[[横型欠損|LerayHopf.transverseDefect]]との積分対

  $$\int\overline{\bigl(2\pi i\,\widehat\varphi(\xi)\bigr)}\,T_u(\xi)\,d\xi$$

  に等しいことを述べる。[[弱発散の成分対|LerayHopf.divComponent_eq_fourier_integral]]を三成分について足し合わせたものである。
