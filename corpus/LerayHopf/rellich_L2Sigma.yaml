name: LerayHopf.rellich_L2Sigma
tier: full
statement_ja: |
  発散ゼロ列への **Rellich コンパクト性**。列 $u_n$ が各 $n$ で発散ゼロ・$H^1$ 正則・$H^1$ エネルギーが $M^2$ 以下を満たすならば、狭義単調な抽出と極限 $g\in L^2_\sigma$ が存在して $u_{\varphi(n)}\to g$（$L^2$ 収束）となる。
proof_ja: |
  まず $H^1$ エネルギーは成分ごとの非負和なので、各成分の $H^1$ 和も $M^2$ 以下である。次に[[スカラー版の Rellich コンパクト性|LerayHopf.rellich_seq_compact]]を三成分に三段入れ子で適用し、対角部分列の上で三成分が同時に $L^2$ 収束するようにする。

  複素埋め込みの実部を通して実成分へ移し、成分の注入の連続性と成分分解の恒等式で再合成する。極限の発散ゼロ性は、$L^2_\sigma$ が閉集合であることだけから結論し、極限を明示的に再構成しない。
gap:
  level: large
  note: |
    成分分解・三段の対角化・複素と実部の往復・閉集合による極限の発散ゼロ性、と多段に展開される。各成分の可算和可能性（[[H¹ 正則性|LerayHopf.memH1VF]]）は本質的に必要で、$H^1$ エネルギーが $M^2$ 以下という条件だけからは総和規約のため和可能性が出ないため、別途仮定として渡す。
chapter: compactness
tags: [rellich, diagonal-subsequence, divergence-free]
