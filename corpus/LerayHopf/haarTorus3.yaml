name: LerayHopf.haarTorus3
tier: full
statement_ja: |
  $\mathbb{T}^3$ 上の正準測度：各因子円周の Haar 確率測度の積測度。
proof_ja: |
  単位加法円周の Haar 測度を三つ束ねた積測度として定める。全測度は $1$ である。
gap:
  level: none
  note: |
    本プロジェクトの全てのトーラス $L^2$ 空間（[[速度場の L² 空間|LerayHopf.L2VF]]・[[複素スカラー L²|LerayHopf.L2C]]）がこの測度を使う。Fourier Hilbert 基底 [[Fourier 基底|LerayHopf.torus3_mFourierBasis]] が同じ測度で定義されていることが、基底の型付けを定義的に通す設計の要。大域の `volume` とは命題的に一致する（[[volume との一致|LerayHopf.volume_torus3_eq_haarTorus3]]）。
chapter: spaces
tags: [measure, torus]
