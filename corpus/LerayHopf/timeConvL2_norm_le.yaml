name: LerayHopf.Bochner.timeConvL2_norm_le
tier: full
statement_ja: |
  全直線の Young 評価：単位質量の時間軟化子 $\rho$ に対し

  $$\lVert \rho \ast_t g \rVert \le \lVert g \rVert.$$
proof_ja: |
  Banach 空間値 Bochner 積分のノルム不等式

  $$\Bigl\lVert \int F \Bigr\rVert \le \int \lVert F \rVert$$

  を適用し、被積分関数のノルムを [[核重み付きノルム|LerayHopf.Bochner.norm_timeMollifier_smul_translate]] で $\rho(h)\, \lVert g \rVert$ に書き換え、単位質量で積分を $\lVert g \rVert$ に潰す。
gap:
  level: none
  note: |
    Young の畳み込み不等式

    $$\lVert \rho \ast g \rVert_2 \le \lVert \rho \rVert_1\, \lVert g \rVert_2$$

    の $\lVert \rho \rVert_1 = 1$ の場合のノルム内容の全体。時間軟化構築の再利用可能な土台。
chapter: bochner
tags: [time-mollification, bochner]
