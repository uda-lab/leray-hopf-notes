name: LerayHopf.R3.ConvectionExtension.norm_eq_vfOf
tier: gloss
statement_ja: |
  [[再型付けした $H^1_\sigma$|LerayHopf.R3.ConvectionExtension.H1Sigma']]上のノルムは、[[取り出したベクトル場|LerayHopf.R3.ConvectionExtension.vfOf]]のノルム（$L^2$ ノルム）に一致する。再型付けした $H^1_\sigma$ は $H^1$ 正則な元からなるが、型として保持するノルムは $L^2_\sigma$ から継承した $L^2$ ノルムであり、独立な $H^1$ ノルムではない。
