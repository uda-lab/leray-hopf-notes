name: LerayHopf.Bochner.norm_timeMollifier_smul_translate
tier: full
statement_ja: |
  核重み付き平行移動のノルム：時間軟化子 $\rho$ に対し

  $$\lVert \rho(h)\, \tau_h g \rVert = \rho(h)\, \lVert g \rVert.$$
proof_ja: |
  スカラー倍のノルム等式で $\lvert \rho(h) \rvert$ が出るが、核の非負性で絶対値が外れ、平行移動の等長性で $\lVert g \rVert$ に戻る。
gap:
  level: none
  note: |
    Young 評価の被積分関数の計算。
