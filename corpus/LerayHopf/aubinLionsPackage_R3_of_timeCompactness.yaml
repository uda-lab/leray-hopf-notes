name: LerayHopf.aubinLionsPackage_R3_of_timeCompactness
tier: full
statement_ja: |
  局所空間コンパクト性の入力から $\mathbb{R}^3$ の[[Aubin–Lions パッケージ|LerayHopf.AubinLionsPackage_R3]]を構成する。時間方向のコンパクト性は局所時空抽出が無条件に供給するので、追加の時間モジュラス仮定は要らない。得られるパッケージは、抽出された部分列 $\varphi$、その狭義単調性、極限曲線 $u$、その時間可測性、および球ごとの局所時空収束（積分形とほとんど至る所形の両方）をもつ。
proof_ja: |
  [[局所時空コンパクト性抽出|LerayHopf.galerkinSpaceTimeExtraction_R3]]から部分列 $\varphi$、時間可測な極限曲線 $u$、および各球半径でのほとんど至る所の時刻での球制限収束を取り出す。パッケージの部分列・単調性・極限曲線・時間可測性・ほとんど至る所収束の各成分はこれらから直接埋める。

  残る積分形の局所収束、すなわち各球半径 $R$ での $L^2\bigl(0,T;L^2(B_R)\bigr)$ 収束は、$L^2$ での優収束定理で得る。球制限差 $z_{\varphi(n)}(t)|_{B_R}-u(t)|_{B_R}$ はほとんど至る所の時刻で $0$ へ収束し、一様ノルム評価 $\lVert\,\cdot\,\rVert\le\lVert u_0\rVert$ が有限区間 $[0,T]$ 上の定数優関数を与える。極限が二乗可積分であること、一様可積分性、一様タイト性を確かめると、ほとんど至る所収束から時間 $L^2$ 収束が従う。
gap:
  level: large
  note: |
    `AubinLionsPackage_R3` が命題（`Prop`）ではなくデータを担う型（`Type`）なので、これは `noncomputable def`（定理ではない）であり、旧公理 `aubin_lions_R3` の形を写す。局所時空抽出は存在命題だが目標は構造体なので、証拠は `Exists.choose`／`.choose_spec`（`Classical.choice` を通す大消去）で取り出す。積分形は `eLpNorm` 形（issue #31、owner 承認）で書かれており、これは $L^2(0,T;L^2(B_R))$ の忠実な符号化で、旧来の Bochner 区間積分形（非可積分被積分関数に対し `integral_undef` でゴミの $0$ へ潰れる）を避ける。$L^2$ 優収束は `tendsto_Lp_of_tendsto_ae`、一様可積分・一様タイト性は有限測度上での定数優関数から。大域 $L^2$ 主張を含まない局所版のみ。
chapter: compactness
tags: [aubin-lions, dominated-convergence, elpnorm, local-compactness]
