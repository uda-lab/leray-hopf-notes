name: LerayHopf.steklovAvgBack
tier: gloss
statement_ja: |
  後退 Steklov 平均。区間 $[t-\delta,t]$ 上での平均 $$\delta^{-1}\int_{t-\delta}^{t} u_n(s)\,ds$$ として定める。時刻 $t$ が終端 $T$ に近く前進窓 $[t,t+\delta]$ が $[0,T]$ からはみ出す境界域を補うために導入し、定義上は基準点を $t-\delta$ にずらした前進平均に一致する。
gap:
  level: mild
provenance: |
