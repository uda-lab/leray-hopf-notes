name: LerayHopf.galerkin_limit_passage_R3
tier: full
statement_ja: |
  発散ゼロな初期値 $u_0\in L^2_\sigma(\mathbb{R}^3)$、粘性係数 $\nu>0$、時刻 $T>0$、および Galerkin 近似列とその Aubin–Lions 極限が与えられたとき、この極限の**良い代表元** $u\colon[0,T]\to L^2_\sigma(\mathbb{R}^3)$ が存在し、次の五つの性質をすべて満たす。

  第一に、$u(t)$ はほとんどすべての $t\in[0,T]$ で Aubin–Lions 極限に一致する。第二に、任意の発散ゼロテスト関数に対して弱 Navier–Stokes 恒等式が成り立つ。第三に、すべての $t\in[0,T]$ で Leray–Hopf エネルギー不等式

  $$\tfrac12\lVert u(t)\rVert^2+\int_0^t\nu\,V(u(s))\,ds\ \le\ \tfrac12\lVert u_0\rVert^2$$

  が成り立つ。第四に、$u(t)$ は $t\to0^+$ で初期値 $u_0$ を強 $L^2$ で達成する。第五に、$u$ はエネルギー類に属する、すなわちほとんどすべての $t$ で $u(t)\in H^1_\sigma$ であり粘性散逸が可積分である。

  ここで $V(w)$ は粘性散逸の二乗形式 $\nu\lVert\nabla w\rVert^2$ を表す。
proof_ja: |
  証明は四つの部品を組み上げる。

  **良い代表元の構成。** まず[[弱連続代表元の構成|LerayHopf.exists_weak_representative_R3]]により、すべての時刻で弱連続な代表元 $v$ を得る。これは各 $t\in[0,T]$ で Galerkin 列 $u_n(t)$ が $v(t)$ へ弱収束し、一様ノルム評価 $\lVert v(t)\rVert\le\lVert u_0\rVert$、端点条件 $v(0)=u_0$、および各 Galerkin テストに対する時間 Lipschitz 連続性をもつ。

  **弱形式の移行。** Aubin–Lions 極限に対する[[弱形式の極限移行|LerayHopf.weakFormNS_limit_passage]]を、代表元 $v$ がほとんどすべての $t$ で極限に一致することを使って $v$ へ移す。テスト関数との時間積分はほとんど至る所一致する被積分関数どうしの積分なので値が変わらない。

  **エネルギー類の移行。** [[強 $L^2$ 収束下の粘性下半連続性|LerayHopf.viscous_lsc_under_strongL2]]から極限のほとんどすべての $t$ での $H^1$ 所属と粘性形式の可積分性を得て、これをほとんど至る所の一致で $v$ へ移す。

  **エネルギー不等式。** すべての $t$ での不等式は次の三つを合わせて得る。運動エネルギー項には弱収束の下でのノルムの下半連続性を用いる。

  $$\lVert v(t)\rVert^2\ \le\ \liminf_n\lVert u_n(t)\rVert^2$$

  粘性項には各点下半連続性と Fatou の補題を用いる。

  $$\int_0^t V(v)\ \le\ \liminf_n\int_0^t V(u_n)$$

  最後に近似列ごとに厳密なエネルギー恒等式

  $$\tfrac12\lVert u_n(t)\rVert^2+\int_0^t\nu\,V(u_n)=\tfrac12\lVert u_n(0)\rVert^2$$

  が成り立つので、下極限の優加法性と $\lVert u_n(0)\rVert\le\lVert u_0\rVert$ から不等式が閉じる。

  **初期トレース。** [[強初期トレース|LerayHopf.strong_trace_of_props_R3]]が代表元の弱連続性・一様ノルム評価・端点条件から強 $L^2$ 収束を与える。

  以上を五つの結論として束ねる。
gap:
  level: large
  note: |
    反転の鍵は二つの補助命題である。ひとつは $H^1$ グラフ位相でのテスト近似性 `R3TestApproxH1`（仮定 `htest`）で、これは具体的な Schwartz–Galerkin 基底に対して `nonempty_schwartzGalerkinBasis_H1` として証明された。もうひとつは湯川型正則化による curl 近似であり、これらが弱形式の非線形項の極限移行を閉じる。

    自然言語の「弱解」はほとんど至る所の同値類だが、形式化では良い代表元に点ごとの性質を課すため、エネルギー類の条件で総和・Bochner 規約による空虚成立（$H^1$ の外で粘性形式が潰れる）を排除している。全 $t$ のエネルギー不等式は下極限の優加法性補題 `le_liminf_add` を軸に組む。
provenance: |
  この命題は形式化レビュー当時は最後のプロジェクト公理 `galerkin_limit_passage_R3`（AX-3）だったが、公理除去キャンペーン（PR #95–#99）で証明済み定理へ反転され、これにより $\mathbb{R}^3$ 主定理はカーネルのみ（追加公理ゼロ）で閉じた。
