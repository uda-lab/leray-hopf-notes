name: LerayHopf.galerkin_curves_equicontinuous
tier: gloss
statement_ja: |
  生の Galerkin 近似曲線の時間方向の同程度連続性。時間コンパクト性入力（近似列の時間方向の一様連続度を与えるデータ）が与えられているとき、任意の $\varepsilon>0$ に対しある $\delta>0$ が存在して、すべての近似段数 $n$ と $[0,T]$ 内の任意の $s,t$（$|s-t|<\delta$）に対し $\|u_n(s)-u_n(t)\|<\varepsilon$ が成り立つ。近似段数について一様な、Arzelà–Ascoli 型のコンパクト性抽出に用いる同程度連続性の仮定である。
gap:
  level: mild
provenance: |
