name: LerayHopf.isClosed_L2Sigma
tier: full
statement_ja: |
  発散ゼロ空間の閉性：発散ゼロ空間は $L^2$ ベクトル場の空間の閉集合である。
proof_ja: |
  発散ゼロ空間は連続線形汎関数（発散記号）の核の共通部分であり、連続写像の核は閉、閉集合の共通部分は閉である。
gap:
  level: none
  note: |
    完備性（したがって直交射影の存在）の前提。発散記号を連続線形汎関数として実装したことの直接の配当である。
chapter: projections-galerkin
tags: [leray-projection, divergence-free, torus]
