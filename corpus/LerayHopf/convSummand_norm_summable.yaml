name: LerayHopf.convSummand_norm_summable
tier: full
statement_ja: |
  $H^1$／Galerkin テスト領域での被和項のノルム総和可能性：$u$ は $L^2$ 場、$v$ は成分ごとに $H^1$（微分が当たる中央の引数）、$w$ は Galerkin テスト関数（有限 Fourier 台）とする。このとき固定した成分対ごとに、[[移流被和項|LerayHopf.convSummand]] のノルムは格子点対全体で総和可能である。
proof_ja: |
  被和項のノルムは因子ごとに分解され

  $$\lVert \hat u_a(k) \rVert \cdot 2\pi\, \lvert l_a \rvert\, \lVert \hat v_i(l) \rVert \cdot \lVert \hat w_i(-(k+l)) \rVert$$

  となる。前二因子に相加相乗平均を当てて

  $$\lVert \hat u_a(k) \rVert \cdot \lvert l_a \rvert\, \lVert \hat v_i(l) \rVert \le \tfrac{1}{2} \bigl( \lVert \hat u_a(k) \rVert^2 + l_a^2\, \lVert \hat v_i(l) \rVert^2 \bigr)$$

  と抑え、優関数を二つの項に分ける。第一項は格子点対の全単射 $(k, l) \mapsto (k, -(k+l))$ で反対角を独立変数に変えると、$\hat u$ の二乗和（Parseval による二乗総和可能性）と $\hat w$ のノルム和（有限台だから自明に総和可能）の積に帰着する。第二項は $(k, l) \mapsto (l, -(k+l))$ で変数変換し、因子 $l_a^2 \lVert \hat v(l) \rVert^2$ を $v$ の $H^1$ 所属が与える重み付き二乗和で項別に抑えてから、同じく $\hat w$ のノルム和との積を作る。最後に優級数判定でノルムの総和可能性を得る。
gap:
  level: mild
  note: |
    三つの因子がどれも単に $L^2$ では足りず、$w$ の有限 Fourier 台と $v$ の $H^1$ が本質的に使われる（docstring はこれを $\ell^2 \cdot \ell^2 \cdot \ell^1$ 型の積と要約する）。二つの再添字化は格子点対の全単射（`Equiv`）として明示的に構成され `Equiv.summable_iff` で運ばれる。相加相乗平均と最終評価の数値部分は `nlinarith` による。
chapter: energy
tags: [convection, fourier, summability, torus]
