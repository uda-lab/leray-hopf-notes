name: LerayHopf.EnergyInequality
tier: full
statement_ja: |
  抽象エネルギー不等式の述語：エネルギーデータ $(E, A, \nu)$ に対し

  $$\forall\, s, t,\quad 0 \le s \le t \;\Longrightarrow\; E(t) + \nu\, A(s,t) \le E(s).$$
proof_ja: |
  主張そのものを全称文として書き下した定義である。
gap:
