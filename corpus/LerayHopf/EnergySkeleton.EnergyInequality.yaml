  note: |
    `LerayHopf/EnergySkeleton.lean` の抽象層。この述語の具体的な実現は [[抽象エネルギー則からのエネルギー不等式|LerayHopf.abstract_galerkin_satisfies_EnergyInequality]] が与える。
