name: LerayHopf.convIntegralSchwartz
tier: full
statement_ja: |
  Schwartz ベクトル場に対する真の**移流積分** $\int(u\cdot\nabla)v\cdot w$。成分ごとに

  $$\int(u\cdot\nabla)v\cdot w=\sum_{i}\sum_{a}\int (u_a)\,(\partial_a v_i)\,(w_i)\,dx$$

  と定める。ここで各因子は Schwartz 関数の点ごとの値、$\partial_a v_i$ は偏微分、積分は Bochner 積分である。
proof_ja: |
  各成分 $i$ と方向 $a$ について、点ごとの積の積分をとって和をとる。Schwartz 関数の積は可積分なので Bochner 積分は有限値を返す（一般に可積分でない被積分関数に対しては $0$ を返す）。

  移流形式を反対称性と三線形性だけで抽象化すると、$b:=0$ もすべての条件を満たしてしまう。この場合、抽象化された定理は元の移流項を持つ Navier–Stokes 系だけでなく、$b\equiv 0$ とした退化系（例えば Stokes 方程式に相当する系）にも同様に適用されることになり、主張の対象が曖昧になる。そこで移流形式をこの具体的な積分（標準形）へ同定する。ただし、この同定が実際に $b\neq 0$ を意味することを直接示す独立の定理は、本リポジトリでは形式化されていない。したがって、現行 Lean API が直接保証するのは具体的な積分への同定までである。
gap:
  level: mild
  note: |
    自然言語の $\int(u\cdot\nabla)v\cdot w$ を、Schwartz 場の点ごとの値・偏微分作用素・Bochner 積分の明示的な組で表す。抽象化した反対称性・三線形性だけでは $b=0$ が全条件を満たしてしまうため、この具体的な積分への同定（標準形へのピン留め）で過大主張を避ける — ただし $b\neq 0$（非退化性）を直接示す独立の定理は、現行 Lean API に含まれない。また $\mathbb{R}^3$ では素朴な Fourier 二重積分が総和規約のもとで $0$ になる恐れがある。
provenance: |
  非自明性に関する形式化範囲は source issue #153 の監査で明確化された。
chapter: limit-passage
tags: [convection-form, schwartz, non-degeneracy]
