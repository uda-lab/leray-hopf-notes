name: LerayHopf.LerayHopfSolutionFull
tier: full
statement_ja: |
  $\mathbb{T}^3$ 上の**完全 Leray–Hopf 解**。外力なしの Navier–Stokes 方程式、有限時刻区間 $[0,T]$（$T>0$ を入力として受け取る）、単位トーラス $\mathbb{T}^3=(\mathbb{R}/\mathbb{Z})^3$（Haar 確率測度）という設定のもと、弱形式・エネルギー不等式・初期トレース・エネルギー類という 4 つの性質を、実際の証明として保持する。

  すなわち、分離変数テスト関数 $\psi(t)w(x)$（$w$ は所定の発散ゼロテスト空間を走る）に対する弱 Navier–Stokes 恒等式、$[0,T]$ 上でのエネルギー不等式、初期値を $t\to0^+$ の片側極限として強 $L^2$ で達成すること、そして解が Leray–Hopf エネルギー類（$[0,T]$ でほとんど至る所 $H^1$ 正則、かつ粘性散逸が区間可積分）に属することである。
proof_ja: |
  各性質を実際の証明として保持し、[[主定理|LerayHopf.exists_lerayHopf_torus3]]が Galerkin 極限からそれらを供給する。

  エネルギー類の条件は、粘性散逸が $H^1$ の外で総和規約により潰れてエネルギー不等式が空虚に成り立つのを防ぎ、解が真に Leray–Hopf エネルギー類に属することを保証する。
gap:
  level: mild
  note: |
    弱解をほとんど至る所の同値類ではなく具体的な曲線として扱うため、点ごとの性質が代表元の問題に触れる。エネルギー類の条件で総和規約の崩壊による空虚成立を排除し、良い代表元の存在として健全に定式化する。素朴な足場（`Basic.lean` の命題フィールド版）とは対照的に、この構造は実際の証明義務を保持する。

    エネルギー類は a.e.-in-time の $H^1$ 所属＋散逸の区間可積分性であって、文字通りの Bochner 空間所属 $u\in L^2(0,T;H^1_\sigma)$ ではない（時間可測性フィールドは $H^1$ ではなく周囲の $L^2$ 空間へ値を取る強可測性）。初期トレースは $t\to0^+$ の片側極限のみで、区間全体での弱連続性 $u\in C_w([0,T];L^2_\sigma)$ はこの構造のフィールドではない。弱形式のテスト関数が分離変数 $\psi(t)w(x)$ に限られることは定義上の選択であり、一般の時空テスト関数 $\varphi(t,x)$ を用いる標準的定式化との同値性は本形式化の範囲外（証明も仮定もしない）：[[弱形式|LerayHopf.WeakFormNS]] を参照。
