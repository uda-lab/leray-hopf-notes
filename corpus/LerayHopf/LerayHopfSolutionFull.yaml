name: LerayHopf.LerayHopfSolutionFull
tier: full
statement_ja: |
  $\mathbb{T}^3$ 上の**完全 Leray–Hopf 解**。弱形式・エネルギー不等式・初期トレース・エネルギー類という 4 つの性質を、実際の証明として保持する。

  すなわち、任意のテスト関数に対する弱 Navier–Stokes 恒等式、$t\ge0$ でのエネルギー不等式、初期値を強 $L^2$ で達成すること、そして解が Leray–Hopf エネルギー類（$[0,T]$ でほとんど至る所 $H^1$ 正則、ゆえに $u\in L^2(0,T;H^1_\sigma)$）に属することである。
proof_ja: |
  各性質を実際の証明として保持し、[[主定理|LerayHopf.exists_lerayHopf_torus3_axiomatic]]が Galerkin 極限からそれらを供給する。

  エネルギー類の条件は、粘性散逸が $H^1$ の外で総和規約により潰れてエネルギー不等式が空虚に成り立つのを防ぎ、解が真に Leray–Hopf エネルギー類に属することを保証する。
gap:
  level: mild
  note: |
    弱解を概至る所の同値類ではなく具体的な曲線として扱うため、点ごとの性質が代表元の問題に触れる。エネルギー類の条件で総和規約の崩壊による空虚成立を排除し、良い代表元の存在として健全に定式化する。素朴な足場（`Basic.lean` の命題フィールド版）とは対照的に、この構造は実際の証明義務を保持する。
chapter: capstone-torus
tags: [leray-hopf, proof-carrying, energy-class]
