name: LerayHopf.ballLimits_are_consistent
tier: full
statement_ja: |
  すべての自然数半径で同時収束する部分列に対し、各半径 $k$ で得られた球ごとの極限は互いに整合的である。すなわち小さい半径 $j\le k$ 上でそれらはほとんど至るところ一致する。

  したがって単一の大域的な二乗可積分関数 $g_0$ が存在して、各半径の球ごとの極限は $B_k$ 上で $g_0$ にほとんど至るところ一致する。
proof_ja: |
  半径 $k$ 上の極限と半径 $j\ (\le k)$ 上の極限は、どちらも同じ部分列の[[球への制限|LerayHopf.restrictToBall]]の $L^2$ 極限であり、$B_k$ から $B_j$ への制限は連続である。よって両者は $B_j$ 上でほとんど至るところ一致する。

  この整合性から球ごとの極限を貼り合わせて単一の大域関数 $g_0$ を定め、球の増大列上で有限なノルムをもつことから二乗可積分性を得る。
gap:
  level: mild
  note: |
    球間の整合性は $L^2$ 極限の一意性（ほとんど至るところ）と制限の連続性による。貼り合わせた大域極限が二乗可積分であること（`MemLp`）を確認したうえで、単一の $g_0$ を組み立てる。
chapter: compactness
tags: [spatial-compactness, limit]
