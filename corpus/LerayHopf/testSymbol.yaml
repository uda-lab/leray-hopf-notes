name: LerayHopf.testSymbol
tier: full
statement_ja: |
  弱発散対の Fourier テスト記号：実 Schwartz テスト $\varphi$ に対し

  $$\sigma_\varphi(\xi) = \overline{\,2\pi i\;\widehat{\varphi_{\mathbb{C}}}(\xi)\,}$$

  で定まる複素関数 $\sigma_\varphi$（$\varphi_{\mathbb{C}}$ は複素化）。$\varphi$ を実 Schwartz 全体で走らせたとき、これが弱発散条件の Fourier 側で横断欠損と対にできるテスト記号の族のすべてである。
proof_ja: |
  複素化・Fourier 変換・$2\pi i$ 倍・複素共役の合成として構成する。係数 $2\pi i$ は微分の Fourier 記号に由来し、共役は内積の第二引数側に置くための規約である。
gap:
  level: mild
  note: |
    $2\pi i$ 因子と共役が記号の対称類（Hermite か反 Hermite か）を決めるため、隣接する反 Hermite 逆像補題 `schwartz_antiHermitian_has_testSymbol_preimage` はこの正確な形に依存する。
provenance: |
  lean-pde PR #126 で `Analysis/FourierParseval.lean` へ公開移動。
chapter: limit-passage
tags: [fourier, weak-divergence, shared-infra]
