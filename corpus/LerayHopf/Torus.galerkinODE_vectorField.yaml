name: LerayHopf.Torus.galerkinODE_vectorField
tier: full
statement_ja: |
  有限次元 Galerkin ベクトル場 $G_n$：[[Galerkin ODE 汎関数|LerayHopf.Torus.galerkinODE_functional]] の Riesz 表現元として $G_n(u) \in V_n$ を定める。
proof_ja: |
  有限次元実内積空間の双対同型（Riesz 表現）の逆写像を汎関数に適用して構成する。
gap:
  level: none
  note: |
    これにより弱形式（すべての $w \in V_n$ に対する等式）が単一のベクトル値 ODE $c' = G_n(c)$ に変わり、mathlib の ODE 理論（Picard–Lindelöf）が適用可能になる。
chapter: ode
tags: [galerkin, ode, riesz, torus]
