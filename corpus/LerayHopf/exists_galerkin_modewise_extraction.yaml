name: LerayHopf.exists_galerkin_modewise_extraction
tier: full
statement_ja: |
  モードごとの一様収束抽出：可算テスト族 $(w_m)$ に対し、単一の狭義単調な部分列 $\varphi$ と極限関数族 $g_m$ が存在して、すべての $m$ で

  $$t \longmapsto \langle u_{\varphi(n)}(t),\ w_m \rangle \quad\text{が}\quad [0, T] \text{ 上 } g_m \text{ に一様収束する}.$$
proof_ja: |
  各テストに対し、Galerkin テスト性を保証する打ち切り次数・共通の Lipschitz 定数（[[同程度 Lipschitz 連続性の評価|LerayHopf.galerkin_test_pairing_lipschitz]]）・一様上界

  $$\lVert u_0 \rVert \cdot \lVert w_m \rVert$$

  （Cauchy–Schwarz と [[一様球有界|LerayHopf.galerkin_u_norm_le]]）を用意し、Lipschitz 族に対する一様部分列抽出の汎用エンジン（Arzelà–Ascoli の対角線論法版 `exists_uniform_subseq_of_lipschitz_family`）へ渡す。得られた各 $m$ の極限を選択公理で一本の関数族に束ねる。
gap:
  level: mild
  note: |
    Aubin–Lions 論法の「時間方向の等連続性からの抽出」を担う段。抽出は全テストに共通の単一の $\varphi$ である（対角線論法）ことが下流（極限曲線の構成）で本質的に使われる。
chapter: compactness
tags: [compactness, aubin-lions, torus]
