name: LerayHopf.exists_lerayHopf_r3
tier: full
statement_ja: |
  発散ゼロな初期値 $u_0\in L^2_\sigma(\mathbb{R}^3)$、粘性係数 $\nu>0$、時刻 $T>0$ に対して、外力なしの $\mathbb{R}^3$ 上の Navier–Stokes 方程式は $[0,T]$ 上に Leray–Hopf 弱解をもつ（$\mathbb{R}^3$ は周期性のない全空間であり、$T$ は入力として与えられる有限時刻区間の右端点である）。

  すなわち、$[0,T]$ 上でエネルギー不等式

  $$\tfrac12\lVert u(t)\rVert_{L^2}^2+\nu\int_0^t\lVert\nabla u\rVert_{L^2}^2\,ds\ \le\ \tfrac12\lVert u_0\rVert_{L^2}^2$$

  を満たし、かつ分離変数テスト関数 $\psi(t)w(x)$（$w$ は所定の Schwartz 発散ゼロテスト空間を走る）に対して弱形式を満たす曲線 $u$ が存在する。この解は初期値 $u_0$ を $t\to0^+$ の片側極限として強 $L^2$ で達成し、$[0,T]$ でほとんど至る所 $H^1$ に所属し粘性散逸が区間可積分な[[完全 Leray–Hopf 解|LerayHopf.LerayHopfSolutionFull_R3]]として得られる。
proof_ja: |
  **L1（Galerkin 近似）** 発散ゼロな Schwartz 関数が張る有限次元部分空間の上で Galerkin 常微分方程式を解き、近似列 $u_n$ を構成する。ここでは有限次元の存在定理のみを用い、追加の仮定を要しない[[Galerkin 解の構成|LerayHopf.galerkinSolutionData_unconditional]]がこれを供給する。

  **L2（一様評価）** エネルギー恒等式から、近似列 $u_n$ が $L^\infty_t L^2_x\cap L^2_t H^1_x$ で一様に有界であることを導く。

  **L3（コンパクト性）** 局所的な Rellich コンパクト性（[[局所空間コンパクト性|LerayHopf.spatial_compactness_R3]]）と時間方向の Aubin–Lions 型の議論を合わせ、$u_n$ の部分列が局所 $L^2$ で強収束するものを取り出す。

  **L4（非線形項の極限移行）** 強収束を用いて移流項の極限移行を正当化し、極限 $u$ が弱形式を満たすことを確かめる。

  **L5（エネルギー不等式）** ノルムの弱下半連続性からエネルギー不等式を極限に受け継がせ、すべての条件を満たす解を得る。
gap:
  level: large
  note: |
    自然言語では「Galerkin 近似してコンパクト性で極限を取る」の一行だが、形式化では有限次元 ODE の存在・前進評価・射影の実数値性・局所コンパクト性・非線形項の三線形評価・極限移行へと展開される。

    非有界領域 $\mathbb{R}^3$ では大域 Rellich が破綻するため、コンパクト性を局所化し、Schwartz テスト関数の急減少で裾を一様に抑えて極限移行を成立させる点が有界領域との違いである。証拠となるスキームは具体的な `schemeOfBasis B`（`r3GalerkinScheme_exists` から取ると基底を捨てて per-scheme の ODE 公理を再導入するため用いない）。この $\mathbb{R}^3$ 主定理は現在カーネルのみで閉じている（追加公理ゼロ）。
provenance: |
  旧名の `axiomatic` 接尾辞は歴史的なもので、lean-pde PR #117 で retire され現行名 `exists_lerayHopf_r3` になった。
chapter: capstone-r3
tags: [leray-hopf, capstone]
