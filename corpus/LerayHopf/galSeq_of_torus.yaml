name: LerayHopf.galSeq_of_torus
tier: full
statement_ja: |
  公理なしの具体的 Galerkin 列：$\nu > 0$ のもとで、各次数 $n$ の Galerkin 解データの族を無条件に供給する。
proof_ja: |
  各 $n$ で、証明済みの有限次元 ODE 求解（前向き大域解の存在 [[前向き大域解|LerayHopf.Torus.forwardGlobalSolution_exists]] に基づく `galerkinSolutionData_torus`）を呼ぶだけである。
gap:
  level: none
  note: |
    かつての公理 `galerkin_ode_solution`（A1）の完全な置き換え（issue #24）。型は同じで公理依存はゼロ。
