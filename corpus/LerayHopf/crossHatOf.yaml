name: LerayHopf.crossHatOf
tier: gloss
statement_ja: |
  複素 Schwartz 場の族 $\widehat w$ の三成分に対し、外積の第 $k$ 成分を Schwartz 場として構成したもの。添字は $3$ を法とする巡回で読む。

  $$(\xi\times\widehat w)_k=\xi_{k+1}\,\widehat w_{k+2}-\xi_{k+2}\,\widehat w_{k+1}$$
