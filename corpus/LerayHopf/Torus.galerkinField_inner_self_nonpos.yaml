name: LerayHopf.Torus.galerkinField_inner_self_nonpos
tier: full
statement_ja: |
  Galerkin 場の点別散逸性：$\nu > 0$ のとき、すべての $v \in V_n$ で

  $$\langle v,\ G_n(v) \rangle \le 0.$$
proof_ja: |
  汎用枠組みの散逸性定理へ委譲する。内実は次の計算である：場の定義から

  $$\langle v,\ G_n(v) \rangle = -\nu\, s(v, v) - b(v, v, v).$$

  移流項は対角消滅 $b(v,v,v) = 0$ で消え、[[Stokes 対角|LerayHopf.Torus.stokesTestPairing_diag]] により $s(v,v)$ は粘性形式（非負）に等しいから、全体は非正である。
gap:
  level: none
  note: |
    散逸的な場の前向きノルム単調性（[[散逸場のノルム評価|LerayHopf.Galerkin.norm_le_of_forwardSolution_of_dissipative]]）の仮定を充たす鍵。移流の対角消滅は形式束 `Torus3NSForms` のフィールド `b_self_zero` による。
chapter: ode
tags: [galerkin, dissipation, torus]
