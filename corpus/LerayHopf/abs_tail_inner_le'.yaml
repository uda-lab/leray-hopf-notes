statement_ja: |
  球外部分同士の内積に対する Cauchy–Schwarz 評価（第 2 変数はもとのノルムのままでよい）。半径 $R$ の球の外側への制限を $v\mapsto\tau_R v$ と書くとき、$$|\langle \tau_R v,\tau_R w\rangle| \le \|\tau_R v\|\cdot\|w\|.$$
