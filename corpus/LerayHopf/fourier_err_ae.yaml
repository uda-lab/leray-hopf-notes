name: LerayHopf.fourier_err_ae
tier: gloss
statement_ja: |
  正則化された渦度と目標場 $w$ の差の第 $j$ 成分を Fourier 変換したものが、ほとんど至る所次の式に一致することを述べる。[[正則化された渦度の Fourier 変換|LerayHopf.fourier_curl_potOf_ae]]から $\widehat w_j$ を引いて整理したもの。

  $$\widehat{(\operatorname{curl}\psi_a-w)}_j(\xi)=-\frac{a^2}{a^2+\lVert\xi\rVert^2}\,\widehat w_j(\xi)$$
