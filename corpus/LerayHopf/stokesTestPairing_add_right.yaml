name: LerayHopf.Torus.stokesTestPairing_add_right
tier: full
statement_ja: |
  Stokes 双線形形式の右加法性（帯域制限された第一引数のもとで）：$u$ がある次数 $n$ で帯域制限されているならば

  $$s(u,\ w + w') = s(u, w) + s(u, w').$$
proof_ja: |
  被和項はどれも因子 $\hat u_j(k)$ を持つので、$u$ の帯域制限により各成分の格子総和は周波数箱の中に台を持ち、有限台ゆえ総和可能である。したがって二つの総和を総和可能な族の和として一つにまとめられ、あとは Fourier 係数の加法性と実部の加法性で被和項が項別に分配される。
gap:
  level: mild
  note: |
    tsum の加法性は総和可能性を要するため、この補題は無条件では述べられず、帯域制限の仮定がジャンク値規約の落とし穴を塞いでいる。台の評価は `coeff_zero_outside_box` による。
chapter: ode
tags: [stokes, torus]
