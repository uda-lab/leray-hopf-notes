name: LerayHopf.Bochner.GelfandTriple.IsOfDissipativeEvolution
tier: full
statement_ja: |
  忠実性条件：Gelfand 三つ組が、与えられた散逸発展 $E$ と正則性部分空間から本当に切り出されたものであることを述べる述語。ピボットが $E$ の空間そのもの（Hilbert 構造込み）であること、埋め込みの値域が指定した部分空間に一致すること、$V$ ノルムの二乗が $E$ の正則性汎関数の引き戻しに一致すること、の連言。
proof_ja: |
  ピボット空間と Hilbert 空間構造の一致、値域の集合等式、ノルムの等式を存在文と連言で束ねる。
gap:
  level: large
  note: |
    裸の三つ組は匿名の稠密埋め込みにすぎず、$E$ と無関係でもよい — この条件が「どの三つ組か」を固定する。型の等しさ `GT.H = E.H` に沿った `cast` と構造インスタンスの `HEq` という、Lean の依存型特有の言い回しが本質的に必要な箇所（数学的内容は「同じ空間・同じ構造」の一言）。
chapter: bochner
tags: [gelfand-triple, bochner]
