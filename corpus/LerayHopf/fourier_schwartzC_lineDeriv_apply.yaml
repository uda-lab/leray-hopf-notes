name: LerayHopf.fourier_schwartzC_lineDeriv_apply
tier: full
statement_ja: |
  複素化した方向微分の Fourier 記号：実 Schwartz 関数 $f$ と方向 $m$ に対し、$\partial_m f$ の複素化の Fourier 変換は各点で

  $$2\pi i\,\langle\xi,m\rangle\,\widehat{f}(\xi).$$

  である。
proof_ja: |
  方向微分の Fourier 変換規則を、複素化と方向微分の交換補題を経由して適用する。
gap:
