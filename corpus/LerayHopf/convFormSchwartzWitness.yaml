name: LerayHopf.convFormSchwartzWitness
tier: full
statement_ja: |
  発散ゼロ場 $u,v,w\in L^2_\sigma(\mathbb{R}^3)$ の明示的な Schwartz 成分表示 $\psi_u,\psi_v,\psi_w$ が与えられたとき、移流の値 $\int(u\cdot\nabla)v\cdot w$ を、これらの成分表示に対する真の[[移流積分|LerayHopf.convIntegralSchwartz]]そのものとして定める。

  すなわち成分ごとに

  $$\int(u\cdot\nabla)v\cdot w=\sum_{i}\sum_{a}\int (\psi_u)_a\,\bigl(\partial_a(\psi_v)_i\bigr)\,(\psi_w)_i\,dx$$

  である。これは場 $u,v,w$ への依存を、その成分表示を通して記録するだけの薄い包みであり、成分表示の選び方を商で消した真の場のレベルの[[移流汎関数|LerayHopf.convFormSchwartz]]は次段で構成される。
gap:
  level: mild
  note: |
    形式化では成分表示の選び方に依存した値としてまず定義し、次段の well-定義性で選択を消す。`IsSchwartzDivFree_R3` は正準な表示ではなく「ある」表示を与えるだけなので、この二段構えが必要になる。
chapter: limit-passage
tags: [convection-form, schwartz]
