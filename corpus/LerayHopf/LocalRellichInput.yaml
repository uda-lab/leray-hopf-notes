name: LerayHopf.LocalRellichInput
tier: full
statement_ja: |
  孤立させた解析的フロンティア。次の局所的なコンパクト埋め込みを主張する。

  $$H^1(B_R)\ \hookrightarrow\hookrightarrow\ L^2(B_R)$$

  すなわち任意の半径 $R$ と任意の一様界 $M$ に対し、$L^2$・$H^1$ 有界な発散ゼロ族を球 $B_R$ へ制限した像は $L^2(B_R)$ のあるコンパクト部分集合に含まれる。

  これは無条件の局所 Rellich 定理（Leray 1934、Lemarié-Rieusset §6）である。
gap:
  level: large
  note: |
    現在の mathlib には Rellich・コンパクト埋め込み・Fréchet–Kolmogorov のいずれも無いため、これは証明可能でない孤立フロンティアとして仮定する。ただし本形式化では[[Fréchet–Kolmogorov 判定条件からの局所 Rellich|LerayHopf.localRellichInput_of_frechetKolmogorov]]により、この入力を証明済みの Fréchet–Kolmogorov 鎖から供給する。密輸なしの原則により、この仮定は球ごとかつ単一の $L^2(B_R)$ 内の集合の前コンパクト性のみを述べ、部分列・極限・球間の整合性・発散ゼロ性のいずれも与えない。それらはすべて下流で公理を用いずに導かれる。
chapter: compactness
tags: [spatial-compactness, rellich, frontier]
