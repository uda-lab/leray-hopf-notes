name: LerayHopf.TorusConvectionExtension.convFormL2_antisymm
tier: full
statement_ja: |
  決定移流形式の反対称性：**すべての** $u, v, w \in L^2_\sigma$ で $b(u, v, w) = -\,b(u, w, v)$。
proof_ja: |
  決定拡張が反対称化子を組み込んで構成されているため、汎用層の反対称性定理の特殊化で従う。
gap:
  level: mild
  note: |
    制限なしの反対称性が**構成で**手に入るのが決定形式の設計上の配当（有限箱の形式ではテスト側の帯域制限が要った）。エネルギー不等式の移流項の対角消滅 $b(u, u, u) = 0$ はこの反対称性の帰結。
chapter: limit-passage
tags: [determined-form, tensor, torus]
