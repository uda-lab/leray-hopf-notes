name: LerayHopf.FourierL2.viscousFormSq_R3_eq_integral_normSq_fourier
tier: full
statement_ja: |
  粘性係数 $1$ での[[粘性形式の二乗|LerayHopf.viscousFormSq_R3]]は、各成分の Fourier 変換にスペクトル荷重をかけた積分の総和に等しい。

  $$V(w)=\sum_{j=1}^{3}\int(2\pi)^2\lVert\xi\rVert^2\,\bigl\lVert\widehat{w_j}(\xi)\bigr\rVert^2\,d\xi$$
proof_ja: |
  粘性形式の二乗は定義そのものがこのスペクトル積分の総和であり、粘性係数 $1$ を代入して整理すれば主張の右辺と一致する。
gap:
