name: LerayHopf.Bochner.exists_unitMass_weight
tier: full
statement_ja: |
  単位質量の重みの存在：$T > 0$ に対し、連続で、$(0, T)$ の内部の閉区間に台を持ち、全積分 $1$ のスカラー関数 $\rho$ が存在する。
proof_ja: |
  中心 $T/2$、外半径 $T/4$ の正規化バンプ関数を取る。台は $[T/4,\ 3T/4] \subset (0, T)$ に収まり、正規化により全積分は $1$ である。
gap:
  level: none
  note: |
    du Bois-Reymond の要石で「a.e. 定数の値」を汲み出す基準の重み。
