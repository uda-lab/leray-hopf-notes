name: LerayHopf.galerkinSpan_le_sigma
tier: full
statement_ja: |
  先頭部分空間 [[先頭部分空間|LerayHopf.galerkinSpan]] $V_n$ は発散ゼロ部分空間 [[発散ゼロ部分空間|LerayHopf.L2Sigma_R3]] に含まれる。
proof_ja: |
  各生成元である基底ベクトルは発散ゼロであり、発散ゼロ部分空間は部分空間だから、その線型包も発散ゼロ部分空間に収まる。
gap:
  level: none
  note: |
    これは埋め込み $V_n\hookrightarrow L^2_\sigma$ の土台となる部分空間包含であり、$V_n$ の元を移流形式 $b$ の定義域へ引き上げるときに使われる。
chapter: ode
tags: [galerkin-approximation, divergence-free]
