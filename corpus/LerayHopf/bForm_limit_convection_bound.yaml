name: LerayHopf.bForm_limit_convection_bound
tier: gloss
statement_ja: |
  極限曲線に対する移流汎関数の可積分性と一様評価。粘性係数 $\nu>0$、$T>0$ のもとで得られる極限曲線 $u$ について、$z$ に依らない定数 $K\ge0$ が存在して、任意の Schwartz かつ発散ゼロなテスト元 $z$ に対し写像 $t\mapsto b(u(t),u(t),z)$ は $[0,T]$ 上可積分であり、$$\int_0^T |b(u(t),u(t),z)|\,dt \le K\sqrt{V(z)}$$ をみたす（$V$ は粘性形式）。[[Aubin–Lions パッケージの構成|LerayHopf.aubinLionsPackage_R3_of_timeCompactness]] が与える極限曲線に対して、移流項の弱形式極限移行に必要な評価を与える。
gap:
  level: mild
provenance: |
  Wave 4 の private gloss 機械生成テンプレートから、issue #74 第2波（AubinLionsLimitPassage.lean クラスタ）で手書き化。抽出元: `LerayHopf/R3/AubinLionsLimitPassage.lean`。
chapter: limit-passage
tags: [private-helper, aubin-lions]
