name: LerayHopf.Bochner.timeConvL2
tier: full
statement_ja: |
  時間畳み込みの $L^2$ 元としての定義：

  $$\rho \ast_t g := \int_{\mathbb{R}} \rho(h)\, \tau_h g \, dh$$

  （右辺は $L^2(\mathbb{R}; E)$ 値の Bochner 積分）。
proof_ja: |
  核重み付き平行移動の族の Bochner 積分として直接定める。族の可積分性（[[可積分性|LerayHopf.Bochner.integrable_timeMollifier_smul_translate]]）により追加の側条件なしで定義できる。
gap:
  level: none
  note: |
    点別の畳み込み積分でなく「$L^2$ 元に値を取る積分」として定義するのが設計の要：ノルム評価が Banach 空間でのノルム不等式（積分のノルムはノルムの積分以下）に直結する。ℝ³ lane の空間版 `FrechetKolmogorov.convL2` の時間軸鏡像。
chapter: bochner
tags: [time-mollification, bochner]
