name: LerayHopf.exists_galerkin_test_family
tier: full
statement_ja: |
  可算な Galerkin テスト族の存在：列 $w \colon \mathbb{N} \to L^2_\sigma$ であって、各項が Galerkin テスト関数であり、かつ任意の次数 $N$ の Galerkin 部分空間 $V_N$ がある有限部分族の張る空間に含まれるものが存在する。
proof_ja: |
  各 $V_N$ は有限次元なので有限な生成系を選べる。自然数の対の枚挙（対関数）で「次数 $N$ とその生成系の第 $i$ 元」の全体を自然数で添字付けられた一つの列として番号付けする（各有限生成系を番号付けし、その番号の範囲外では零を対応させる）。各値は自分の次数の Fourier 打ち切りで不変なので Galerkin テスト関数であり、$V_N$ の生成元はすべて添字対 $(N, i)$ の位置に現れるから、張る空間の単調性で $V_N$ が有限部分族の張る空間に含まれる。
gap:
  level: mild
  note: |
    弱形式を可算個のテストで検証すれば足りることを保証する対角線論法の準備。平坦化は `Nat.pair`／`unpair` と、リストの部分取得の既定値（零ベクトル）で処理される。零埋めが許されるのは零が全ての部分空間に属するためである。
chapter: spaces
tags: [galerkin, test-family, torus]
