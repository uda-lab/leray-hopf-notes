name: LerayHopf.norm_le_liminf_of_weak
tier: gloss
statement_ja: |
  完備な実内積空間 $E$ において、有界列 $(g_n)$（$\|g_n\|\le M$）が $g$ に弱収束するならば、ノルムは下半連続である：$\|g\|\le\varliminf_n\|g_n\|$。弱極限との内積を Riesz 表現で取り出し Cauchy–Schwarz を適用して得る。
