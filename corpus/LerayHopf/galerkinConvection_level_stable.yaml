name: LerayHopf.galerkinConvection_level_stable
tier: full
statement_ja: |
  水準安定性（対称形）：$u, v$ が二つの水準 $m, n$ の両方で固定されるならば、どちらの水準の値も一致する。
proof_ja: |
  両者を共通の水準 $\max(m, n)$ の値に[[単調ステップ|LerayHopf.galerkinConvection_level_step]]で持ち上げて比較する。
gap:
  level: none
  note: |
    「どの箱で切っても同じ」という整合性が、形式束の `b_galerkin` フィールド（すべての水準で pin する）の well-posedness を与える。
chapter: limit-passage
tags: [convection, galerkin, torus]
