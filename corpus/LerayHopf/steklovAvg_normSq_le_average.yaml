tier: gloss
statement_ja: |
  前進 Steklov 平均に対する $L^2$ 版 Jensen 評価（自乗ノルム形）。刻み幅 $\delta>0$、時刻 $t\ge0$ に対し $$\left\|\delta^{-1}\int_t^{t+\delta}u_n(s)\,ds\right\|^2 \le \delta^{-1}\int_t^{t+\delta}\|u_n(s)\|^2\,ds$$ が成り立つ。連続な Galerkin 近似曲線に対する Bochner 平均の Jensen 不等式の運動エネルギー（$H=L^2$）版であり、粘性・$H^1$ 版の対応する評価も同じ枠組みで証明される。
gap:
  level: mild
provenance: |
