name: LerayHopf.Bochner.IsWeakTimeDerivℝ
tier: full
statement_ja: |
  全直線の弱時間微分：区間の制約なしに、コンパクト台 $C^1$ テストのすべてに対し

  $$\int_{\mathbb{R}} \psi'(t)\, u(t)\, dt = -\int_{\mathbb{R}} \psi(t)\, v(t)\, dt$$

  が成り立つこと。
proof_ja: |
  全域の Bochner 積分（テストのコンパクト台により収束）で部分積分の恒等式を述べる。
gap:
  level: mild
  note: |
    区間版 [[弱時間微分|LerayHopf.Bochner.IsWeakTimeDeriv]] より真に強い述語。導入の動機は畳み込みとの整合性：テストを $s$ だけ平行移動しても全直線のコンパクト台テストのままなので、区間版で生じる「シフトしたテストが区間の外へ出る」障害（Fubini 障害）が解消される。
chapter: bochner
tags: [weak-time-derivative, bochner]
