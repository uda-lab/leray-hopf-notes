name: LerayHopf.L2Sigma_R3
tier: full
statement_ja: |
  $\mathbb{R}^3$ 上の発散ゼロな二乗可積分ベクトル場のなす閉部分空間 $L^2_\sigma(\mathbb{R}^3)$。

  各 Schwartz 関数 $\varphi$ に対する[[弱発散テスト汎関数|LerayHopf.divTestFunctional]]の核を、すべての $\varphi$ について交わした共通核として定める。
proof_ja: |
  $\mathbb{R}^3$ では Fourier 級数の離散添字がなく、Fourier 変換の点ごとの値による条件 $\xi\cdot\hat u(\xi)=0$ は同値類の代表元の問題に触れるため採らない。代わりに超関数の意味での弱発散を用いる。発散が弱い意味で消えることは、すべてのテスト関数 $\varphi$ について弱発散テスト汎関数が消えることと同値である。

  各テスト汎関数は連続線形汎関数だからその核は閉であり、閉集合の共通部分として $L^2_\sigma(\mathbb{R}^3)$ は閉部分空間になる。$\mathbb{T}^3$ の「核の共通部分」という型がそのまま流用でき、Leray 射影も同時に得られる。
gap:
  level: mild
  note: |
    $\mathbb{T}^3$ の離散 Fourier 発散に対し、$\mathbb{R}^3$ では点ごとの Fourier 値が代表元の問題を生むため採れない。Schwartz テストによる弱発散へ切り替えることで閉性と Leray 射影を確保する、非有界領域に固有の設計である。符号の違いは「$=0$」という条件には影響しない。
chapter: spaces
tags: [function-space, divergence-free, schwartz]
