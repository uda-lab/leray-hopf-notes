name: LerayHopf.Torus.summable_norm_mFourierCoeff3_sq
tier: full
statement_ja: |
  任意のスカラー $L^2$ 関数の Fourier 係数のノルム二乗は格子全体で総和可能である。
proof_ja: |
  Fourier 指数系は $L^2(\mathbb{T}^3)$ の Hilbert 基底なので、係数列は $\ell^2$ に属する。$\ell^2$ 所属の定義がノルム二乗の総和可能性そのものであり、あとは指数の表記の書き換えだけである。
gap:
  level: none
  note: |
    完全修飾名が変わらないよう名前空間は旧位置の `Torus` のまま維持されている。
provenance: |
  lean-pde PR #124（issue #111 PR-5）で `GalerkinODESolve.lean` から `GalerkinProjection.lean` へ移設（ODE に関する結果へ依存せずに到達できるようにするため）。
chapter: ode
tags: [parseval, fourier, torus]
