name: LerayHopf.galerkinODE_bilinearPart
tier: full
statement_ja: |
  Galerkin ベクトル場 [[Galerkin ベクトル場|LerayHopf.galerkinODE_vectorField]] の二次部分。有限次元 $V_n$ 上の連続双線型写像 $V_n\times V_n\to V_n$ で、移流項 $b$ を表す。これにより場は次の二次と一次の和の形になる。

  $$u\longmapsto\mathrm{Bil}(u,u)+\mathrm{Lin}\,u$$
gap:
  level: none
  note: |
    移流形式 $b$ の三重線型性から、内側・中間・外側の三段階で連続線型写像を積み上げ、各段で有限次元の自動連続性を使い、最後に Riesz 逆写像と合成して構成する。二次部分と一次部分への分解が、場が $C^1$（実際には滑らか）であることの証明の骨格になる。
chapter: ode
tags: [galerkin-approximation, vector-field, bilinear]
