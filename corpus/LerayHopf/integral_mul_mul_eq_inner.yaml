name: LerayHopf.integral_mul_mul_eq_inner
tier: full
statement_ja: |
  三重積の内積表示：実 $L^2$ 元 $a,b$ と本質的有界な $h$ に対し、積分 $\int a\,b\,h$ は内積 $\langle a,\ h\cdot b\rangle$ に等しい。三重積の極限移行を内積の連続性の問題へ変換する要の書き換え。
proof_ja: |
  内積を積分表示し、乗算の各点表示を代入して被積分関数が一致することを確かめる。
gap:
  level: none
provenance: |
  lean-pde PR #126 で `Analysis/RealComplexLpBridge.lean` へ公開移動（private→public）。
