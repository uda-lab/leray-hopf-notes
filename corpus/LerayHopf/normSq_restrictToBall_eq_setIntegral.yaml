name: LerayHopf.normSq_restrictToBall_eq_setIntegral
tier: full
statement_ja: |
  球制限のノルム二乗の集合積分表示：

  $$\lVert u\vert_{B_R}\rVert^2 = \int_{B_R}\lVert u(x)\rVert^2\,dx.$$
