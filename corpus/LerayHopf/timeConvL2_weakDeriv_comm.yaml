name: LerayHopf.Bochner.timeConvL2_weakDeriv_comm
tier: full
statement_ja: |
  弱微分と時間畳み込みの交換：$v$ が $u$ の**全直線**弱時間微分で、$u, v$ が局所可積分、$\rho$ が時間軟化子ならば

  $$(\rho \ast u)' = \rho \ast v$$

  が全直線弱時間微分の意味で成り立つ（ここで畳み込みは、各時刻の値を積分により定める曲線どうしの通常の時間畳み込みである）。
proof_ja: |
  テスト $\psi$ を固定し、畳み込みを二重積分に開いて Fubini で順序交換する（結合可積分性は核のコンパクト台と局所可積分性から）。内側の積分では変数をずらした置換により、シフトしたテスト $\psi(\cdot + s)$ での弱微分の定義式が使える — **ここが全直線述語の存在理由**で、シフトしたテストも全直線のコンパクト台テストのままである。得られた恒等式を再度 Fubini で戻すと結論の形になる。
gap:
  level: mild
  note: |
    区間版の弱微分では不健全だった（シフトしたテストが区間述語の適用範囲から外れる）ことが docstring に記録されており、全直線述語への定理の型の修正と局所可積分性の追加（codex P1 対応の履歴）がその解決である。軟化と微分の交換という時間軟化理論の中心的な結果。
chapter: bochner
tags: [weak-time-derivative, bochner]
