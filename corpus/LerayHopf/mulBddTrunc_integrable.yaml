name: LerayHopf.mulBddTrunc_integrable
tier: gloss
statement_ja: |
  打ち切り次数 $k$ での重み $W_k(\xi):=\min(\sqrt{W(\xi)},k)$（$W(\xi)=(2\pi)^2\|\xi\|^2$）の自乗と $L^2$ 関数のノルムの自乗との積は可積分である：$\xi\mapsto W_k(\xi)^2\|g(\xi)\|^2$ は可積分。重みが $k$ で有界に打ち切られていることと $g\in L^2$ から従う基本事実である。
gap:
