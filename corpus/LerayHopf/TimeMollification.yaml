name: LerayHopf.Bochner.TimeMollification
tier: full
statement_ja: |
  時間軟化データの束：`W1pTime` 曲線の滑らかな時間軟化

  $$u^\varepsilon = \rho^\varepsilon \ast_t u$$

  が生むもの — $V$ 値で内部 $C^1$ の近似列とその強微分、両者の $[0, T]$ 上の連続性、近似列の $L^2(0,T;V)$ 収束、微分の $V'$ 像の $L^2(0,T;V')$ 収束 — を一つのデータとしてまとめる。
proof_ja: |
  上記の近似列・微分列・微分可能性・二つの連続性・二つの収束をまとめたデータとして定める。
gap:
  level: mild
  note: |
    二つの $L^2$ 収束が**微分で連結している**（軟化した曲線の微分＝微分の軟化）ことがこの束の存在意義：$u$ と $u'$ を独立に密度近似したのでは足りない。曲線側の収束を $V$ ノルムで要求するのは、双対対の評価

    $$\lVert \varphi \rVert_{V'}\, \lVert v \rVert_V$$

    を極限に渡すのに $L^2(H)$ 収束では足りないため。
provenance: |
  codex P1 修正の履歴が docstring に記録されている。
chapter: bochner
