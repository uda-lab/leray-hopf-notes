name: LerayHopf.mulBddR
tier: gloss
statement_ja: |
  実数値の本質的有界（$L^\infty$）関数 $h$ による実 $L^2$ 元の点ごとの掛け算 $a\mapsto h\cdot a$ を、再び $L^2$ の元として定める乗算子。
gap:
  level: mild
  note: |
    有界性の仮定 `MemLp h ⊤` は定義の明示的な引数として要求される（Hölder 対 $(\top,2,2)$ を成立させるための入力であり、$h$ 自体から自動的に導出されるわけではない）。
provenance: |
  Wave 4 の private gloss 機械生成テンプレートから、issue #74 第5波（`ConvectionForm.lean` クラスタ）で手書き化。抽出元: `LerayHopf/R3/ConvectionForm.lean` の `LerayHopf.mulBddR`。
chapter: limit-passage
tags: [private-helper, convection-form, l2-multiplier]
