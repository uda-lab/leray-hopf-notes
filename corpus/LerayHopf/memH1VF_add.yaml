name: LerayHopf.memH1VF_add
tier: full
statement_ja: |
  成分ごとの $H^1$ 所属は加法で閉じる：$u$ と $v$ がともに $H^1$ ならば $u + v$ も $H^1$ である。
proof_ja: |
  成分射影の線形性により和の成分は成分の和になる。Fourier 係数のノルムの三角不等式と初等的な二乗評価

  $$\lVert \widehat{f+g}(k) \rVert^2 \le 2\,\lVert \hat f(k) \rVert^2 + 2\,\lVert \hat g(k) \rVert^2$$

  により、和の重み付き二乗和は $u$ と $v$ の重み付き二乗和それぞれの $2$ 倍の和で項別に抑えられ、優級数判定で総和可能性が遺伝する。
gap:
  level: none
  note: |
    二乗評価は $(A+B)^2 \le 2A^2 + 2B^2$（相加相乗平均）の形で `nlinarith` により処理される。三角不等式は係数水準の補題 `mFourierCoeff3_norm_add_le` による。
chapter: energy
tags: [sobolev, torus]
