name: LerayHopf.R3NSForms_of_gap
tier: full
statement_ja: |
  孤立した移流ギャップ [[移流ギャップ|LerayHopf.ConvectionGap]] が与えられれば、具体的な [[NS 移流形式|LerayHopf.R3NSForms]] が存在する。

  移流ギャップは、$L^2_\sigma(\mathbb{R}^3)$ 全体上の総体的な移流形式 $b$ と、その Schwartz クラスへの制限が既証の移流汎関数に一致すること、$b$ が真に三線形であること、後ろ二スロットでの反対称性、固定 Schwartz テストでのスロット 1・2 に関する $L^2$ 連続性、そして Schwartz 発散ゼロクラスの $L^2_\sigma$ での稠密性を束ねたものである。
proof_ja: |
  NS 形式の各フィールドをギャップから導く。三線形代数（各スロットの加法性とスカラー斉次性）は、$b$ が真の三線形写像 $B$ で実現されるという構造から、$B$ の加法性・スカラー性を用いて任意の $L^2_\sigma$ の元について直接得る。連続性も密度も要さない。後ろ二スロットの反対称性は、任意の $L^2_\sigma$ 上でのギャップの反対称性フィールドから直接従う。

  有界性は、Schwartz クラスでの既証の三線形評価から定数 $C$ を取り、拡張性で $b$ を既証の移流汎関数に書き換えて Schwartz の $u,v$ について評価を得る。一般の $u,v$ については、密度性で Schwartz 列 $s_u,s_v$ で近似し、固定 Schwartz テストでの連続性から $b(s_u,s_v,w)\to b(u,v,w)$、ノルムの連続性から右辺も収束するので、極限に評価を渡して

  $$\lvert b(u,v,w)\rvert \le C\,\lVert u\rVert\,\lVert v\rVert$$

  を得る。標準形へのピンは拡張性と既証の一致（Schwartz クラス上での[[真の移流積分|LerayHopf.convIntegralSchwartz]]との一致）から従う — ただし非自明性（$b\neq 0$）自体を独立に証明した目撃者定理は、現行 Lean API に含まれない。
gap:
  level: mild
  note: |
    これはギャップから NS 形式内容を真に導出する主張であって、単なる改名ではない。量的内容（有界性）と拡張内容は導出され、代数的内容（三線形性・反対称性）のみが、いまだ mathlib にない弱 $(u\cdot\nabla)v$ 作用素の明示的な残余として仮定される。第三スロットの任意 $w$ に関する代数は真の連続性からは導けない（変化するスロットが非有界だから）ため、明示フィールドとして運ばれる。

    かつて総体形式の存在は太い公理 `r3_NSForms_exist` として仮定されていたが、この導出により有界性・ピン・密度・代数の大半が定理内容へ移った。極限への評価渡しは `le_of_tendsto_of_tendsto` を用いる。
provenance: |
  非自明性に関する形式化範囲は source issue #153 の監査で明確化された。
chapter: limit-passage
tags: [convection-form, navier-stokes, density]
