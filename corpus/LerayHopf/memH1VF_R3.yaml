name: LerayHopf.memH1VF_R3
tier: full
statement_ja: |
  速度場 $u$ が **$H^1$ 正則性**をもつとは、その各成分が Sobolev 空間 $H^{1,2}(\mathbb{R}^3;\mathbb{C})$ に属することをいう。ここで $H^{1,2}$ は Bessel ポテンシャルによる Sobolev 空間である。
proof_ja: |
  各成分の $H^1$ 正則性を、mathlib の Bessel ポテンシャル型 Sobolev 空間への所属として厳密に定式化する。$\mathbb{R}^3$ では $\mathbb{T}^3$ のような離散 Fourier 荷重和が使えないため、この連続版の Sobolev 空間を採用する。
gap:
  level: mild
  note: |
    $\mathbb{T}^3$ の Fourier 荷重和による $H^1$ エネルギーに対し、$\mathbb{R}^3$ では mathlib の Bessel ポテンシャル型 Sobolev 空間 (`TemperedDistribution.MemSobolev 1 2`) を採用する。実成分ではなく複素成分を用いるのは、`MemSobolev` が要求する複素係数の構造がそのまま満たされるためで、実成分ではスカラー制限の追加が要る。
chapter: spaces
tags: [sobolev, regularity, bessel-potential]
