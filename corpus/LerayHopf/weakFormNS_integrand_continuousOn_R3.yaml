name: LerayHopf.weakFormNS_integrand_continuousOn_R3
tier: gloss
statement_ja: |
  弱形式 NS 方程式の被積分関数の連続性。テスト元 $w$ が Schwartz かつ発散ゼロで、重み $\psi$ が $C^1$ であるとき、写像 $$t\mapsto -\langle u_n(t),w\rangle\,\psi'(t) + \psi(t)\bigl(\nu\, B(u_n(t),w)+b(u_n(t),u_n(t),w)\bigr)$$ は前向き時刻 $t\ge0$ 上で連続である（$B$ は Stokes 双線形形式、$b$ は移流形式）。Stokes 双線形形式の連続性・移流形式の連続性・内積の連続性を組み合わせて得る。
gap:
