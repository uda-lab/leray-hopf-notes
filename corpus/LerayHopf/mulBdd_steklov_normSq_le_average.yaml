name: LerayHopf.mulBdd_steklov_normSq_le_average
tier: gloss
statement_ja: |
  有界重み $m$（$|m|\le C$）と前向き時刻 $[0,\infty)$ 上で連続な曲線 $G$ に対する重み付き Jensen 評価。刻み幅 $\delta>0$、時刻 $t\ge0$ のとき、Steklov 平均化した曲線に重み $m$ を掛けたもののノルムの自乗は、時間平均のノルムの自乗の平均で抑えられる：$$\left\|m\cdot\left(\delta^{-1}\int_t^{t+\delta}G(s)\,ds\right)\right\|^2 \le \delta^{-1}\int_t^{t+\delta}\|m\cdot G(s)\|^2\,ds.$$ 完備な実内積空間に対する Bochner 平均の Jensen 不等式を曲線 $s\mapsto m\cdot G(s)$ に適用して得る。
gap:
