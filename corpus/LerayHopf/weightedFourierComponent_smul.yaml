name: LerayHopf.weightedFourierComponent_smul
tier: full
statement_ja: |
  荷重付き Fourier 成分は実スカラー倍に対して斉次である。

  $$(r\,w)_j^{\flat}=r\,(w)_j^{\flat}$$
proof_ja: |
  成分射影と Fourier 変換は実スカラー倍と可換であり、平方根乗数の掛け算もスカラー倍と可換である。したがって $r\,w$ の荷重付き成分はほとんど至る所で $r$ 倍の荷重付き成分に一致し、$L^2$ 元として等しい。
gap:
  level: none
chapter: compactness
tags: [viscous-form, linearity]
