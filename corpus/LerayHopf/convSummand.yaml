name: LerayHopf.convSummand
tier: full
statement_ja: |
  移流形式の Fourier 側の被和項：成分対 $(i, a)$ と格子点対 $(k, l)$ に対する複素数

  $$\hat u_a(k) \cdot 2\pi i\, l_a \cdot \hat v_i(l) \cdot \hat w_i(-(k+l)).$$

  成分対と格子点対にわたって足し実部を取ると移流形式の値になる。
proof_ja: |
  三つの場の Fourier 係数の積として直接定義する。乗数 $2\pi i\, l_a$ は中央の因子の $a$ 方向微分に対応する Fourier 乗数であり、反対角の拘束 $k + l + m = 0$ が第三因子の引数 $-(k+l)$ に現れる。
gap:
  level: none
  note: |
    移流積分 $\int (u \cdot \nabla) v \cdot w$ を Fourier 級数で展開したときの一般項。総和の順序や収束はここでは扱わず、[[被和項のノルム総和可能性|LerayHopf.convSummand_norm_summable]] 以降の補題群が担う。
chapter: energy
tags: [convection, fourier, torus]
