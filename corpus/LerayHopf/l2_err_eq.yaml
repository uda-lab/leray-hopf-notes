name: LerayHopf.l2_err_eq
tier: gloss
statement_ja: |
  正則化された渦度と目標場 $w$ の差の $L^2$ ノルムの二乗が、Fourier 側の積分表示

  $$\int\sum_j\Bigl(\frac{a^2}{a^2+\lVert\xi\rVert^2}\Bigr)^{2}\bigl\lvert\widehat w_j(\xi)\bigr\rvert^2\,d\xi$$

  に等しいことを述べる。ベクトル版 Parseval 等式に[[誤差の Fourier 変換|LerayHopf.fourier_err_ae]]を代入して得る。
