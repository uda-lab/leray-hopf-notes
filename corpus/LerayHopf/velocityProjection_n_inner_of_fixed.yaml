statement_ja: |
  帯域制限テストとの対は截断を素通しする：$P_n w = w$ ならば $\langle P_n u, w \rangle = \langle u, w \rangle$。
proof_ja: |
  [[自己随伴性|LerayHopf.velocityProjection_n_inner_symm]] で截断を $w$ 側へ移し、固定性で消す。
gap:
  level: none
  note: |
    Galerkin テストに対する弱形式の各項が截断に鈍感であることを支える。
