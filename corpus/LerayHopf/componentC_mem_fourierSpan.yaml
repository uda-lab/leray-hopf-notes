name: LerayHopf.componentC_mem_fourierSpan
tier: full
statement_ja: |
  $V_n$ の元の成分は Fourier スパンに属する：$v \in V_n$ の各複素埋め込み成分は [[Fourier スパン|LerayHopf.fourierSpan]] の元である。
proof_ja: |
  $v$ は截断で固定されるので、成分可換性によりその成分はスカラー截断の値に等しく、截断の値域（＝スパン）に属する。
gap:
  level: none
  note: |
    $V_n$ の有限次元性をスカラー側から引き出す接続部品。
chapter: projections-galerkin
tags: [galerkin, projections, torus]
