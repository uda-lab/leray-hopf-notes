name: LerayHopf.Bochner.GelfandTriple.hToVprime
tier: full
statement_ja: |
  正準埋め込み $H \hookrightarrow V'$：$h \in H$ を汎関数 $v \mapsto \langle \iota v,\ h \rangle_H$ に送る。
proof_ja: |
  Riesz 同一視 $H \cong H'$ と $\iota$ の前合成の組み合わせとして定める。
gap:
  level: none
  note: |
    稠密値域性により単射（これが三つ組の定義的性質）だが、`W1pTime` を述べるのに単射性は要らないので裸の埋め込みとして保持。束ねた連続線形版は [[CLM 版|LerayHopf.Bochner.GelfandTriple.hToVprimeCLM]]。
