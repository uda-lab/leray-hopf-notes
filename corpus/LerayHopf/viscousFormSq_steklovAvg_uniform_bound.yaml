statement_ja: |
  Steklov 平均に対する近似段数一様な $H^1$ 評価。粘性係数 $\nu>0$、$T>0$、前進窓 $[t,t+\delta]\subseteq[0,T]$（$0\le t$、$t+\delta\le T$）に対し、平均後の状態の粘性形式は $$V\!\left(\delta^{-1}\int_t^{t+\delta}u_n(s)\,ds\right) \le \delta^{-1}\nu^{-1}\cdot\tfrac12\|u_0\|^2$$ で抑えられる（$V$ は粘性形式）。この上界は有限で、かつ近似段数 $n$ に依らない。粘性版 Jensen 評価と、積分済みの一様エネルギー評価を組み合わせて得る。
