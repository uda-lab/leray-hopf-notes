name: LerayHopf.L2VF_inner_eq_sum_componentC
tier: full
statement_ja: |
  内積の成分分解：実ベクトル場の内積は、複素埋め込み成分の複素内積の実部の三成分和に等しい。
proof_ja: |
  両辺を偏極恒等式（実側・複素側それぞれ）でノルム二乗の組合せに書き換えると、三回の [[Pythagoras 分解|LerayHopf.Torus.L2VF_norm_sq_eq_sum_componentC]]（$u+v$、$u$、$v$）と成分射影の加法性に帰着する。
gap:
  level: none
  note: |
    截断の自己随伴性をスカラー側から持ち上げる要の分解。ノルム分解を三回使う偏極論法が証明の設計。
chapter: projections-galerkin
