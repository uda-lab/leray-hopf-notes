name: LerayHopf.Bochner.aeStronglyMeasurable_of_spaceTimeL2
tier: full
statement_ja: |
  時空 $L^2$ 極限の可測代表と a.e. 部分列：時間の測度 $\mu$ に関して各項が a.e. 強可測な曲線列 $f_n$ が、**a.e. 強可測な** $g$ に $L^2(\mu)$ で収束するならば、$g$ の a.e. 強可測性（結論に保持）と、$\mu$-a.e. の時刻で $g$ に各点収束する部分列が存在する。
proof_ja: |
  $L^2$ 収束は（極限の可測性のもとで）測度収束を与え、測度収束列から a.e. 収束部分列が取れる、という mathlib の二段の一般論を直列に適用する。
gap:
  level: mild
  note: |
    仮定 `hg`（極限の可測性）は**外せない**：外した主張は偽で、docstring に反例が記録されている — $f_n = 0$、$g$ を非可測な Vitali 集合の指示関数とすると、非可測関数の下積分の慣行により $L^2$ 収束の仮定が成り立ってしまうのに $g$ は可測代表を持たない。mathlib の測度収束補題群が例外なく極限の可測性を入力に要求するのはこのためで、本補題は「可測性は別口で供給されるべき欠けた柱」として仮定に隔離している（no-smuggle：仮定は可測性のみで、部分列も極限同定も先取りしない）。
chapter: bochner
tags: [measurability, bochner]
