statement_ja: |
  Galerkin 近似曲線に沿った Stokes 双線形形式の連続性。テスト元 $w$ の各成分を表す Schwartz 関数の族が与えられているとき、写像 $t\mapsto B(u_n(t),w)$（$B$ は Stokes 双線形形式）は前向き時刻 $t\ge0$ 上で連続である。
