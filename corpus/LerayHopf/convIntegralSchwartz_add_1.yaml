name: LerayHopf.convIntegralSchwartz_add_1
tier: full
statement_ja: |
  Schwartz 表現に対する[[移流形式|LerayHopf.convForm]] $b(u,v,w)=\int(u\cdot\nabla)v\cdot w$ は、第一引数 $u$ について加法的である。

  $$b(u_1+u_2,v,w)=b(u_1,v,w)+b(u_2,v,w)$$
proof_ja: |
  移流形式は各成分の積分の有限和であり、被積分関数は第一引数について点ごとに加法的である。各被積分関数が可積分なので積分の線形性で和に分かれ、有限和を入れ替えて主張を得る。
