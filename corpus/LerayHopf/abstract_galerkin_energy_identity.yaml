name: LerayHopf.abstract_galerkin_energy_identity
tier: full
statement_ja: |
  実内積空間 $H$ 上の曲線 $u : \mathbb{R} \to H$ が、反対称性 $B(w,w,w)=0$ をもつ抽象 Galerkin エネルギー法則
  （射影 ODE の内積形）$\langle u'(t), u(t)\rangle + D(u(t)) + B(u(t),u(t),u(t)) = 0$ を満たすとする。
  このとき運動エネルギー $\tfrac12\|u(t)\|^2$ は各 $t$ で導関数 $-D(u(t))$ をもつ。
proof_ja: |
  $\frac{d}{dt}\|u\|^2 = 2\langle u, u'\rangle$（`HasDerivAt.norm_sq`）から始める。ODE 法則より
  $\langle u', u\rangle = -D(u) - B(u,u,u)$、反対称性 $B(u,u,u)=0$ で非線形項が落ち、内積の対称性
  $\langle u, u'\rangle = \langle u', u\rangle$ を用いて $\frac{d}{dt}(\tfrac12\|u\|^2) = -D(u)$ を得る。
  Lean 上の詰まりは $1/2$ 倍で、`HasDerivAt.const_mul` が当該ファイルの import 閉包外だったため
  $(\mathrm{hasDerivAt\_const}\,t\,(1/2)).\mathrm{inner}\,h$（定数 $1/2$ との内積として微分）で代用した。
  これは数学的ギャップではなく Lean 人間工学のギャップである。この恒等式を FTC-2 で積分して
  エネルギー不等式へ橋渡しする。
gap:
  level: mild
  note: |
    数学的には内積の微分則だが、$\tfrac12$ 倍の扱いで `const_mul` 不在を回避する定数内積の技法など、
    ライブラリ事情由来の細部が入る。
chapter: energy
tags: [energy-identity, abstract, has-deriv-at]
