name: LerayHopf.coeff_zero_outside_box
tier: full
statement_ja: |
  帯域制限場の係数の消滅：$u$ が次数 $n$ の截断で固定されるならば、周波数箱の外の Fourier 係数はすべて零である。
proof_ja: |
  截断と成分射影の可換性で成分の係数を截断後の係数に書き換え、截断の係数公式（箱の外は零）を適用する。
gap:
