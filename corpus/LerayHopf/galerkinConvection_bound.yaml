name: LerayHopf.galerkinConvection_bound
tier: full
statement_ja: |
  Galerkin 移流形式の双線形 $L^2$ 有界性：$n$ と帯域制限された $w$ を固定すると、定数 $C$ が存在してすべての $u, v \in L^2$ で

  $$\lvert b_n(u, v, w) \rvert \le C\, \lVert u \rVert\, \lVert v \rVert.$$
proof_ja: |
  すべて有限和なので収束は不要：実部の絶対値をノルムで、和のノルムをノルムの和で抑え、各被和項では単一係数のノルムを（係数汎関数と成分射影の作用素ノルム経由で）$\lVert u \rVert$ と $\lVert v \rVert$ に置き換える。残った $u, v$ に依らない因子を箱上で足し上げたものが $C$ になる。
gap:
  level: none
  note: |
    Galerkin ODE の汎関数の有界性（Riesz 表現の前提）の供給源。
chapter: limit-passage
tags: [convection, galerkin, torus]
