name: LerayHopf.H1_tail_bound
tier: full
statement_ja: |
  （L3）**テイル評価**。$H^1$ エネルギーが $M^2$ で有界な $f$ に対し、箱 $\lVert k\rVert_\infty\le N$ の外側の Fourier エネルギーは $M^2/(1+N^2)$ 以下である。

  $$\sum_{\lVert k\rVert_\infty>N}\bigl\lvert\hat f(k)\bigr\rvert^2\ \le\ \frac{M^2}{1+N^2}$$
proof_ja: |
  箱の外側では、ある成分で $\lvert k_i\rvert>N$ となるので $k_i^2>N^2$、したがって荷重は $1+\sum_i k_i^2\ge 1+N^2$ を満たす。

  両辺に $\lvert\hat f(k)\rvert^2$ を掛けて箱の外で和をとると、$(1+N^2)$ 倍したテイル和が荷重つき全体和 $\le M^2$ で上から抑えられる。最後に正の量 $1+N^2$ で割ればよい。
gap:
  level: mild
  note: |
    自然言語では一行の不等式だが、形式化では和を添字の部分型へ制限すること、可算和可能性の伝播、単調性の補題を明示的に接続する必要がある。
chapter: compactness
