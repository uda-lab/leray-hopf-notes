name: LerayHopf.iSup_prefixSpan_eq_span_range
tier: full
statement_ja: |
  前置 span の上限と全 span の一致：列 $e$ の最初の $n$ 項の張る部分空間の $n$ についての上限は、全列の張る部分空間に等しい。基底の枚挙と Galerkin 階層の整合性を与える。
proof_ja: |
  各前置 span は全 span に含まれるから上限も含まれる。逆に全 span の生成元は各々ある前置 span に現れるので、生成性から逆向きの包含も従う。
gap:
  level: none
provenance: |
  lean-pde PR #124 で private コピー（prime 付き）を削除し public 原本に一本化。
chapter: projections-galerkin
tags: [galerkin, basis, r3]
