name: LerayHopf.orthogonalCurl_longitudinal_ae
tier: gloss
statement_ja: |
  場 $w$ がすべての渦度に直交するならば、その Fourier 変換 $\widehat w$ の第 $k$ 番目の外積成分がほとんど至る所ゼロになる、すなわち $\widehat w$ が縦型（$\xi$ に平行）であることを述べる。

  $$\widehat w_{k+1}(\xi)\,\xi_{k+2}-\widehat w_{k+2}(\xi)\,\xi_{k+1}=0\quad\text{a.e.}$$
