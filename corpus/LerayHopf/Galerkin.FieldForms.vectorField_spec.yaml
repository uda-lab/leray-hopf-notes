name: LerayHopf.Galerkin.FieldForms.vectorField_spec
tier: full
statement_ja: |
  Galerkin ベクトル場の特徴付け：任意の $u,w$ に対して

  $$\bigl\langle G(u),\,w\bigr\rangle = -\nu\, s(u,w) - b(u,u,w).$$

  場の定義（Riesz 表現元）をテスト方向の等式として言い直したもので、以後のエネルギー計算はすべてこの等式を通して行われる。
proof_ja: |
  Riesz 表現元の定義そのものである：双対同型の逆像と任意ベクトルの内積は、元の汎関数の値に等しい。
gap:
  level: none
  note: |
    `InnerProductSpace.toDual_symm_apply` の一行展開。
chapter: galerkin-generic
tags: [quadratic-field, riesz]
