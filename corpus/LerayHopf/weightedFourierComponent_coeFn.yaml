name: LerayHopf.weightedFourierComponent_coeFn
tier: full
statement_ja: |
  荷重付き Fourier 成分を表す $L^2$ 元は、ほとんどすべての周波数で次の明示的な関数に一致する。

  $$\xi\mapsto\sqrt{W}(\xi)\,\widehat{w_j}(\xi)$$
proof_ja: |
  荷重付き成分は、この明示的な関数が二乗可積分であることから定まる $L^2$ 元として構成されており、そのような元は代表元として当の関数をほとんど至る所で復元する。
gap:
  level: mild
  note: |
    $L^2$ 元は測度ゼロの違いを無視した同値類であり、この補題はその代表元が明示関数にほとんど至る所一致することを述べる `MemLp.coeFn_toLp` 相当の橋渡しである。後続の加法性・斉次性の証明で点ごとの計算へ移るために使う。
chapter: compactness
tags: [viscous-form, representative]
