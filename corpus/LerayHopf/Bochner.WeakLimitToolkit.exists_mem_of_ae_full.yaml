name: LerayHopf.exists_mem_of_ae_full
tier: full
statement_ja: |
  全測度集合の稠密性：$[0, T]$（$T > 0$）でほとんど至る所の点を含む集合 $S$ は、$[0, T]$ の任意の点の任意の $\varepsilon$ 近傍と交わる。
proof_ja: |
  背理法：ある点の $\varepsilon$ 近傍が $S$ と交わらなければ、その近傍と $[0, T]$ の交わりに正の長さの開区間が取れ、そこは $S$ の補集合に含まれる。補集合は零集合のはずなので、正測度と矛盾する。
gap:
  level: none
  note: |
    「a.e. の性質は稠密な点集合を与える」の定量形。Lipschitz 族の稠密部分集合上の収束を全点へ広げる際の稠密性入力。
chapter: bochner
tags: [weak-limit, toolkit, bochner]
