name: LerayHopf.lerayProjection
tier: full
statement_ja: |
  **Leray 射影** $\Pi_\sigma$。$L^2(\mathbb{T}^3;\mathbb{R}^3)$ から閉発散ゼロ部分空間 $L^2_\sigma(\mathbb{T}^3)$ への直交射影で、値域はちょうど $L^2_\sigma$、核はその直交補空間である。
proof_ja: |
  [[発散ゼロ部分空間|LerayHopf.L2Sigma]]が閉部分空間であることから、完備部分空間への直交射影が一意に定まり、これを Leray 射影とする。

  Helmholtz 分解による直交補空間の同定、すなわち $L^2_\sigma$ の補空間が勾配場 $\{\nabla\phi:\phi\in H^1(\mathbb{T}^3)\}$ に一致することは、本形式化では扱わず将来の課題とする。
gap:
  level: none
chapter: spaces
tags: [leray-projection, orthogonal-projection]
