statement_ja: |
  場 $u$ が発散ゼロ部分空間に属するとき、任意の反 Hermite 対称な複素 Schwartz 記号 $h$（$h(-\xi)=-\overline{h(\xi)}$）に対して、$h$ と[[横型欠損|LerayHopf.transverseDefect]]との積分対 $\int h(\xi)\,T_u(\xi)\,d\xi$ がゼロになることを述べる。
