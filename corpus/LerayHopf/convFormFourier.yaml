name: LerayHopf.convFormFourier
tier: full
statement_ja: |
  全 Fourier 移流形式：有限の周波数箱上の和である [[Galerkin 移流形式|LerayHopf.galerkinConvection]] の、格子全体への総和による拡張。成分対の有限和と格子点対の総和で

  $$\sum_{i,a} \operatorname{Re} \sum_{k,l} \hat u_a(k) \cdot 2\pi i\, l_a \cdot \hat v_i(l) \cdot \hat w_i(-(k+l))$$

  と定める。
proof_ja: |
  [[移流被和項|LerayHopf.convSummand]] の格子点対にわたる総和の実部を、成分対にわたって足して定義する。
gap:
  level: mild
  note: |
    tsum 規約（総和可能でない引数には既定値 $0$ を返す）により全引数で定義される全域化であり、総和可能でない引数では値に意味はない。意味のある値を与える領域（$H^1$／Galerkin テスト領域）は [[被和項の実部総和可能性|LerayHopf.gradPairingSummable]] が特定する。
chapter: energy
tags: [convection, fourier, torus]
