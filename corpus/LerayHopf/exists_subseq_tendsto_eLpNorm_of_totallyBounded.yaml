name: LerayHopf.exists_subseq_tendsto_eLpNorm_of_totallyBounded
tier: full
statement_ja: |
  全有界な類の列からの収束部分列の抽出：曲線列の $L^p$ 類の集合が全有界ならば、ある部分列と極限 $G \in L^2(0,T; X)$ が存在して、差の $L^2$ ノルムが $0$ に収束する。
proof_ja: |
  完備空間の中では全有界集合の閉包はコンパクトなので、類の列から収束部分列が取れる。得られた $L^p$ ノルム収束を、類のノルムと代表関数の差のノルムの一致（a.e. 代表の付け替え）で結論の形式に書き換え、有限性を確かめて拡張非負実数の収束へ持ち上げる。
gap:
  level: none
  note: |
    A1–A6 から収束部分列を得る最終段階。全有界性→列コンパクト性の変換部。
chapter: bochner
tags: [step-functions, compactness, bochner]
