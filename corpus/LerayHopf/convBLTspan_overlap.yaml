name: LerayHopf.R3.ConvectionExtension.convBLTspan_overlap
tier: gloss
statement_ja: |
  任意の発散ゼロ場 $u$ と、Schwartz スパンの元 $s,s'$ に対し、[[スパン双線形拡張|LerayHopf.R3.ConvectionExtension.convBLTspan]]は二つのスパン引数を入れ替えて評価すると符号が反転する。$H^1_\sigma$ 上で成り立つ[[移流形式の反対称性|LerayHopf.convFormH1_antisymm]]を、連続性により稠密な部分空間から発散ゼロ場の空間全体へ拡張したもの。二つの縁の値が重なりの上で一致することを保証する要である。
gap:
  level: mild
  note: |
    形式化では、両辺が $u$ について連続であることを示し、稠密な $H^1_\sigma$ の像の上で反対称性から一致することを確かめ、連続関数の稠密集合上の一致定理で全体へ延ばす。
chapter: limit-passage
tags: [convection, bridge, determined-form, overlap, private-helper]
