name: LerayHopf.Bochner.IsTimeMollifier
tier: full
statement_ja: |
  正規化された時間軟化子の述語：実数直線上のスカラー核 $\rho$ が、連続・非負・コンパクト台で、単位質量

  $$\int \rho = 1$$

  を持つこと。
proof_ja: |
  四条件をフィールドとして束ねた述語構造である。
gap:
  level: none
  note: |
    mathlib の `ContDiffBump.normed` がちょうどこの四条件を満たす（[[バンプ核の軟化子性|LerayHopf.Bochner.ContDiffBump.isTimeMollifier]]）が、Young 型評価を任意の核に使えるよう抽象に保たれている。単位質量が Young 不等式の定数 $\lVert \rho \rVert_1 = 1$ を与える。
chapter: bochner
tags: [time-mollification, bochner]
