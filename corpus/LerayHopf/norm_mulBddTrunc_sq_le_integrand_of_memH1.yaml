name: LerayHopf.norm_mulBddTrunc_sq_le_integrand_of_memH1
tier: gloss
statement_ja: |
  $w\in H^1$ のとき、打ち切られた重み $W_k(\xi):=\min(\sqrt{W(\xi)},k)$（$W(\xi)=(2\pi)^2\|\xi\|^2$）による乗算後のノルムの自乗は、打ち切り次数 $k$ に依らず、実数値（Bochner 積分）版の $j$ 番目の粘性スペクトル項で上から抑えられる。$w\in H^1$ のとき全重みでの積分が可積分になることによる。
