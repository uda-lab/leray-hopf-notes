name: LerayHopf.fourier_proj_steklovAvg_eq
tier: gloss
statement_ja: |
  Steklov 平均の Fourier 成分は、曲線の Fourier 成分の時間平均に一致する（近似を要しない厳密な等式）：$$\mathcal F(\pi_j(\text{Steklov 平均}(\delta,t))) = \delta^{-1}\int_t^{t+\delta}\mathcal F(\pi_j u_n(s))\,ds.$$ スカラー $\delta^{-1}$ が線形写像 $\mathcal F\circ\pi_j$ の外に出せることと、連続線形写像が Bochner 積分と可換であることによる。
