name: LerayHopf.Bochner.isWeakTimeDerivℝ_smul_cutoff
tier: full
statement_ja: |
  切断の Leibniz 積則（全直線版）：大域 $C^1$ の切断関数 $\chi$ と、局所可積分な曲線対 $u, v$（$v$ は $u$ の全直線弱時間微分）に対し

  $$(\chi u)' = \chi v + \chi' u$$

  が全直線の弱時間微分の意味で成り立つ。
proof_ja: |
  切断をテスト側へ移す：積 $\chi \psi$ は $C^1$ かつコンパクト台（$\psi$ の台が勝つ）なので、$u$ の弱微分の定義式を $\chi \psi$ でテストできる。Leibniz 則 $(\chi\psi)' = \chi'\psi + \chi\psi'$ で積分を二つに分け（各被積分関数は「コンパクト台連続スカラー × 局所可積分」で可積分）、加法群の計算で結論の恒等式に組み替える。
gap:
  level: mild
  note: |
    局所可積分性の仮定は積分の分割 `integral_add` を健全にする最小の正直な制限（なければ Bochner 積分がジャンク値になり得る）で、下流では `W1pTime` の所属フィールドから供給できる。全直線拡張（WALL B）の証明済み部品。
