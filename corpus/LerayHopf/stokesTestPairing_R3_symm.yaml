name: LerayHopf.stokesTestPairing_R3_symm
tier: full
statement_ja: |
  Stokes 双線形形式の対称性：任意の $u,w$ に対し $s(u,w) = s(w,u)$（Galerkin span への制限なしに周囲空間全体で成り立つ）。
proof_ja: |
  被積分関数

  $$\mathrm{Re}\bigl[\widehat{u_j}\,\overline{\widehat{w_j}}\bigr].$$

  が実部の共役対称性により引数交換で不変であることから、積分も対称になる。
gap:
  level: none
provenance: |
  lean-pde PR #133 で import 循環回避のため `R3/GalerkinODE.lean` へ public 移動。
chapter: ode
tags: [galerkin, ode, r3]
