name: LerayHopf.TensorEdgeGluing.antisymmetrizer
tier: full
statement_ja: |
  反対称化子：$X\otimes X$ 上の線形写像 $A = (\mathrm{id}-\mathrm{swap})/2$。テンソルの因子交換に関する反対称成分への射影で、移流形式の反対称性（後ろ二つの引数の交換で符号反転）をテンソル側で実現する。
proof_ja: |
  恒等写像と因子交換写像の差の半分として定義する。
gap:
  level: none
  note: |
    系統側の公開名（`edgeSlot2/3`, `detDomain`, `detExtend`, `convFormL2_*` など）は同名の thin wrapper として残る。
provenance: |
  lean-pde PR #120（issue #111 PR-1）で両系統の ConvectionExtension に逐語重複していた tensor/edge-gluing 機構 72 宣言を一本化した共有モジュール。
chapter: limit-passage
tags: [convection, tensor-gluing, shared-infra]
