name: LerayHopf.viscousLintegrand_le_liminf_of_weak
tier: gloss
statement_ja: |
  各成分ごとの粘性スペクトル項の弱下半連続性。列 $(u_n)$ が各項 $H^1$ に属し一様に有界（$\|u_n\|\le M$）かつ $u$ に弱収束するとき、極限 $u$ の $j$ 番目の粘性スペクトル項（ℝ≥0∞ 値の下側 Lebesgue 積分版）は近似列の（実数値）粘性スペクトル項の下極限で抑えられる。打ち切り次数ごとに有界な連続線形写像を通した弱収束からノルムの弱下半連続性を適用し、打ち切りを外す上限をとって得る。
