statement_ja: |
  方向 $m$ の弱方向微分に対応する有界 Fourier 乗数 $\sigma_m$：

  $$\sigma_m(\xi):=2\pi\langle\xi,m\rangle\, w_-(\xi)$$

  [[Schwartz 勾配収束|LerayHopf.schwartz_h1_gradConv]] で方向微分を Fourier 乗数として実現するために使う。
