name: LerayHopf.viscousFormSq_aestronglyMeasurable_of_memH1
tier: full
statement_ja: |
  粘性散逸の時間可測性：a.e. の時刻で $H^1$ 所属をもつ曲線に対し、$t\mapsto$（粘性散逸）は a.e. 強可測である。エネルギー不等式の散逸積分が測度論的に意味を持つための前提。
proof_ja: |
  散逸を重み付き Fourier 成分のノルム二乗の和として表し、各成分の時間可測性（曲線の可測性と連続作用素の合成）から可測性を組み立てる。
gap:
  level: mild
provenance: |
  lean-pde PR #130（issue #114 Tier 1）で `R3/EnergyWeakLsc.lean` に private→public 化。
chapter: limit-passage
tags: [energy, measurability, r3]
