name: LerayHopf.lerayProjection_R3
tier: full
statement_ja: |
  $\mathbb{R}^3$ の **Leray 射影** $\Pi_\sigma$。$L^2(\mathbb{R}^3;\mathbb{R}^3)$ から閉弱発散ゼロ部分空間 $L^2_\sigma(\mathbb{R}^3)$ への直交射影で、値域はちょうど $L^2_\sigma(\mathbb{R}^3)$、核はその直交補空間である。
proof_ja: |
  [[弱発散ゼロ部分空間|LerayHopf.L2Sigma_R3]]が弱発散テスト汎関数の核の共通部分として閉部分空間であることから、$\mathbb{T}^3$ と同じく完備部分空間への直交射影として定まる。

  「核の共通部分ゆえ閉、閉ゆえ完備、完備ゆえ直交射影」という数行で空間と射影が同時に立つのが $\mathbb{T}^3$・$\mathbb{R}^3$ 共通の設計上の利点である。Helmholtz 分解による直交補空間の同定は本形式化では扱わない。
gap:
  level: none
