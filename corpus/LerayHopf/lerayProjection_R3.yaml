name: LerayHopf.lerayProjection_R3
tier: full
statement_ja: |
  ℝ³ の Leray 射影 $\Pi_\sigma : L^2\mathrm{VF\_R3} \to_L L^2_\sigma(\mathbb{R}^3)$。
  $L^2(\mathbb{R}^3;\mathbb{R}^3)$ から閉弱発散ゼロ部分空間 $L^2_\sigma(\mathbb{R}^3)$ への直交射影で、
  値域はちょうど $L^2_\sigma(\mathbb{R}^3)$、核はその直交補空間。
proof_ja: |
  $L^2_\sigma(\mathbb{R}^3)$ が弱発散テスト汎関数の核の交叉として閉部分空間であることから、
  T³ と同じく完備部分空間の直交射影 $L^2_\sigma(\mathbb{R}^3).\mathrm{orthogonalProjectionOnto}$ として
  定義される。「核の交叉 $\Rightarrow$ 閉 $\Rightarrow$ 完備 $\Rightarrow$ 直交射影」の 4 行で空間と射影が
  立つのが T³/ℝ³ 共通の設計上の旨味。Helmholtz 分解による直交補空間の同定は本形式化では扱わない。
