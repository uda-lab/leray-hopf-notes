statement_ja: |
  移項形式の双線形写像化：Galerkin テスト関数 $w$ を固定し、対応

  $$(u, v) \longmapsto \operatorname{val}(u, v, w)$$

  を発散ゼロ空間上の実双線形写像として束ねる。
