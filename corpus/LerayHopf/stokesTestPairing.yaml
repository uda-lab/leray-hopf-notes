name: LerayHopf.stokesTestPairing
tier: full
statement_ja: |
  具体的な粘性（Stokes）テスト対：Fourier 係数による表示

  $$s(u, w) = \sum_{j} \sum_{k} (2\pi)^2\, \lvert k \rvert^2\; \operatorname{Re}\bigl[\hat u_j(k)\, \overline{\hat w_j(k)}\bigr].$$

  $e^{2\pi i k \cdot x}$ 規約のもとでの $\int \nabla u : \nabla w$ の Fourier 級数表示である。
proof_ja: |
  成分の有限和と格子の総和で直接定義する。対角では実部の恒等式

  $$\operatorname{Re}[z\, \bar z] = \lvert z \rvert^2$$

  により係数 $1$ の [[粘性形式|LerayHopf.viscousFormSq]] を回復する。
gap:
  level: mild
  note: |
    公理化ではなく具体的な定義である点が設計の要：$u \notin H^1$ でも tsum のジャンク値規約により全域で定義され健全（総和可能でない場合は値 $0$）。真正な値を持つ領域の管理は有界性補題・帯域制限補題群が担う。
chapter: capstone-torus
tags: [stokes, fourier, torus]
