name: LerayHopf.norm_integral_sq_le_length_mul_integral_normSq
tier: gloss
statement_ja: |
  完備な実内積空間 $H$ に値をとる曲線 $f:\mathbb R\to H$ が $a\le b$ を満たす閉区間 $[a,b]$ 上で連続であるとき、Bochner 積分の自乗ノルムは区間の長さと自乗ノルムの積分との積で抑えられる：$$\left\|\int_a^b f(s)\,ds\right\|^2 \le (b-a)\int_a^b \|f(s)\|^2\,ds.$$ 台形則の Cauchy–Schwarz 版であり、区間平均の自乗ノルム評価（Jensen 型不等式）の基礎となり、[[Steklov 平均の自乗ノルム評価|LerayHopf.steklovAvg_normSq_le_average]] などで用いられる。
gap:
