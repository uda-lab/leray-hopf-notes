statement_ja: |
  粘性形式は各成分の粘性スペクトル項の和に等しい：$$V(w)=\sum_{j} V_j(w),\qquad V_j(w):=\int_\xi (2\pi)^2\|\xi\|^2\,\|\mathcal F(\pi_j w)(\xi)\|^2\,d\xi$$ （$V_j$ は $j$ 番目の粘性スペクトル項）。
