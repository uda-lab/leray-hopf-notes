name: LerayHopf.integral_sq_proj_tendsto_zero_of_weak
tier: full
statement_ja: |
  有限次元部分の強収束：各時刻での弱収束と、列と極限曲線の一様なノルム有界性（いずれもノルムが $M$ 以下）のもとで、レベル $N$ の打ち切りは時間二乗平均で強収束する：

  $$\int_0^T \bigl\lVert P_N v_n(t) - P_N u(t) \bigr\rVert^2\, dt \;\longrightarrow\; 0.$$
proof_ja: |
  各時刻では、打ち切りの値は正規直交基底の座標の有限和で表され、各座標は基底ベクトルとの内積であり、弱収束の仮定から収束する。よって打ち切りは各時刻で強収束し、被積分関数は各点で $0$ へ収束する。打ち切りの非拡大性から被積分関数は定数 $(2M)^2$ で優越されるので、有限区間上の優収束定理で積分も $0$ へ収束する。
gap:
  level: none
  note: |
    Aubin–Lions 論法の「低周波部分は弱収束から強くなる」段。優収束は `intervalIntegral.tendsto_integral_filter_of_dominated_convergence` による。
chapter: compactness
tags: [compactness, aubin-lions, torus]
