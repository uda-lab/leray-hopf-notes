name: LerayHopf.memH1_weightedL2_integrable_R
tier: gloss
statement_ja: |
  速度場 $w$ が $H^1$ に属するとき、その第 $j$ 複素成分の Fourier 変換に対し、重み $1+\lVert\xi\rVert^2$ を掛けた二乗ノルムはルベーグ可積分である。$H^1$ 所属を Fourier 側の具体的な可積分性として言い換えたもの。
gap:
  level: mild
  note: |
    同内容の道具立ては下流の `FrechetKolmogorov.lean` にもかつて存在したが、本ファイルはその上流にあり、下流の定義をここで再利用することはできない。そのため本ファイル内で自己完結した Bessel 重み一式として独立に用意されている（下流側の重複コピーは issue #113 で不要コードとして削除済み）。
provenance: |
  Wave 4 の private gloss 機械生成テンプレートから、issue #74 第6波（`FrechetKolmogorov.lean`＋`RellichBall.lean` クラスタ）で手書き化。抽出元: `LerayHopf/R3/RellichBall.lean` の `LerayHopf.memH1_weightedL2_integrable_R`。
chapter: compactness
tags: [private-helper, rellich-ball, bessel-weight]
