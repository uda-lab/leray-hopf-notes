name: LerayHopf.divSymbol_apply
tier: full
statement_ja: |
  発散記号の展開規則：発散記号の値は Fourier 側の発散和

  $$\sum_{j} k_j\, \hat u_j(k)$$

  に等しい。
proof_ja: |
  定義（係数汎関数と成分射影の合成のスカラー重み付き有限和）を展開し、汎関数の値の一致で係数に書き換える。
gap:
  level: none
  note: |
    発散記号は波数 $k$ ごとの連続線形汎関数として定義されており、発散ゼロ空間を閉部分空間として切り出すための道具である。
