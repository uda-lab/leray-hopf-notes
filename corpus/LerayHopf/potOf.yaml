name: LerayHopf.potOf
tier: gloss
statement_ja: |
  正則化された実ベクトルポテンシャルの第 $k$ 成分を、[[正則化ポテンシャル記号|LerayHopf.symbolHatOf]]の Fourier 逆変換の実部として構成したもの。

  $$\psi_k=\operatorname{Re}\bigl(\mathcal F^{-1}\widehat\psi_k\bigr)$$
gap:
  level: mild
  note: |
    実部をとる操作自体は Hermite 対称性を要求しないため定義できるが、この $\psi_k$ の複素化が元の記号 `symbolHatOf` に一致するには `hHerm`（`wh` の Hermite 対称性）が必要になる。その事実は別宣言 `cxify_potOf` が担う。
chapter: projections-galerkin
tags: [curl, yukawa-regularization, potential, private-helper]
