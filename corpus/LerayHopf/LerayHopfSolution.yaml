name: LerayHopf.LerayHopfSolution
tier: full
statement_ja: |
  Leray–Hopf 弱解の概念を、その定義的性質の記録としてまとめた雛形である。時間の関数としての速度場に加え、弱形式の方程式、発散ゼロ条件、エネルギー類への帰属（$L^\infty_t L^2_x \cap L^2_t H^1_x$）、初期値の達成、エネルギー不等式という五つの性質を保持する。

  この段階では各解析的性質は中身のない命題の場所取りであり、後段で本来の意味に置き換えられる。存在定理に具体的な目標型を与えつつ、解析の中身を早まって固定しないための足場として設計されている。
gap:
  level: large
  note: |
    これは初期マイルストーンの骨格的定義で、五つの性質フィールドはいずれも中身のない命題プレースホルダである。実際の弱解の内容（本物の弱形式・発散ゼロ・エネルギー類・初期トレース・エネルギー不等式）を証明保持型として備えるのは、後継の[[完全 Leray–Hopf 解|LerayHopf.LerayHopfSolutionFull]]であり、主定理はそちらを目標型として用いる。

    速度場のキャリアも具体的な関数空間ではなく抽象的な型として置かれている。
chapter: misc
tags: [leray-hopf, scaffold, solution-concept]
