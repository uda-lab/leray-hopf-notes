name: LerayHopf.clampedAvg
tier: gloss
statement_ja: |
  区間 $[0,T]$ 全体をカバーするようにつなぎ合わせた Steklov 平均。刻み幅 $\delta$、時間区間の長さ $T$、時刻 $t$ に対し、$$t\le T-\delta \ \text{では}\ \delta^{-1}\int_t^{t+\delta}u_n(s)\,ds\quad(\text{窓}\ [t,t+\delta]\subseteq[0,T]),$$ $$t> T-\delta \ \text{では}\ \delta^{-1}\int_{t-\delta}^{t}u_n(s)\,ds\quad(\text{窓}\ [t-\delta,t]\subseteq[0,T],\ 2\delta\le T\ \text{のとき有効})$$ を採用する。どちらの場合も平均窓が $[0,T]$ の内部に収まる。
gap:
  level: mild
provenance: |
