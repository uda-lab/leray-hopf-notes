name: LerayHopf.Bochner.w1pTime_continuous_in_H
tier: full
statement_ja: |
  Lions–Magenes の良い代表元（意図的 sorry）：`W1pTime` 元（$u \in L^p(0,T;V)$、$u' \in L^q(0,T;V')$）は、ピボット空間 $H$ に値を取る連続な代表元を持つ — $[0, T]$ 上連続で、$u$ の $H$ への像と a.e. 一致する曲線が存在する。
proof_ja: |
  **証明は意図的に `sorry`（ALLOW_SORRY）で開けてある。**これは Lions–Magenes の埋め込み

  $$\bigl\{\, u \in L^p(0,T;V) \;:\; u' \in L^q(0,T;V') \,\bigr\} \hookrightarrow C([0,T];H)$$

  （微分は $V'$ 値の弱時間微分 — `W1pTime` の仮定そのもの）で、mathlib に欠けているベクトル値の時間 Sobolev／良い代表元理論の基幹定理に当たる。数か月規模の作業を要する未証明事項と見積もられ、主張は本来の強さ（連続、弱連続に弱めない）のまま保たれている。
gap:
  level: large
  note: |
    Stream D の最深部の単一定理。$V'$ 値版は [[V' 値の良い代表元|LerayHopf.Bochner.w1pTime_continuous_in_Vprime]] として**証明済み**（原始関数 + du Bois-Reymond 経路）で、$H$ 値版だけが残る。この意図的 `sorry` は抽象 Bochner 層（Stream D）の残余であり、総仕上げの定理群（[[トーラス存在定理|LerayHopf.exists_lerayHopf_torus3]] 等）の kernel-only 性はこの層に依存しない（両系統は具体構成で閉じている）。
chapter: bochner
tags: [gelfand-triple, bochner]
