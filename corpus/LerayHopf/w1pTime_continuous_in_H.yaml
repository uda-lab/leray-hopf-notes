name: LerayHopf.Bochner.w1pTime_continuous_in_H
tier: full
statement_ja: |
  Lions–Magenes の良い代表元（$p=q=2$ の Gelfand 三対の場合、意図的 sorry）：$u \in L^2(0,T;V)$ かつ弱時間微分が $u' \in L^2(0,T;V')$ を満たすならば、ピボット空間 $H$ に値を取る連続な代表元を持つ — $[0,T]$ 上連続で、$u$ の $H$ への像とほとんど至る所一致する曲線が存在する。
proof_ja: |
  **証明は意図的に `sorry`（ALLOW_SORRY）で開けてある。**これは Lions–Magenes の埋め込み（Temam, Chapter III, Lemma 1.2 および §1.4）

  $$\bigl\{\, u \in L^2(0,T;V) \;:\; u' \in L^2(0,T;V') \,\bigr\} \hookrightarrow C([0,T];H)$$

  （微分は $V'$ 値の弱時間微分）で、mathlib に欠けているベクトル値の時間 Sobolev／良い代表元理論の基幹定理に当たる。標準的な証明経路はエネルギー対 $t \mapsto \langle u'(t), u(t)\rangle_{V',V}$ の可積分性に Cauchy–Schwarz（$L^2(V') \times L^2(V)$）を用いるため、指数対 $p=q=2$ に本質的に依存する。
gap:
  level: large
  note: |
    **検疫済み・訂正履歴（leray-hopf issue #158）**: 本定理はかつて一般指数 `1 ≤ p, 1 ≤ q` で主張されており、その一般形は**偽**である — `p = q = 1` に対し重み付き $\ell^2$ 上の三角形スパイク列による明示的反例が存在する（$u$ と $u'$ が各々 $L^1$ でも双対対 $\langle u', u\rangle$ の可積分性は従わない）。2026-07-17 に唯一の証明計画が存在する $p=q=2$ へ制限され（leray-hopf PR #162）、宣言は release surface 外の `Bochner/TimeSobolevExperimental.lean`（`import LerayHopf.Experimental` 経由でのみ到達可能、root import は sorry-free）へ隔離された。本注釈の旧版が「主張は本来の強さのまま保たれている」と誤った自信を再掲していた経緯は issue #158 の postmortem に記録されている。$V'$ 値版は [[V' 値の良い代表元|LerayHopf.Bochner.w1pTime_continuous_in_Vprime]] として**証明済み**。総仕上げの定理群（[[トーラス存在定理|LerayHopf.exists_lerayHopf_torus3]] 等）の kernel-only 性はこの層に依存しない。
chapter: bochner
