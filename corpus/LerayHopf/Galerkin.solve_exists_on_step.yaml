name: LerayHopf.Galerkin.solve_exists_on_step
tier: gloss
statement_ja: |
  区間を等幅ステップで延長する帰納法の中核：一様局所存在時間 $\delta$ が初期球上で使えるとき、各 $k$ に対し $[0,\,k\delta/2]$ 全体で自励方程式を満たす解が存在する。$k$ についての帰納法で、既得の解の終端から次の局所解を継ぎ足し、継ぎ目では左右の片側微分を場合分けで貼り合わせる。
gap:
  level: mild
  note: |
    継ぎ足しは if-then-else による区分定義で行い、継ぎ目の一点では `HasDerivWithinAt` の左右結合（`Iic`/`Ici` の合併）で微分可能性を回復する。[[前向き大域存在|LerayHopf.Galerkin.forwardGlobalSolution_exists]]の下請け補題。
chapter: galerkin-generic
tags: [dissipative-ode, private-helper]
