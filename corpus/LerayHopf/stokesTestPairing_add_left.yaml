name: LerayHopf.Torus.stokesTestPairing_add_left
tier: full
statement_ja: |
  Stokes テスト対の左加法性（帯域制限された第二引数のもとで）：$w$ がある次数 $n$ の Fourier 截断で固定されるならば

  $$s(u + u',\ w) = s(u, w) + s(u', w).$$
proof_ja: |
  [[対称性|LerayHopf.Torus.stokesTestPairing_symm]] で引数を入れ替え、[[右加法性|LerayHopf.Torus.stokesTestPairing_add_right]] を適用してから対称性で戻す。
gap:
  level: none
  note: |
    帯域制限の仮定が $w$ 側に付くのは、対称性を経由すると右加法性の「第一引数の帯域制限」が $w$ に掛かるためである。
chapter: ode
tags: [stokes, torus]
