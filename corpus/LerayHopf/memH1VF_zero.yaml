name: LerayHopf.memH1VF_zero
tier: full
statement_ja: |
  零ベクトル場は成分ごとの $H^1$ 所属を満たす。
proof_ja: |
  成分への射影は線形写像なので零場の各成分は零関数であり、その重み付き Fourier 二乗和は恒等的に零、したがって総和可能である。
gap:
  level: none
  note: |
    $H^1$ 所属はスカラー成分ごとの重み付き Fourier 和の総和可能性 [[H¹ 所属（スカラー）|LerayHopf.memH1Torus]] として定義されている（mathlib にトーラス Sobolev 空間の API が無いための Fourier 側の定義）。
chapter: energy
tags: [sobolev, torus]
