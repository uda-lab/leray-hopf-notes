name: LerayHopf.divComponent_eq_fourier_integral
tier: gloss
statement_ja: |
  試験関数 $\varphi$ の第 $j$ 偏微分と、場 $u$ の第 $j$ 成分との $L^2$ 内積が、Fourier 側の積分対

  $$\int\overline{\bigl(2\pi i\,\xi_j\,\widehat\varphi(\xi)\bigr)}\,\widehat u_j(\xi)\,d\xi$$

  に等しいことを述べる。偏微分の Fourier 乗数と Plancherel 等式を組み合わせたものである。
gap:
  level: mild
  note: |
    左辺は実 $L^2$ 内積を複素数として見たもの（`RCLike.ofRealCLM` による埋め込み）であり、右辺は複素化した Fourier 変換どうしの内積として書かれている。
chapter: spaces
tags: [divergence-free, fourier, parseval, private-helper]
