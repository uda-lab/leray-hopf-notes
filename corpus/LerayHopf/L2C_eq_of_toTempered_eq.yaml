name: LerayHopf.L2C_eq_of_toTempered_eq
tier: full
statement_ja: |
  $L^p$ から緩増加超関数への埋め込みの単射性：二つの $L^2$ 元が緩増加超関数として等しければ、$L^2$ の元として等しい。スペクトル論法で超関数の等式から $L^2$ の等式へ戻る出口。
proof_ja: |
  テストとの対で一致する二つの局所可積分関数は a.e. で一致する（du Bois-Reymond）ことに帰着し、$L^2$ 類の等式として読み替える。
gap:
  level: mild
provenance: |
  lean-pde PR #126 で `Analysis/SpectralWeakGradient.lean` へ公開移動。
chapter: energy
tags: [fourier, parseval, shared-infra]
