name: LerayHopf.convL2
tier: gloss
statement_ja: |
  核重みを掛けた平行移動族 $h\mapsto\eta(h)\cdot\tau_h g$ を $h$ について Bochner 積分した $L^2$ の元。畳み込み $\eta\star g$ を、可積分性の別途の確認を要さず直接 $L^2$ の元として実現したもの。
