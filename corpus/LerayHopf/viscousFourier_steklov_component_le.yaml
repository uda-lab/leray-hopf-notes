name: LerayHopf.viscousFourier_steklov_component_le
tier: gloss
statement_ja: |
  $j$ 番目の Fourier 成分ごとの、重み付き Steklov–Jensen 評価。刻み幅 $\delta>0$、時刻 $t\ge0$ のもとで各成分 $j$ について、Steklov 平均化した成分の全重み（打ち切りなし）でのスペクトルエネルギーは、各時刻でのスペクトルエネルギーの時間平均で抑えられる：$$\int_\xi (2\pi)^2\|\xi\|^2\,\left\|\mathcal F(\pi_j(\text{Steklov 平均}))(\xi)\right\|^2\,d\xi \le \delta^{-1}\int_t^{t+\delta}\int_\xi (2\pi)^2\|\xi\|^2\,\|\mathcal F(\pi_j u_n(s))(\xi)\|^2\,d\xi\,ds.$$ 有界重みへの打ち切りごとの Jensen 評価を優収束定理で打ち切りを外す極限に移して得る。
gap:
  level: mild
provenance: |
