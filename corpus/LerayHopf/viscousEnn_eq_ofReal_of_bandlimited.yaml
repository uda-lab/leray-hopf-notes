name: LerayHopf.viscousEnn_eq_ofReal_of_bandlimited
tier: full
statement_ja: |
  帯域制限された場では両者は一致する：$\nu \ge 0$ とし、場 $u$ がある次数 $n$ の Fourier 截断で固定される（帯域制限）ならば、[[拡張非負実数値の粘性和|LerayHopf.viscousEnn]] は実数値の [[粘性形式|LerayHopf.viscousFormSq]] の埋め込みに等しい。
proof_ja: |
  帯域制限により Fourier 係数は次数 $n$ の周波数箱の外で消えるので、被和項は有限集合の外で零である。左辺の拡張非負実数の総和と右辺の各成分の格子総和はどちらも同じ有限和（成分と周波数箱の直積上の和）に潰れ、非負性のもとで埋め込みを有限和と交換すれば両辺が一致する。
gap:
  level: mild
  note: |
    係数の消滅は `coeff_zero_outside_box`、総和の有限和への潰しは `tsum_eq_sum`、埋め込みと有限和の交換は `ENNReal.ofReal_sum_of_nonneg` による。Galerkin 解の各時刻の値は帯域制限されているので、本補題がエネルギー論法の実数側と拡張非負実数側を貼り合わせる。
chapter: energy
tags: [energy, dissipation, torus]
