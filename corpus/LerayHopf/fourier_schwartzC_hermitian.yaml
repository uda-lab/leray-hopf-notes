name: LerayHopf.fourier_schwartzC_hermitian
tier: full
statement_ja: |
  実関数の Fourier 変換の Hermite 性：実 Schwartz 関数の複素化の Fourier 変換 $\widehat{\varphi}$ は Hermite 対称

  $$\widehat{\varphi}(-\xi)=\overline{\widehat{\varphi}(\xi)}.$$

  を満たす。
proof_ja: |
  実数値性から $\overline{\varphi}=\varphi$ であり、Fourier 変換と共役・反転の交換規則を適用する。
gap:
  level: none
provenance: |
  lean-pde PR #126（issue #113 PR-2）で汎用解析層 `Analysis/FourierParseval.lean` へ公開移動。
chapter: limit-passage
tags: [fourier, parseval, shared-infra]
