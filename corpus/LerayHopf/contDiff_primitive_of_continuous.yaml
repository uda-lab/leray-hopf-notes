name: LerayHopf.Bochner.contDiff_primitive_of_continuous
tier: full
statement_ja: |
  連続スカラーの原始関数は $C^1$：連続な $g$ に対し $G(t) = \int_0^t g$ は $C^1$ で、$G' = g$。
proof_ja: |
  微積分学の基本定理（連続な被積分関数の原始関数の微分）で導関数を同定し、導関数が連続なので $C^1$ 性が従う。
gap:
  level: none
  note: |
    du Bois-Reymond 論法で「平均零のテスト」から $C^1$ テストを製造する部品。
chapter: bochner
tags: [primitive, bochner]
