name: LerayHopf.memH1VF_smul
tier: full
statement_ja: |
  成分ごとの $H^1$ 所属は実スカラー倍で閉じる：$u$ が $H^1$ ならば任意の $c \in \mathbb{R}$ に対し $c\, u$ も $H^1$ である。
proof_ja: |
  スカラー倍の Fourier 係数のノルムは元の係数のノルムの $\lvert c \rvert$ 倍だから、重み付き二乗和は元の総和可能な級数の $c^2$ 倍に等しい。これを優級数として項別比較すれば総和可能性が保たれる。
gap:
  level: none
  note: |
    値の水準では等式だが、Lean の証明は優級数判定（`Summable.of_nonneg_of_le`）の形で組み立てられている。係数のノルム斉次性は `mFourierCoeff3_norm_smul` による。
chapter: energy
tags: [sobolev, torus]
