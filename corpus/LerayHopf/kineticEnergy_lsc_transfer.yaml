name: LerayHopf.Bochner.kineticEnergy_lsc_transfer
tier: full
statement_ja: |
  一様ノルム有界の $L^2$ 極限への遺伝：a.e. 強可測な $g$ への $L^2(\mu)$ 収束と、一様な a.e. ノルム有界 $\lVert f_n(t) \rVert \le M$ から、極限も $\mu$-a.e. で $\lVert g(t) \rVert \le M$ を満たす。
proof_ja: |
  [[可測代表と a.e. 部分列|LerayHopf.Bochner.aeStronglyMeasurable_of_spaceTimeL2]] で a.e. 収束部分列を取り、可算個の有界性を a.e. で同時に成立させ（全称と a.e. の交換）、各 a.e. 点でノルムの極限として評価を渡す。
gap:
  level: mild
  note: |
    結論が a.e.（全時刻でなく）なのが正直な形：$L^2$ 収束は零集合上の値を決めない。可測性仮定 `hg` の必要性は前補題と同じ Vitali 型反例による（docstring に記録）。運動エネルギー有界の極限移行（E1）の抽象核。
chapter: bochner
tags: [weak-limit, energy, bochner]
