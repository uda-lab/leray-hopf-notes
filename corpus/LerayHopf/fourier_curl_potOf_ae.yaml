name: LerayHopf.fourier_curl_potOf_ae
tier: gloss
statement_ja: |
  正則化ポテンシャルの渦度の第 $j$ 成分を $L^2$ クラスとして Fourier 変換したものが、ほとんど至る所次の式に一致することを述べる。[[渦度の Fourier 乗数|LerayHopf.fourier_curlSchwartz_eq_cross]]と[[正則化記号の値|LerayHopf.crossWithIξ_symbolHat_eq]]を組み合わせたもの。

  $$\widehat{(\operatorname{curl}\psi_a)}_j(\xi)=\frac{\lVert\xi\rVert^2}{a^2+\lVert\xi\rVert^2}\,\widehat w_j(\xi)$$
gap:
  level: none
