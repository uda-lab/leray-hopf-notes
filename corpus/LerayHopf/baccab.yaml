name: LerayHopf.baccab
tier: gloss
statement_ja: |
  次の横断性のもとで、外積を二重に施した式の第 $j$ 成分が簡単になることを述べる。

  $$\sum_i\xi_i\,\widehat w_i(\xi)=0$$

  $$\bigl(\xi\times(\xi\times\widehat w)\bigr)_j=-\lVert\xi\rVert^2\,\widehat w_j(\xi)$$

  一般に BAC-CAB 公式は次の形をもち、これは横断性で右辺第一項を消した特別な場合にあたる。

  $$\xi\times(\xi\times\widehat w)=\xi\,(\xi\cdot\widehat w)-\widehat w\,\lVert\xi\rVert^2$$
gap:
  level: mild
  note: |
    式は外積の巡回添字表示（`j+1`、`j+2+1` のように $3$ を法とする添字シフトを重ねた形）で直接書き下されており、通常の BAC-CAB 公式の記法とは見た目が異なる。証明は `fin_cases` で三成分に分けたのち `linear_combination` で横断性の式を足し込む。
chapter: projections-galerkin
