name: LerayHopf.restrictToBall
tier: full
statement_ja: |
  $L^2(\mathbb{R}^3)$ ベクトル場の半径 $R$ の閉球への制限。球上の $L^2$ 空間の元を与える対応で、局所 Rellich 論法（球上のコンパクト性 + 球外部分の一様な小ささ）の基本部品。
proof_ja: |
  場の代表関数を球へ制限し、その二乗可積分性（全空間での可積分性の単調性から従う）で球上の $L^2$ 類を定める。
gap:
  level: none
provenance: |
  lean-pde PR #122（issue #111 PR-3）で private→public 化・共有化された。
chapter: compactness
tags: [spatial-compactness, restrict-to-ball, r3]
