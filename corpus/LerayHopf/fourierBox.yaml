name: LerayHopf.fourierBox
tier: full
statement_ja: |
  次数 $n$ の周波数箱：波数の立方体 $[-n, n]^3 \subset \mathbb{Z}^3$ を有限集合として定める。
proof_ja: |
  各座標の整数区間 $[-n, n]$ の三つ組の直積有限集合として構成する。
gap:
  level: none
  note: |
    Galerkin 截断の保持モード集合。$\ell^\infty$ 球（立方体）を採用しているので座標ごとの評価と相性がよい。
chapter: projections-galerkin
