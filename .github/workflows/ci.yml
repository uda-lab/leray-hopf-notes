name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual triggers for inspection

# notes#72: no workflow previously declared `permissions`, so both jobs ran with the
# default (broader) GITHUB_TOKEN scope. Nothing here needs to write to the repo, open
# PRs, or touch other API surfaces — read-only contents access is enough to checkout
# and upload a workflow artifact.
permissions:
  contents: read

env:
  # notes#72: previously build-site-artifact.yml used Node 24 and harness.yml used
  # Node 20 — pick one version and share it via env so the two never drift apart again.
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.11"

jobs:
  validate:
    name: Validate corpus + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate fallback name universe (if leray-hopf not available)
        # In CI, leray-hopf is not available, so names-fallback.json is committed.
        # This step is a no-op if the file is already present and leray-hopf is absent.
        run: |
          if [ ! -f extracted/names-fallback.json ]; then
            echo "WARNING: extracted/names-fallback.json missing — skipping name universe checks"
          else
            echo "Using committed extracted/names-fallback.json"
          fi

      - name: Validate corpus
        run: python3 scripts/validate.py

      - name: Glossary lint
        run: python3 scripts/glossary_lint.py

      - name: Forbidden-term regression lint tests (notes#105)
        run: python3 test/issue105_forbidden_terms.test.py

      - name: Prose lint (D1/D2/D5)
        run: python3 scripts/prose_lint.py

      - name: Coverage report
        run: python3 scripts/coverage.py

      - name: Doc staleness guard
        run: python3 scripts/check_docs.py

      - name: Build site data (structure check only)
        # Verifies the join runs, but writes to a temp path rather than site/data/nodes.json:
        # this job runs on its own checkout with no leray-hopf checkout, so it cannot embed
        # source, and site/data/*.json is a generated-only, gitignored directory (notes#29) —
        # there's nothing to preserve there, just no reason to leave build byproducts behind
        # in a job that's only checking the join runs. Pure Python, seconds.
        run: python3 scripts/build_site_data.py --no-coverage --out /tmp/nodes.check.json

      - name: Site data size report CLI regression tests
        run: python3 test/site_data_size_report.test.py

      - name: Source provenance gate regression tests (notes#32)
        run: python3 test/verify_source_provenance.test.py

  render-tests:
    name: Site render harness (jsdom)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Node dependencies
        run: npm ci
      - name: Render harness (D1/D4/D5 acceptance criteria)
        run: npm test

  build-artifact:
    name: Build and validate site data
    # notes#72: previously this job re-ran `python3 scripts/validate.py` and `npm test`
    # itself (duplicating the validate/render-tests jobs above) before building. It only
    # needs those checks to have passed, not to re-run them — `needs:` gates on that
    # without re-executing them. It also no longer sets up Node at all: build_site_data.py
    # and site_data_size_report.py are pure Python; npm/node_modules were only ever
    # needed here for the now-removed duplicate `npm test` step.
    needs: [validate, render-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Read extracted/PIN
        # Phase B: leray-hopf is public now, so the source-enabled build checks out the
        # exact commit notes#32 requires — never a branch, and never a value handed in
        # by any other step. Reading PIN fresh from the just-checked-out notes tree here
        # (rather than trusting an input/env var) is itself part of not "merely trusting"
        # the eventual --lean-root: the checkout step below is pinned to this value, and
        # scripts/verify_source_provenance.py re-derives the same file independently.
        id: read-pin
        run: |
          pin="$(cat extracted/PIN)"
          if ! [[ "$pin" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::extracted/PIN is not a 40-character lowercase-hex commit SHA: '$pin'"
            exit 1
          fi
          echo "pin=$pin" >> "$GITHUB_OUTPUT"

      - name: Checkout leray-hopf at PIN
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: uda-lab/leray-hopf
          ref: ${{ steps.read-pin.outputs.pin }}
          # No `token:` override: actions/checkout requires a non-empty token (an
          # explicit token: '' fails with "Input required and not supplied: token" —
          # empty string is not treated as "use the default"), so this checkout uses
          # the default `${{ github.token }}` — it is NOT an unauthenticated clone. That
          # default token is scoped to this (notes) repo for API calls, but `leray-hopf`
          # is public, and workflow `permissions:` only restricts what the token can do
          # via the GitHub API on *this* repo — it does not block a plain git-over-HTTPS
          # read of a different public repo, which is all a checkout does.
          # persist-credentials: false — this checkout only reads leray-hopf to embed
          # source text; nothing in this job needs to push to it or git-authenticate
          # again, so there is no reason to leave the token in .git/config afterward.
          persist-credentials: false
          path: leray-hopf

      - name: Build site data (source-enabled)
        run: |
          # Phase B: source-enabled build, embedding verbatim declaration text from the
          # leray-hopf checkout above.
          python3 scripts/build_site_data.py --lean-root leray-hopf

      - name: Verify source provenance (notes#32 fail-closed gate)
        # Independently re-checks the leray-hopf checkout against extracted/PIN via git
        # plumbing (not the ref string used to request the checkout), confirms the
        # checkout is clean and detached, and cross-checks the build outputs — hard-fails
        # the job (and therefore blocks deployment) if any of the notes#32 audit-mandated
        # provenance checks do not hold. See scripts/verify_source_provenance.py.
        run: python3 scripts/verify_source_provenance.py --lean-root leray-hopf

      - name: Generate size report
        # notes#29: hard failure ceiling (20 MiB raw / 6 MiB gzip) is a backstop against a
        # misconfiguration/regression, not a growth blocker — it sits ~2x above the 10 MiB/
        # 3 MiB warning thresholds, itself already well above current usage (~3.2 MB raw /
        # 604 KB gzip at 1,339 decls). `set -o pipefail` so a non-zero exit from the report
        # script (piped into `tee`) actually fails this step instead of being swallowed by
        # tee's own exit code. The report's exit status is captured in `status` rather than
        # left to fail the script outright, so the step summary still gets the report (most
        # useful exactly when the ceiling is breached) before the step reports failure.
        run: |
          set -o pipefail
          status=0
          python3 scripts/site_data_size_report.py --json site/data/size-report.json \
            --fail-raw-mib 20 --fail-gzip-mib 6 | tee size-report.md || status=$?
          cat size-report.md >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Upload site artifact
        # Upload even if the size report failed (but not if the job was cancelled), so a
        # hard-ceiling breach is inspectable. Runs on every PR and push (not just main),
        # so PR-time source-enabled builds stay inspectable even though only a push to
        # main goes on to actually deploy.
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: site-data
          path: |
            site/
            !site/data/.gitkeep
          retention-days: 30

      - name: Upload GitHub Pages artifact
        # Deployment itself (deploy-pages job below) is gated to push-to-main AND the
        # vars.PAGES_DEPLOY_ENABLED repository variable (see that job's comment); this
        # upload step uses the identical condition so nothing pages-shaped is even
        # prepared, let alone deployed, until the owner has explicitly flipped the gate.
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && vars.PAGES_DEPLOY_ENABLED == 'true' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/

  deploy-pages:
    name: Deploy to GitHub Pages
    # notes#32: source-enabled build + fail-closed provenance checks (build-artifact job)
    # must pass before anything is deployed. Deployment itself only ever runs on main
    # (an automatic push, or a manual workflow_dispatch re-run of main) — never for
    # pull_request or a workflow_dispatch on another ref — so a PR-time source-enabled
    # build is validated, not published.
    #
    # vars.PAGES_DEPLOY_ENABLED (owner-controlled repository Actions variable, default
    # unset/false) is a second, independent, explicit gate on top of the branch check.
    # #32 lists 11 audit-mandated provenance/readiness items; this PR implements 5 of
    # them (see PR body). "Pages isn't configured yet" being an implicit blocker is not
    # the same as an explicit publish gate — it fails for the wrong reason (owner hasn't
    # gotten to Settings yet) and would silently start deploying real content the moment
    # Pages is turned on for unrelated reasons, before the remaining #32 items are done.
    # Requiring the owner to affirmatively set this variable (Settings → Secrets and
    # variables → Actions → Variables) after verifying the remaining gate items is the
    # explicit publish decision notes#32's acceptance criteria call for.
    #
    # Once both gates pass, this step still requires GitHub Pages to be enabled in
    # repository Settings with source "GitHub Actions" — that is a separate owner/admin
    # action outside this workflow's scope (notes#32 non-goals: "Do not make repository
    # visibility changes implicitly from this issue").
    needs: [build-artifact]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && vars.PAGES_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    # Official GitHub Pages guidance: serialize deployments to this environment so two
    # overlapping main-branch runs can't race each other; queue rather than cancel a
    # deploy that's already in flight, since a cancelled-mid-upload Pages deploy can
    # leave the site in a half-updated state.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
