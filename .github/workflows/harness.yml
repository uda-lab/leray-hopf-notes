name: Harness

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: Validate corpus + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Generate fallback name universe (if lean-pde not available)
        # In CI, lean-pde is not available, so names-fallback.json is committed.
        # This step is a no-op if the file is already present and lean-pde is absent.
        run: |
          if [ ! -f extracted/names-fallback.json ]; then
            echo "WARNING: extracted/names-fallback.json missing — skipping name universe checks"
          else
            echo "Using committed extracted/names-fallback.json"
          fi

      - name: Validate corpus
        run: python3 scripts/validate.py

      - name: Glossary lint
        run: python3 scripts/glossary_lint.py

      - name: Prose lint (D1/D2/D5)
        run: python3 scripts/prose_lint.py

      - name: Coverage report
        run: python3 scripts/coverage.py

      - name: Build site data (structure check only)
        # Verifies the join runs, but writes to a temp path: CI has no lean-pde checkout,
        # so it cannot embed source. Writing to site/data/nodes.json here would clobber the
        # committed source-embedded artifact (built with --lean-root). Pure Python, seconds.
        run: python3 scripts/build_site_data.py --no-coverage --out /tmp/nodes.check.json

  render-tests:
    name: Site render harness (jsdom)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install jsdom
        run: npm ci

      - name: Render harness (D1/D4/D5 acceptance criteria)
        run: npm test
